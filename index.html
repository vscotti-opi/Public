mpegni contrattuali;<br>- Recovery Time Objective (RTO) -  Per i micro-guasti (Tier 1), il sistema gestisce il failover con un RTO di 30 minuti in caso di dichiarazione di un disastro regionale (Tier 2), il ripristino dell'infrastruttura (RDS, S3) sulla region geografica secondaria avviene tramite infrastructure-as-code con un RTO documentato e garantito. <br>- Ridondanza Geografica e Compliance - La piattaforma poggia nativamente sull'infrastruttura Amazon Web Services (AWS) e adotta un'architettura ad Alta Affidabilità che distribuisce il carico su 3 data center fisicamente separati (Availability Zones) all'interno di una singola Region primaria. Inoltre, i dati vengono replicati regolarmente in una Region AWS secondaria geograficamente distinta;<br>- Trasparenza del Failover - PerfectGym è allineata: adotta sistemi di bilanciamento del carico automatizzati per isolare le macchine non funzionanti e ridirigere il traffico senza interruzioni e in modo del tutto trasparente per gli utenti. Per il Disaster Recovery (Tier 2), i processi sono altamente ingegnerizzati;<br>- Audit e Verifiche - PerfectGym dichiara formalmente il proprio impegno a eseguire esercitazioni di Disaster Recovery almeno una volta all'anno, testando la capacità di fare un redeploy della piattaforma nella region secondaria.<\u002Fdiv><\u002Fdiv><\u002Fdiv><p>Dal punto di vista dell'architettura di base, PerfectGym si presenta come una solida soluzione 100% cloud-native ospitata su AWS pienamente accessibile via browser, adotta standard eccellenti per l'autenticazione sicura (ASVS) e il ciclo di vita dei token (OAuth2/JWT). Si evidenzia che, sebbene supporti i Webhooks in tempo reale, l'architettura API è strutturata esclusivamente a risorse e ma non supporta GraphQL, costringendo a effettuare chiamate multiple per ricostruire pacchetti informativi completi. <\u002Fp><p>La certificazione ISO 27001 risulta attualmente in corso di ottenimento ma con garanzia da parte del fornitore in tempi brevi. <\u002Fp><p>In merito alla presenza sul territorio italiano, il fornitore Magicline soddisfa il requisito solo parzialmente in quanto non certifica una filiale diretta in Italia, vincolando l'onboarding, la formazione dello staff e l'assistenza in lingua inglese e da remoto ma vanta già un'esperienza nel mercato italiano con una realtà comparabile a quella di Orange Palestre Italiane.<\u002Fp><p>Infine, il requisito tecnico di Disaster recovery è soddisfatto in caso di eventi certificati dal fornitore Tier 1 (caduta di un Data Center), ma in caso di eventi classificati come Tier 2 (disastri regionali), il RTO è superiore allo standard imposto.<\u002Fp><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>8 requisiti · 4 soddisfatti · 4 parziali<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h4 id=\"s15\" class=\"sec lvl3\"><span class=\"sec-t\">5.2.4. Analisi Requisiti Tecnici - Nice to Have<\u002Fspan><\u002Fh4><div class=\"reqlist\"><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_041<\u002Fspan><span class=\"req-t\">Assistenza H24 con escalation prioritaria per area Finance &amp; Amministrazione<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Supporto tecnico e adozione<\u002Fdiv><div class=\"req-d\">Il supporto di secondo livello è gestito da un team europeo, garantendo copertura e tempistiche adeguate alle esigenze operative dei club. Forniscono un supporto di secondo livello di Help Center. I clienti Enterprise beneficiano di uno SLA a più livelli con instradamento prioritario per gli incidenti che incidono sulla gestione finanziaria e sui pagamenti (errori di fatturazione, interruzioni del gateway, problemi nella generazione dei rinnovi). Il servizio di assistenza tecnica 24 ore su 24, 7 giorni su 7, è incluso nel pacchetto di assistenza Enterprise e viene stipulato nell'ambito del contratto commerciale. Garantiamo un monitoraggio continuo 24 ore su 24, 7 giorni su 7, di tutti i componenti dell'infrastruttura per assicurare un'elevata disponibilità e la sicurezza dei dati. Per aggiornamenti in tempo reale su interruzioni critiche delle comunicazioni (ad esempio, interruzioni delle API o tempi di inattività della piattaforma), SPA mette a disposizione una pagina di stato pubblica, accessibile 24 ore su 24, 7 giorni su 7, in cui vengono pubblicati in modo trasparente problemi di sistema, interruzioni e tempi di ripristino: <br><a href=\"https://perfectgym-next.status.sportalliance.com/\">https://perfectgym-next.status.sportalliance.com/<\u002Fa>\"<\u002Fdiv><\u002Fdiv><\u002Fdiv><p>Il fornitore garantisce un servizio di supporto tecnico di secondo livello disponibile 24/7; di conseguenza, sarà necessario che Orange Palestre Italiane definire una struttura interna di primo livello, individuando key user o figure di riferimento incaricate della raccolta, qualificazione e gestione preliminare delle richieste di assistenza prima dell'escalation verso il fornitore. Inoltre, PerfectGym mette a disposizione una piattaforma pubblica di monitoraggio che consente la verifica trasparente e in tempo reale dello stato delle infrastrutture e dei servizi.<\u002Fp><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>1 requisiti · 1 parziali<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h3 id=\"s16\" class=\"sec lvl2\"><span class=\"sec-t\">5.3. Exerp<\u002Fspan><\u002Fh3><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>Soluzione enterprise molto solida e già attiva in Italia (Virgin Active). Criticità: modulo Core desktop, RTO oltre 3 giorni su disastri globali. ISO 27001 ok.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h4 id=\"s17\" class=\"sec lvl3\"><span class=\"sec-t\">5.3.1. Analisi Requisiti Funzionali - Must Have<\u002Fspan><\u002Fh4><div class=\"reqlist\"><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_003<\u002Fspan><span class=\"req-t\">Documentazione a supporto<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Documentazione<\u002Fdiv><div class=\"req-d\">Offre una piattaforma documentata con API mature e servizi di consulenza<br>Exerp fornisce una documentazione tecnica completa e costantemente aggiornata a supporto della corretta gestione e integrazione dei flussi di dati.<br>Tutte le API sono completamente documentate tramite un portale dedicato per sviluppatori, che include definizioni degli endpoint, modelli di dati, metodi di autenticazione ed esempi di utilizzo. Questa documentazione viene attivamente mantenuta e aggiornata in linea con le release della piattaforma per garantirne accuratezza e affidabilità.<br>Laddove le modifiche abbiano un impatto sulle integrazioni o sui flussi di dati, Exerp adotta un protocollo  strutturato di rilascio e comunicazione. Gli aggiornamenti vengono comunicati in anticipo, ove possibile, offrendo  piena visibilità sugli interventi futuri  e assicurando il tempo necessario per adeguare l’infrastruttura aziendale interna. <br>A seconda della natura e dell'impatto dell'aggiornamento, sono adottati metodi di comunicazione diversificati,  quali note di rilascio, comunicazione diretta con il cliente e canali di assistenza specifici. , <br>Questo modello garantisce a Orange Palestre Italiane una documentazione tecnica, di riferimento,  chiara, affidabile e aggiornata, supportata da  una comunicazione proattiva a volta a facilitare  e la gestione dei dati in corso.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_004<\u002Fspan><span class=\"req-t\">Inserimento dati e documenti e archiviazione<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione anagrafica e prime iterazioni con il cliente<\u002Fdiv><div class=\"req-d\">Exerp consente la gestione di dati dei membri, sottoscrizioni e documenti in un unico posto. Supporta firme digitali per i contratti.<br>Supporta la gestione completa dei dati anagrafici dei clienti, inclusa l'acquisizione e l'archiviazione di informazioni personali e documenti correlati all'interno di un unico profilo unificato.<br>I record dei membri possono essere configurati per includere tutti i campi dati richiesti, come dati personali, accordi, flag di consenso, informazioni mediche o di conformità e qualsiasi attributo aggiuntivo definito dall'operatore.<br>La documentazione a supporto — tra cui contratti, firme digitali, materiale fotografico e certificati — può essere acquisita e archiviata direttamente a sistema, sia tramite i flussi di lavoro del personale (back-office) sia attraverso percorsi digitali integrati (self-service), in base al design dei processi aziendali.  <br>Il completamento del caricamento determina l'archiviazione automatica e l'integrazione referenziale dei documenti con il profilo utente. Si configura così un database centralizzato, presupposto essenziale per una reportistica accurata e per flussi di lavoro conformi agli standard aziendali. In ottica di protezione del dato, regole rigorose di autorizzazione basate sui profili utente governano l'accesso alle informazioni, escludendo visibilità non autorizzate sui dati sensibili. <br>Si deline così, per  Gymnation Italia, un approccio pulito, sicuro e completamente verificabile per la gestione dei dati e della documentazione dei clienti, senza la necessità di sistemi di archiviazione separati.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_005<\u002Fspan><span class=\"req-t\">Ricerca rapida<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione anagrafica e prime iterazioni con il cliente<\u002Fdiv><div class=\"req-d\">Funzionalità presente.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_006<\u002Fspan><span class=\"req-t\">Pianificazione e gestione degli appuntamenti<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione anagrafica e prime iterazioni con il cliente<\u002Fdiv><div class=\"req-d\">Permette di creare e gestire prenotazioni, aggiungere partecipanti e modificare dettagli della sessione.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_008<\u002Fspan><span class=\"req-t\">Categorizzazione cliente<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione anagrafica e prime iterazioni con il cliente<\u002Fdiv><div class=\"req-d\">Exerp supporta la categorizzazione automatica dei clienti in base ai dati del profilo, allo stato di iscrizione e all'attività comportamentale.<br>Ogni individuo è inserito in un unico profilo membro, dove lo stato viene aggiornato dinamicamente in base al suo rapporto con il club. Ad esempio, un utente può essere identificato come membro attivo se ha un contratto in essere, come potenziale cliente se si è registrato o ha richiesto informazioni ma non ha effettuato l'iscrizione, o come ex membro se l'iscrizione è stata annullata.<br>Oltre allo stato, Exerp traccia le presenze e i livelli di attività tramite check-in, prenotazioni e coinvolgimento complessivo. Questa ricchezza informativa abilita un'ulteriore segmentazione dinamica basata sulla frequenza di accesso, permettendo all'operatore di differenziare i soci ad alta frequentazione dagli utenti a basso coinvolgimento o inattivi. <br>Queste classificazioni non sono statiche. Si aggiornano automaticamente al variare dello stato o del comportamento del membro, garantendo che i dati rimangano accurati e utilizzabili in tutta l'azienda.<br>Queste informazioni possono quindi essere utilizzate nei flussi di lavoro di reporting, filtraggio e comunicazione, consentendo a Orange Palestre Italiane di indirizzare gruppi specifici con messaggi pertinenti, strategie di fidelizzazione o campagne di riattivazione. Per casi d'uso più avanzati, questi dati possono anche essere integrati in piattaforme CRM o di marketing, supportando percorsi automatizzati basati sulla fase del ciclo di vita e sui modelli di attività.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_009<\u002Fspan><span class=\"req-t\">Gestione catalogo<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Dispone di un catalogo prodotti flessibile e configurabile per costruire nuove offerte senza necessità di sviluppo lato Exerp<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_010<\u002Fspan><span class=\"req-t\">Catalogo dinamico<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Il sistema è altamente configurabile e permette di adattare le soluzioni in modo perfetto per ogni azienda<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_012<\u002Fspan><span class=\"req-t\">Disdetta prova<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Incluso nelle funzionalità di gestione abbonamenti e lead<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_013<\u002Fspan><span class=\"req-t\">Calcolo automatico pro rata post 15 del mese<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Supporta piani di tariffazione e opzioni di pagamento flessibili<br>Exerp supporta la fatturazione proporzionale per i nuovi abbonamenti attivati ​​a metà mese.<br>Per le iscrizioni effettuate di persona dopo una data definita, ad esempio il 15 del mese, il sistema può calcolare automaticamente la tariffa giornaliera proporzionale per i giorni rimanenti del mese e combinarla con l'intero importo del mese successivo in un'unica transazione.<br>Questo avviene tramite regole di fatturazione configurabili, garantendo un' elaborazione dei pagamenti accurata e senza intoppi, senza calcoli manuali.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_014<\u002Fspan><span class=\"req-t\">Calcolo automatico pro rata prima del 15 del mese<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">vedi R_013.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_015<\u002Fspan><span class=\"req-t\">Conversione automatica abbonamento pro rata<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Consente la conversione all'abbonamento mensile<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_016<\u002Fspan><span class=\"req-t\">Rinnovo automatico dell'abbonamento<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Exerp supporta il rinnovo automatico degli abbonamenti mensili in base a regole di rinnovo implicite.<br>Qualora non venga inviata alcuna richiesta di cancellazione o sospensione prima della data di fatturazione, il sistema rinnoverà automaticamente l'abbonamento e genererà la rata corrispondente per il pagamento.<br>Questo avviene tramite regole di fatturazione e contrattuali configurabili, garantendo la continuità dell'abbonamento senza intervento manuale.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_017<\u002Fspan><span class=\"req-t\">Sospensioni abbonamento<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Exerp Go permette allo staff di creare sospensioni (freeze) e terminare sottoscrizioni . Il self-service permette ai membri di visualizzare estratti conto e gestire pagamenti<br>The member can suspend, freeze or cancel with permissions in the member web. This can be online or inside the member app.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_018<\u002Fspan><span class=\"req-t\">Disdetta abbonamento<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Exerp supporta la cancellazione dell'abbonamento sia tramite i canali con assistenza del personale (in palestra) sia tramite i canali digitali, come il sito web dedicato ai soci e l'app.<br>Gli operatori possono definire regole di cancellazione, inclusi i periodi di preavviso e le condizioni finanziarie. Ciò consente ai soci di disdire l'abbonamento fino a un momento prestabilito prima del rinnovo, ad esempio un giorno prima, in base alla politica configurata.<br>È inoltre possibile configurare penali di cancellazione all'interno della logica contrattuale. In questo caso, un addebito pari a un valore predefinito, ad esempio il 50% dell'abbonamento, può essere generato e applicato automaticamente al momento della cancellazione.<br>Tutti gli addebiti, gli aggiornamenti di stato e le modifiche di accesso vengono gestiti automaticamente in conformità con le regole configurate, garantendo un'esperienza coerente su POS, web e app.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_021<\u002Fspan><span class=\"req-t\">Verifica real-time accesso alla struttura<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">GYM Experience<\u002Fdiv><div class=\"req-d\">Prevede controllo accessi real-time basato su validità contratto, saldo e certificati<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_022<\u002Fspan><span class=\"req-t\">Autonomia utilizzo servizi<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">GYM Experience<\u002Fdiv><div class=\"req-d\">Gantner or supported provider<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_023<\u002Fspan><span class=\"req-t\">Integrazione Vending<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">GYM Experience<\u002Fdiv><div class=\"req-d\">Exerp supporta l'integrazione con fornitori di distributori automatici come Nayax grazie al suo framework API aperto e alle funzionalità del suo ecosistema di pagamento.<br>Questo permette ai soci di effettuare acquisti utilizzando badge, braccialetti, portafogli digitali o altre credenziali connesse, con transazioni collegate direttamente al profilo o all'account del socio all'interno di Exerp.<br>Nayax supporta pagamenti contactless e basati su dispositivi indossabili, inclusi braccialetti NFC, portafogli digitali e tecnologie RFID, risultando particolarmente adatto ad ambienti come palestre e centri benessere.<br>Le transazioni effettuate tramite distributori automatici connessi possono essere registrate sull'account del socio per la creazione di report, la riconciliazione e la visibilità operativa. Ciò consente un'esperienza più fluida per i soci, mantenendo al contempo una visione centralizzata degli acquisti e delle attività nell'intero ecosistema del club.<br>La combinazione del framework di integrazione di Exerp e della tecnologia di pagamento automatico di Nayax offre agli operatori la flessibilità necessaria per fornire moderne esperienze di vendita self-service all'interno del club.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_026<\u002Fspan><span class=\"req-t\">Prenotazione altri servizi (es. visita medica)<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">GYM Experience<\u002Fdiv><div class=\"req-d\">Exerp consente la prenotazione di servizi e risorse aggiuntive direttamente tramite l'account dell'utente, inclusi servizi come visite mediche, consulti, sessioni di benessere, sale per trattamenti e personale specializzato.<br>Le prenotazioni possono essere configurate sia per singole risorse che per sale o strutture, con gestione della disponibilità in tempo reale e controllo della programmazione.<br>La piattaforma supporta anche il pagamento al momento della prenotazione, garantendo un collegamento diretto tra il servizio prenotato e l'incasso. I pagamenti possono essere elaborati immediatamente tramite gateway di pagamento integrati, con conferme, ricevute e registri delle prenotazioni aggiornati automaticamente nel profilo dell'utente e nei report operativi.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_027<\u002Fspan><span class=\"req-t\">Gestione Multi-Tenant<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Struttura e accessibilità<\u002Fdiv><div class=\"req-d\">Exerp supporta una struttura gerarchica multilivello, consentendo agli operatori di gestire le configurazioni a livello di Gruppo, Regione, Area e singolo Club all'interno di un'unica piattaforma.<br>Il sistema è costruito attorno alla struttura di ambito configurabile di Exerp, che consente una governance centralizzata pur mantenendo la flessibilità locale ove necessario.<br>Configurazioni come l'impostazione dell'iscrizione, i prezzi, le regole di accesso, i prodotti, le strutture di reporting e le impostazioni operative possono essere ereditate dai livelli superiori fino ai sotto-elementi. Ciò riduce significativamente le duplicazioni e garantisce la coerenza in grandi reti multi-sede.<br>Ove necessario, è possibile applicare override locali anche a livello regionale o di club senza impattare sulla struttura di gruppo più ampia.<br>Questa architettura è particolarmente preziosa per le aziende e gli operatori in franchising che gestiscono più marchi, territori o modelli operativi all'interno di un unico ambiente unificato.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_028<\u002Fspan><span class=\"req-t\">Permessi account<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Struttura e accessibilità<\u002Fdiv><div class=\"req-d\">Include controllo degli accessi e autenticazione . Exerp Go è un'interfaccia staff dedicata per operazioni agili sul piano palestra<br>Questo è un vero punto di forza di Exerp e uno dei motivi principali per cui i grandi operatori aziendali scelgono la piattaforma.<br>Exerp supporta un modello di permessi multilivello altamente flessibile, che consente agli operatori di creare e gestire strutture di accesso dettagliate basate sui ruoli tra marchi, regioni e club all'interno di un'unica identità.<br>La gestione di ruoli e permessi prevede una configurazione ad alta granularità, consentendo il controllo puntuale su funzionalità specifiche, flussi di lavoro, aree operative e visibilità dei dati. Il modello abilita una profilazione flessibile: dall'accesso globale di livello Super Admin sull'intera rete di club, fino a profili utente strettamente limitati e verticalizzati su singoli task, quali la gestione delle prenotazioni, l'operatività del front-desk o le attività amministrative di un singolo centro. <br>È possibile creare un numero illimitato di ruoli in base alle esigenze operative. Ad esempio, durante l'implementazione di Evolution Wellness su più marchi e territori in Asia, sono stati configurati più di 80 ruoli unici per riflettere diversi modelli di business, team operativi e strutture regionali.<br>Gli utenti possono accedere a più club, marchi o ambiti operativi tramite un unico login, senza bisogno di disconnettersi o cambiare profilo. Le autorizzazioni si adattano dinamicamente in base al ruolo e all'ambito assegnati, creando un'esperienza fluida per il personale che lavora in più sedi o con funzioni diverse.<br>Questo offre agli operatori una solida governance e sicurezza, mantenendo al contempo la flessibilità operativa in ambienti complessi multi-sede.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_029<\u002Fspan><span class=\"req-t\">Integrazione con altri sistemi<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Struttura e accessibilità<\u002Fdiv><div class=\"req-d\">L'API aperta di Exerp è progettata per integrazioni veloci e affidabili. Supporta l'integrazione con terminali di carte di credito e sistemi esterni.<br>INTEGRATION READY<br>L'integrazione è uno dei principali punti di forza di Exerp e uno dei motivi per cui la piattaforma è ampiamente adottata dagli operatori del settore fitness a livello globale.<br>Exerp offre un framework API robusto e aperto che supporta l'integrazione con sistemi ERP, piattaforme di training, applicazioni di terze parti, fornitori di servizi di pagamento, siti web e un più ampio ecosistema digitale. La piattaforma supporta flussi di dati sia push che pull, consentendo la sincronizzazione in tempo reale e la coerenza operativa tra i sistemi connessi.<br>Exerp si integra con una vasta gamma di tecnologie per il fitness e il benessere, tra cui Technogym, Wellhub, Wexer, Les Mills e GoXPro, oltre a piattaforme ERP e BI come Microsoft Dynamics, SAP, Power BI e Tableau.<br>Un esempio particolarmente significativo è la consolidata collaborazione tra Exerp e Technogym. Exerp era precedentemente di proprietà di Technogym, il che ha contribuito a plasmare una profonda conoscenza degli ecosistemi di fitness connessi e delle operazioni di benessere aziendale. Questa storia ha contribuito alle mature capacità di integrazione che esistono oggi tra Exerp e le principali tecnologie per il fitness.<br>La piattaforma è progettata per fungere da livello operativo centrale, consentendo agli operatori di connettere soluzioni specialistiche mantenendo al contempo un'unica fonte di verità per i dati relativi a soci, fatturazione, prenotazioni e operazioni.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_030<\u002Fspan><span class=\"req-t\">Aggiornamento informazioni database<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Struttura e accessibilità<\u002Fdiv><div class=\"req-d\">Fornisce accesso a dati centralizzati e strutturati in tempo reale. Dashboard con insight in tempo reale<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_031<\u002Fspan><span class=\"req-t\">Finance &amp; Payments online<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Struttura e accessibilità<\u002Fdiv><div class=\"req-d\">Exerp opera con un'architettura di pagamento indipendente dal gateway e non richiede agli operatori di utilizzare una banca acquirente o un fornitore di servizi di pagamento proprietario.<br>La piattaforma è progettata per integrarsi con gateway di pagamento di terze parti, acquirenti e sistemi bancari aziendali tramite API e integrazioni native, consentendo agli operatori di mantenere gli accordi commerciali e le relazioni con i commercianti esistenti, ove lo desiderino.<br>Exerp supporta già le integrazioni con i principali fornitori globali come Stripe e Adyen, oltre a fornitori di servizi di pagamento locali e regionali in diversi territori, tra cui l'Italia. Questa flessibilità è importante per gli operatori aziendali che necessitano di localizzazione, rapporti bancari preferenziali o funzionalità di elaborazione specifiche per territorio.<br>La piattaforma supporta anche approcci di integrazione diretta per la fatturazione ricorrente, i pagamenti con carta, gli schemi di addebito diretto e flussi di lavoro finanziari più ampi, a seconda delle esigenze operative e bancarie del cliente.<br>Sebbene Exerp offra le proprie funzionalità di pagamento e possa supportare discussioni commerciali su tariffe di elaborazione competitive, i clienti aziendali non sono obbligati a un modello di fornitore di servizi di pagamento specifico. L'obiettivo è fornire flessibilità, adeguatezza operativa e il miglior risultato commerciale per l'operatore.<br>Tutti i flussi di pagamento rimangono strettamente integrati nella piattaforma Exerp, garantendo che transazioni, riconciliazione, reportistica, stato di fatturazione e percorsi degli utenti rimangano connessi indipendentemente dal gateway o dalla configurazione di acquisizione scelti.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_032<\u002Fspan><span class=\"req-t\">Finance &amp; Payments offline<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Struttura e accessibilità<\u002Fdiv><div class=\"req-d\">Exerp supporta funzionalità di esportazione di pagamenti strutturati e l'integrazione con sistemi bancari e di clearing house in diversi territori.<br>La piattaforma supporta l'esportazione dei flussi di pagamento in formati bancari standard, incluse strutture basate su XML allineate ai framework ISO 20022, ove richiesto per operazioni bancarie e di addebito diretto.<br>Exerp supporta anche processi di fatturazione basati su mandati per abbonamenti e pagamenti ricorrenti, inclusi flussi di lavoro collegati a mandati acquisiti tramite processi offline e digitali, a seconda del fornitore di servizi di pagamento e della configurazione bancaria locale.<br>La piattaforma si integra già con un'ampia gamma di sistemi interbancari e di addebito diretto a livello globale, inclusi framework basati su SEPA e integrazioni bancarie locali. Ciò offre flessibilità agli operatori aziendali che necessitano di allineamento con gli standard bancari regionali e i processi di gestione dei dati dei debitori.<br>L'architettura di integrazione aperta di Exerp consente inoltre la collaborazione con partner bancari e fornitori di servizi finanziari terzi per supportare i requisiti locali di conformità e di elaborazione dei pagamenti, ove necessario.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_038<\u002Fspan><span class=\"req-t\">Relazione dati<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Struttura e accessibilità<\u002Fdiv><div class=\"req-d\">Transazioni, prodotti e record degli utenti sono tutti collegati tramite un modello di dati relazionale strutturato che utilizza identificatori di sistema univoci.<br>Questo crea una chiara relazione tra:<br>Profilo utente<br>Prodotto o servizio acquistato<br>Contratto o abbonamento<br>Cronologia dei pagamenti e delle transazioni<br>La struttura supporta la creazione di report accurati, l'audit, le integrazioni e la visibilità operativa in tempo reale, mantenendo al contempo un'unica fonte di verità in tutto il sistema.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_039<\u002Fspan><span class=\"req-t\">Ambiente di Test e Simulazione<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Struttura e accessibilità<\u002Fdiv><div class=\"req-d\">Verranno messi a disposizione uno o più ambienti Sandbox e  test indipendenti e modellati sull'architettura di produzione . Questo ecosistema isolato permetterà di testare nuove configurazioni e scenari in totale sicurezza prima del deploy finale. Orange Palestre Italiane manterrà il controllo autonomo sul ciclo di vita degli ambienti, decidendo quando effettuare l'aggiornamento dei dati tramite snapshot della produzione<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_040<\u002Fspan><span class=\"req-t\">Gestione Insoluti mancato pagamento<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Si tratta di un'area operativa fondamentale per molti operatori HVLC di Exerp, come anche Orange Palestre Italiane. Il sistema è progettato per gestire automaticamente l'intero processo e occuparsi degli aspetti operativi più complessi.<br>Exerp rileva automaticamente i pagamenti ricorrenti non andati a buon fine o mancati, sia per i pagamenti con carta che per i flussi di fatturazione SEPA o di addebito diretto. Sulla base di regole aziendali configurabili, il sistema può quindi:<br>Sospendere o bloccare l'accesso dei soci<br>Applicare commissioni amministrative o per mancato pagamento<br>Attivare flussi di comunicazione con i soci<br>Gestire la logica di riprova e recupero<br>La logica di controllo opera a livello di rata: ciò consente di applicare in modo reiterato le penali e i provvedimenti di sospensione dell'accesso su più mensilità insolute, anche per il medesimo socio, qualora i requisiti di morosità lo richiedano. <br>L'integrazione totale tra controllo accessi, fatturazione e stato contrattuale garantisce un allineamento dei dati in tempo reale. Se un utente regolarizza la propria posizione debitoria o aggiorna i dati di pagamento, il sistema sblocca immediatamente l'anagrafica e ripristina i relativi diritti di accesso. <br>Questa automazione è particolarmente importante per i modelli ad alto volume e a basso costo, dove l'efficienza operativa, la bassa dipendenza dal personale e la gestione degli accessi in tempo reale sono essenziali per l'azienda.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_043<\u002Fspan><span class=\"req-t\">Loyality e programma referral (\"es. Presenta un Amico)<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Le campagne di referral e di invito di nuovi membri possono essere configurate utilizzando regole aziendali automatizzate e incentivi basati su trigger per supportare le strategie di acquisizione e fidelizzazione.<br>Campagne come \"Invita un amico\" possono premiare i membri al verificarsi di determinate azioni, ad esempio:<br>Un potenziale cliente invitato si registra<br>Acquista un abbonamento<br>Effettua un pagamento con successo<br>Raggiunge un traguardo o una soglia di attività<br>I premi possono includere sconti, credito nel portafoglio virtuale, servizi gratuiti, offerte promozionali o altri incentivi configurati.<\u002Fdiv><\u002Fdiv><\u002Fdiv><p>La piattaforma proposta da Exerp risulta essere una soluzione molto solida e aderente ai requisiti Must Have mappati.<\u002Fp><p>La piattaforma gestisce in modo completo le logiche operative richieste da Orange Palestre Italiane: dal calcolo automatico del pro-rata pre/post 15 del mese (combinato con la rata successiva), fino all'applicazione delle penali in caso di disdetta anticipata. Sull'aspetto del Gateway Agnostic, Exerp soddisfa pienamente l'esigenza di Orange Palestre Italiane di essere libero nella scelta del Merchant Account (oltre ad avere già delle partnership già instaurate con Adyene e Stripe) e garantisce la generazione dei flussi offline XML ISO 20022 per l'allineamento bancario SEPA.<\u002Fp><p>Inoltre, offre protocolli già integrati con partner leader (come Gantner e Nayax) per la completa automazione degli accessi, delle docce e degli acquisti fisici sui distributori automatici (Vending).<\u002Fp><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>28 requisiti · 28 soddisfatti<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h4 id=\"s18\" class=\"sec lvl3\"><span class=\"sec-t\">5.3.2. Analisi Requisiti Funzionali - Nice to Have<\u002Fspan><\u002Fh4><div class=\"reqlist\"><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_001<\u002Fspan><span class=\"req-t\">Dashboard<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Analisi Dati e BI<\u002Fdiv><div class=\"req-d\">PerfectGym Next supporta nativamente una visualizzazione completa dei dati tramite il suo modulo di reporting integrato, offrendo grafici, tabelle e dashboard per metriche chiave come churn, vendite e presenze. Inoltre, i clienti ottengono l'accesso a un data warehouse Amazon Redshift integrato, che consente una connessione senza soluzione di continuità con gli strumenti di BI preferiti come Power BI, Looker o Tableau.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_002<\u002Fspan><span class=\"req-t\">Export dati<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Analisi Dati e BI<\u002Fdiv><div class=\"req-d\">La piattaforma offre funzionalità complete di esportazione dati, consentendo agli utenti di esportare report operativi direttamente dall'interfaccia utente in formato CSV, XLS e PDF.  Risultano pienamente supportate anche le esportazioni XML per le esecuzioni di riscossione dei pagamenti (SEPA XML ISO 20022) e qualsiasi set di dati strutturato può essere esportato senza problemi tramite la nostra robusta API.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_007<\u002Fspan><span class=\"req-t\">Registro attività di pre-vendita<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione anagrafica e prime iterazioni con il cliente<\u002Fdiv><div class=\"req-d\">PerfectGym Next è dotato di un modulo dedicato per gestire tutte le interazioni dal momento in cui un potenziale cliente mostra interesse fino alla firma del contratto. Il modulo Lead &amp; Sales registra ogni interazione pre-vendita (visite, chiamate, esiti delle prove e follow-up) associata al record del potenziale cliente, con responsabili assegnabili e una cronologia completa delle attività.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_011<\u002Fspan><span class=\"req-t\">Conversione prova in abbonamento<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">PerfectGym Next supporta nativamente le prove gratuite di 7 giorni come abbonamenti indipendenti, con conversione automatica in contratti ricorrenti al termine del periodo di prova. Inoltre, il personale può convertire manualmente le prove gratuite in anticipo direttamente dal profilo dell'utente.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_019<\u002Fspan><span class=\"req-t\">Automazione comunicazioni<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Il Centro Comunicazione automatizza l'invio di email e SMS ai membri per eventi come compleanni, rinnovi, pagamenti mancati e promemoria delle lezioni. Stanno sviluppando attivamente la messaggistica condizionale per consentire contenuti personalizzati, come email di benvenuto specifiche per livello. Si prega di notare che la messaggistica automatica per il personale non è attualmente disponibile.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_020<\u002Fspan><span class=\"req-t\">Personalizzazione delle comunicazioni<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Il Communication Center consente l'utilizzo di modelli HTML completamente personalizzabili per ogni trigger, garantendo che contenuti altamente personalizzati e contestualmente rilevanti vengano inviati automaticamente in base all'evento specifico.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_024<\u002Fspan><span class=\"req-t\">Gestione Palinsesto Corsi<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">GYM Experience<\u002Fdiv><div class=\"req-d\">PerfectGym Next offre una gestione completa degli orari dei corsi, consentendo agli amministratori di configurare categorie, descrizioni, immagini, sale, istruttori e capacità a livello centrale o locale per ogni club. La piattaforma dispone di  funzionalità avanzate di modifica — configurabili per istruttore, intervallo temporale o sede — volte a semplificare la gestione simultanea di più corsi.  I flussi di lavoro per gli istruttori supplenti sono supportati nativamente. Inoltre, i promemoria automatici e i messaggi ad hoc ai partecipanti ai corsi assicurano che i membri rimangano informati, riducendo il tasso di assenze.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_025<\u002Fspan><span class=\"req-t\">Gestione delle prenotazioni<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">GYM Experience<\u002Fdiv><div class=\"req-d\">I soci possono prenotare e cancellare le lezioni tramite app, web e in club. Quando una lezione è al completo, i soci vengono inseriti in una lista d'attesa in ordine di arrivo; la promozione al roster è automatica quando si libera un posto, con notifica al socio.<\u002Fdiv><\u002Fdiv><\u002Fdiv><p>Exerp dimostra un’ottima copertura dei requisiti funzionali Nice to Have. Sull'analisi dati e della Business Intelligence, Exerp offre funzionalità di reporting per monitorare metriche come il tasso di abbandono, i ricavi e le vendite per operatore. I dati possono essere esportati automaticamente in formati standard (CSV, XLSX, PDF) e la piattaforma si integra nativamente con i principali strumenti di BI, come Power BI e Tableau, per la creazione di dashboard visive in tempo reale.<\u002Fp><p>Per quanto riguarda l'area vendite e la gestione dei lead, lo strumento permette di tracciare l'intera cronologia delle interazioni pre-vendita (visite guidate, telefonate, esiti dei test) e la conversione delle prove gratuite di 7 giorni. Infine, le marketing automation consentono di inviare messaggi completamente personalizzati (via Email, SMS o notifiche Push) basati su trigger specifici (come compleanni, prenotazioni o onboarding).<\u002Fp><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>8 requisiti · 8 soddisfatti<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h4 id=\"s19\" class=\"sec lvl3\"><span class=\"sec-t\">5.3.3. Analisi Requisiti Tecnici - Must Have<\u002Fspan><\u002Fh4><div class=\"reqlist\"><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_033<\u002Fspan><span class=\"req-t\">Cloud Native &amp; SaaS<\u002Fspan><span class=\"badge partial\">Parziale<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Architettura e Integrazione<\u002Fdiv><div class=\"req-d\">Exerp Go è un'interfaccia web che offre tutte le funzionalità necessarie per la gestione delle attività del club.<br>Exerp Core (super amministratore) è un'applicazione desktop che richiede una piccola installazione locale, ma a cui è possibile accedere senza bisogno di una VPN o di una connessione desktop remoto. L'applicazione Core include tutte le funzionalità di back-office, quali la configurazione e il supporto bancario.<br>Tradotto con DeepL.com (versione gratuita)<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_034<\u002Fspan><span class=\"req-t\">Webhooks<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Architettura e Integrazione<\u002Fdiv><div class=\"req-d\">Le capacità di integrazione includono 'Integration Hooks', messaggi push ed eventi automatizzati<br>Exerp supporta le integrazioni webhook per notifiche in tempo reale di eventi e modifiche dei dati su tutta la piattaforma.<br>I webhook possono essere configurati per notificare i sistemi connessi quando si verificano eventi definiti, come modifiche dello stato di iscrizione, pagamenti completati, aggiornamenti delle prenotazioni, cancellazioni, modifiche degli accordi o check-in dei membri.<br>Questo consente a piattaforme di terze parti, siti web, sistemi CRM e strumenti operativi di ricevere e reagire agli aggiornamenti in tempo reale, supportando flussi di lavoro più connessi e automatizzati.<br>Il framework webhook fa parte della più ampia architettura API aperta di Exerp, consentendo agli operatori aziendali di creare integrazioni scalabili mantenendo la coerenza dei dati in tempo reale tra i sistemi.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_035<\u002Fspan><span class=\"req-t\">API<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Architettura e Integrazione<\u002Fdiv><div class=\"req-d\">Exerp offre un solido framework API RESTful che supporta l'accesso in tempo reale sia in lettura che in scrittura ai dati principali della piattaforma.<br>Le API possono essere utilizzate per recuperare, creare e aggiornare dati quali profili degli utenti, contratti, abbonamenti, prenotazioni, pagamenti, presenze e stato di fatturazione.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_036<\u002Fspan><span class=\"req-t\">Secure Authentication<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Sicurezza e Dati<\u002Fdiv><div class=\"req-d\">Mette a disposizione l'autenticazione Exerp e soluzioni come Auth0 . Sicurezza del sistema solida e affidabile<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_037<\u002Fspan><span class=\"req-t\">Token Lifecycle<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Sicurezza e Dati<\u002Fdiv><div class=\"req-d\">Gestisce l'autenticazione e il controllo degli accessi . Sicurezza garantita da processi consolidati<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_042<\u002Fspan><span class=\"req-t\">Presenza sul territorio italiano, Formazione e Supporto Post Go-Live<\u002Fspan><span class=\"badge partial\">Parziale<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Supporto tecnico e adozione<\u002Fdiv><div class=\"req-d\">Exerp vanta un tasso di successo del 100% nelle implementazioni aziendali a livello globale, supportando alcuni dei più grandi operatori del settore fitness e benessere sul mercato.<br>Exerp è presente sul mercato italiano da diversi anni e supporta già operatori nella regione, tra cui Virgin Active Italia. Di conseguenza, il lancio di Orange Palestre Italiane non rappresenterebbe una sfida dal punto di vista della localizzazione, dell'impianto operativo o dell'assistenza.<br>Il supporto per l'adozione e il rollout viene gestito attraverso un approccio strutturato di implementazione e customer success, progettato specificamente per gli operatori del settore fitness di grandi dimensioni. Questo include:<br>Supporto dedicato all'implementazione<br>Programmi di formazione e sessioni di formazione per formatori<br>Guida operativa durante la transizione<br>Assistenza e supporto post-lancio<br>Gestione continua dell'assistenza tecnica e del customer success<br>Exerp opera con team di delivery e supporto globali, affiancati da specialisti di implementazione esperti, con familiarità con le operazioni di fitness multisito e i requisiti del mercato europeo.<br>La piattaforma ha una vasta esperienza nel supporto di implementazioni e migrazioni su larga scala, inclusi marchi operanti in più paesi, con diversi modelli di business e strutture operative. Questo permette a Orange Palestre Italiane di beneficiare di processi di implementazione collaudati, strutture di supporto consolidate e best practice acquisite da operatori aziendali già attivi sulla piattaforma.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_044<\u002Fspan><span class=\"req-t\">Certificazione ISO 27001<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Sicurezza e Dati<\u002Fdiv><div class=\"req-d\">sono SOC compliant e in possesso della certificazione ISO27001<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_045<\u002Fspan><span class=\"req-t\">Disaster recovery<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Sicurezza e Dati<\u002Fdiv><div class=\"req-d\">sono SOC compliant e hanno superato i test annuali di penetrazione del sistema in linea con gli standard enterprise practice. Consigliano al cliente di  sottoscrivere la propria assicurazione contro la responsabilità civile in materia di sicurezza informatica. Il data warehouse di Exerp garantisce accesso sicuro a dati centralizzati con replicazione continua dalla produzione.<br>- Recovery Time Objective (RTO) - Exerp prevede per un disastro localizzato o casistiche di perdita dati di 24 ore. In caso di disastro globale dell'infrastruttura, il tempo stimato sale a oltre 3 giorni;<br>- Ridondanza Geografica e Compliance: in caso di data breach, Exerp rispetta le normative GDPR e  l'architettura è progettata per essere \"multi-region\" e distribuita su diverse \"Availability Zones\" per minimizzare l'impatto di disastri regionali;<br>- Trasparenza del Failover: Le procedure di ripristino e il failover sono supervisionate internamente dal Major Incident Management, che utilizza strumenti di automazione in grado di effettuare il deployment aggirando le zone AWS compromesse;<br>- Audit e Verifiche: Exerp effettua test di Disaster Recovery su base annuale (almeno una volta all'anno).<\u002Fdiv><\u002Fdiv><\u002Fdiv><p>Dal punto di vista dell'architettura di base, Exerp conferma un'infrastruttura solida, tuttavia emerge che il requisito Cloud Native &amp; SaaS non è completamente soddisfatto: sebbene l'interfaccia operativa Exerp Go sia web-based, il modulo Exerp Core per i super amministratori (attività di configurazione, automatismi, attività finanziarie, ecc.) richiede ancora un'installazione locale desktop su sistemi Windows.<\u002Fp><p>In merito alla presenza sul territorio italiano, il fornitore soddisfa il requisito solo parzialmente in quanto non certifica una filiale diretta in Italia, vincolando l'onboarding, la formazione dello staff e l'assistenza in lingua inglese e da remoto ma vanta già un'esperienza nel mercato italiano con una realtà comparabile a quella di Orange Palestre Italiane.<\u002Fp><p>D’altra parte, il sistema fornisce un framework API RESTful aperto per chiamate in tempo reale e garantisce standard elevati di sicurezza, essendo SOC compliant e in possesso della certificazione ISO 27001. <\u002Fp><p>Tuttavia, si segnalano parametri di ripristino (RTO) differenziati in base alla criticità dell'evento: fino a 24 ore per disastri localizzati e oltre 3 giorni in caso di eventi su scala globale. Data la natura di tali tempistiche, il fornitore raccomanda esplicitamente al cliente la sottoscrizione di una polizza assicurativa dedicata per la responsabilità civile in ambito cyber. <\u002Fp><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>8 requisiti · 5 soddisfatti · 3 parziali<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h4 id=\"s20\" class=\"sec lvl3\"><span class=\"sec-t\">5.3.4. Analisi Requisiti Tecnici - Nice to Have<\u002Fspan><\u002Fh4><div class=\"reqlist\"><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_041<\u002Fspan><span class=\"req-t\">Assistenza H24 con escalation prioritaria per area Finance &amp; Amministrazione<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Supporto tecnico e adozione<\u002Fdiv><div class=\"req-d\">Exerp opera con un modello di supporto globale con copertura 24 ore su 24, 7 giorni su 7 per i problemi critici di produzione, supportato da team regionali in Europa, Stati Uniti, India e Australia.<br>Il supporto è gestito tramite un framework SLA strutturato con livelli di priorità da P1 a P4, garantendo che i problemi vengano gestiti in base all'impatto operativo e alla gravità.<br>Esempi includono:<br>P1 incidenti critici con impatto sul business come interruzioni del gateway di pagamento, errori di fatturazione o interruzioni diffuse dell'accesso<br>P2 degrado operativo significativo che influisce sui flussi di lavoro chiave<br>P3 problemi operativi standard con disponibilità di soluzioni alternative<br>P4 richieste a priorità inferiore, miglioramenti o difetti non critici<br>Questo è particolarmente importante per le operazioni amministrative e finanziarie, dove la fatturazione in tempo reale e la continuità dei pagamenti sono essenziali. Exerp supporta gli operatori aziendali con monitoraggio automatizzato, processi di escalation e gestione dell'assistenza dedicata per aree quali:<br>Comunicazione con il gateway di pagamento non riuscita o interrotta<br>Problemi di fatturazione per il rinnovo automatico<br>Gestione di arretrati e penali<br>Generazione di contratti e rate<br>Controllo degli accessi collegato allo stato di fatturazione<br>La piattaforma è progettata per operare ininterrottamente in ambienti multi-sede e multi-territorio, con chiare procedure di responsabilità e di escalation definite dagli SLA per ridurre al minimo le interruzioni e garantire la continuità operativa.<\u002Fdiv><\u002Fdiv><\u002Fdiv><p>Exerp adotta un modello di supporto globale 24/7 basato su un framework SLA strutturato in quattro livelli di gravità (da P1 a P4). Le interruzioni del gateway di pagamento, gli errori di fatturazione e le problematiche legate ai rinnovi automatici vengono trattati come incidenti critici P1 (priorità massima), assicurando un intervento tempestivo gestito da team regionali per garantire la continuità operativa senza interruzioni. Anche in questo caso si parla di un supporto di secondo livello che implica che Orange Palestre Italiane dovrà definire una struttura interna di primo livello, individuando key user o figure di riferimento incaricate della raccolta, qualificazione e gestione preliminare delle richieste di assistenza prima dell'escalation verso il fornitore.<\u002Fp><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>1 requisiti · 1 parziali<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h3 id=\"s21\" class=\"sec lvl2\"><span class=\"sec-t\">5.4. Showcloud (Showclub)<\u002Fspan><\u002Fh3><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>Piattaforma flessibile, italo-albanese: unico provider a offrire supporto di 1° livello e DR fino a RTO/RPO 1h. ISO 27001 in corso.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h4 id=\"s22\" class=\"sec lvl3\"><span class=\"sec-t\">5.4.1. Analisi Requisiti Funzionali - Must Have<\u002Fspan><\u002Fh4><div class=\"reqlist\"><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_003<\u002Fspan><span class=\"req-t\">Documentazione a supporto<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Documentazione<\u002Fdiv><div class=\"req-d\">ShowCloud fornisce una dettagliata \"Documentazione Utente 2.0\" accessibile online per orientare costantemente lo staff all'uso della piattaforma.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_004<\u002Fspan><span class=\"req-t\">Inserimento dati e documenti e archiviazione<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione anagrafica e prime iterazioni con il cliente<\u002Fdiv><div class=\"req-d\">La Scheda Anagrafica e il tab Documenti permettono il caricamento e l'archiviazione automatica di foto, consensi privacy, contratti firmati in PDF, referti (BIA) e certificati medici.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_005<\u002Fspan><span class=\"req-t\">Ricerca rapida<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione anagrafica e prime iterazioni con il cliente<\u002Fdiv><div class=\"req-d\">Funzionalità di ricerca avanzata presente<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_006<\u002Fspan><span class=\"req-t\">Pianificazione e gestione degli appuntamenti<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione anagrafica e prime iterazioni con il cliente<\u002Fdiv><div class=\"req-d\">Fornisce la possibilità di creare, pianificare, modificare e cancellare le attività (es. tour palestra) e assegnarlo ai membri dello staff.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_008<\u002Fspan><span class=\"req-t\">Categorizzazione cliente<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione anagrafica e prime iterazioni con il cliente<\u002Fdiv><div class=\"req-d\">Il sistema prevede la categorizzazione per \"Tipo Anagrafica\" (Cliente, Lead, Contatto) e \"Relazione\" (Attivo, Disattivo, In attesa). Dispone inoltre di classificazioni automatiche basate sulla frequenza degli accessi (es. Eccellente, Buono, Nessuna entrata).<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_009<\u002Fspan><span class=\"req-t\">Gestione catalogo<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Consente la configurazione e vendita di diverse tipologie di abbonamento (es. a tempo, pacchetti a ingressi e servizi singoli, mensili, annuali, ecc.) associandoli all'anagrafica del cliente sia in reception sia tramite App.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_010<\u002Fspan><span class=\"req-t\">Catalogo dinamico<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Consente la configurazione dei cataloghi dinamici sia a livello di utente che di club. Inoltre, è possibile anche configurare sconti dinamici.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_012<\u002Fspan><span class=\"req-t\">Disdetta prova<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">il sistema prevede la possibilità di disdetta della prova<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_013<\u002Fspan><span class=\"req-t\">Calcolo automatico pro rata post 15 del mese<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Consente la configurazione di diverse tipologie di abbonamento e supporta il calcolo pro-rata con giorno di cut-off configurabile. Se l'acquisto avviene dopo il cut-off (es. 15 del mese), il primo pagamento copre i giorni rimanenti e si somma al mese successivo intero a prezzo pieno.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_014<\u002Fspan><span class=\"req-t\">Calcolo automatico pro rata prima del 15 del mese<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Consente la configurazione di diverse tipologie di abbonamento e supporta il calcolo automatico in proporzione ai soli giorni residui del mese in corso se la vendita avviene prima o nel giorno stesso del cut-off (es. prima del 15 del mese).<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_015<\u002Fspan><span class=\"req-t\">Conversione automatica abbonamento pro rata<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Consente la configurazione di diverse tipologie di abbonamento, il quale viene registrato inizialmente in stato \"pro rata\" e, alla successiva data di addebito o rinnovo, si allinea convertendosi al normale prezzo del piano.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_016<\u002Fspan><span class=\"req-t\">Rinnovo automatico dell'abbonamento<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Il sistema consente il rinnovo automatico di uno stesso abbonamento tramite l'opzione \"Abbonamento ricorrente / tacito rinnovo\" che genera automaticamente gli accordi ricorrenti, la continuità del piano e i relativi addebiti.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_017<\u002Fspan><span class=\"req-t\">Sospensioni abbonamento<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Il sistema consente la sospensione dell'abbonamento per la durata di un mese e il cliente può visualizzare o richiedere le sospensioni direttamente tramite App.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_018<\u002Fspan><span class=\"req-t\">Disdetta abbonamento<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Consente la disdetta dell'abbonamento e l'eventuale generazione della quota da pagare.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_021<\u002Fspan><span class=\"req-t\">Verifica real-time accesso alla struttura<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">GYM Experience<\u002Fdiv><div class=\"req-d\">Il sistema consente la possibilità di blocco/sblocco dei tornelli in tempo reale in funzione delle informazioni dell'utente (es. rate scadute, la validità del titolo, il certificato medico sportivo, lo stato d'iscrizione e le eventuali sospensioni).<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_022<\u002Fspan><span class=\"req-t\">Autonomia utilizzo servizi<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">GYM Experience<\u002Fdiv><div class=\"req-d\">Supporta l'integrazione per l'attivazione di armadietti, docce, ecc.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_023<\u002Fspan><span class=\"req-t\">Integrazione Vending<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">GYM Experience<\u002Fdiv><div class=\"req-d\">Supporta l'integrazione per l'acquisto di prodotti dai distributori mediante credito sul borsellino<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_026<\u002Fspan><span class=\"req-t\">Prenotazione altri servizi (es. visita medica)<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">GYM Experience<\u002Fdiv><div class=\"req-d\">Disponibile la funzionalità di prenotazione dei servizi (chiamati nella documentazione \"Appuntamenti 1:1\" per visite o PT, collegabili a risorse/stanze) e pagamento degli stessi mediante logiche a debito, o pagando all'atto della prenotazione.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_027<\u002Fspan><span class=\"req-t\">Gestione Multi-Tenant<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Struttura e accessibilità<\u002Fdiv><div class=\"req-d\">Prevede la configurazione multi club o multi ragione sociale (es. è possibile limitare la visibilità di un operatore tramite le restrizioni \"Solo la mia sede\").<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_028<\u002Fspan><span class=\"req-t\">Permessi account<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Struttura e accessibilità<\u002Fdiv><div class=\"req-d\">Mediante un profilo di super admin, consente di fare azioni su club e utenti. Adotta un modello basato su ruoli principali (es. Direzione, Reception, Trainer, commerciale) espandibile tramite limitazioni e permessi diretti centralizzati, fruibili da un unico account utente.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_029<\u002Fspan><span class=\"req-t\">Integrazione con altri sistemi<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Struttura e accessibilità<\u002Fdiv><div class=\"req-d\">il sistema prevede nativamente l'integrazione con piattaforme terze, quali sistemi di pagamento (Stripe), welfare e check-in (Gympass/Wellhub), fatturazione elettronica (Fatture in Cloud, Agyo), misurazioni hardware (Rebeat, InBody) e piattaforme di marketing (Mailchimp, WordPress).<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_030<\u002Fspan><span class=\"req-t\">Aggiornamento informazioni database<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Struttura e accessibilità<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_031<\u002Fspan><span class=\"req-t\">Finance &amp; Payments online<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Struttura e accessibilità<\u002Fdiv><div class=\"req-d\">Il sistema è gateway agnostic (usato stripe principalmente con altri clienti).<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_032<\u002Fspan><span class=\"req-t\">Finance &amp; Payments offline<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Struttura e accessibilità<\u002Fdiv><div class=\"req-d\">il sistema permette la generazione del file XML per i pagamenti SEPAS<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_038<\u002Fspan><span class=\"req-t\">Relazione dati<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Struttura e accessibilità<\u002Fdiv><div class=\"req-d\">La base di dati opera attraverso logiche relazionali; gli ordini/pagamenti si congiungono sempre (attraverso l'uso di Foreign Key/ID univoco) sia al profilo o anagrafica utente, sia ai cataloghi dei servizi/abbonamenti.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_039<\u002Fspan><span class=\"req-t\">Ambiente di Test e Simulazione<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Struttura e accessibilità<\u002Fdiv><div class=\"req-d\">È possibile fornire l'ambiente di Sandbox per effettuare test ma sostenendo un eventuale costo di licenza.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_040<\u002Fspan><span class=\"req-t\">Gestione Insoluti mancato pagamento<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Il gestionale rileva automaticamente gli insoluti nei pagamenti periodici e applica in automatico il blocco degli accessi ai tornelli in caso di pagamenti non in regola e l'eventuale applicazione di addebiti.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_043<\u002Fspan><span class=\"req-t\">Loyalty e programma referral (\"es. Presenta un Amico)<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">L'articolato sistema di \"Gamification\" permette di impostare in modo automatico premi e benefit; i clienti possono, ad esempio, vedersi erogato un premio per azioni compiute (acquisizione di Referral) da convertire in credito o servizi da un catalogo riscatti.<\u002Fdiv><\u002Fdiv><\u002Fdiv><p>ShowCloud si dimostra una piattaforma flessibile e molto allineata alle esigenze operative di Orange Palestre Italiane. <\u002Fp><p>Soddisfa i requisiti Must Have legati all'operatività dei club e dei flussi finanziari come: gestisce correttamente il calcolo del pro-rata basato sul cut-off del 15 del mese, la penale automatica di disdetta, garantisce massima flessibilità nella scelta del Merchant Account e garantisce la generazione dei flussi offline XML ISO 20022 per l'allineamento bancario SEPA.<\u002Fp><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>28 requisiti · 28 soddisfatti<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h4 id=\"s23\" class=\"sec lvl3\"><span class=\"sec-t\">5.4.2. Analisi Requisiti Funzionali - Nice to Have<\u002Fspan><\u002Fh4><div class=\"reqlist\"><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_001<\u002Fspan><span class=\"req-t\">Dashboard<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Analisi Dati e BI<\u002Fdiv><div class=\"req-d\">Presente modulo BI con possibilità di personalizzare delle dashboard per la visualizzazione dei dati come KPI, incassato, ecc.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_002<\u002Fspan><span class=\"req-t\">Export dati<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Analisi Dati e BI<\u002Fdiv><div class=\"req-d\">Consente la possibilità di esportare dati in formati es. XLM, CSV e XMLS.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_007<\u002Fspan><span class=\"req-t\">Registro attività di pre-vendita<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione anagrafica e prime iterazioni con il cliente<\u002Fdiv><div class=\"req-d\">Presente la funzionalità di tracciamento e gestione della attività pre-vendita, registrando note, esiti di chiamate, referral e programmando in automatico i successivi follow-up. In più prevede anche una sezione per la gestione del nucleo familiare per i minorenni.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_011<\u002Fspan><span class=\"req-t\">Conversione prova in abbonamento<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Consente la conversione dell'abbonamento prova nell'abbonamento mensile.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_019<\u002Fspan><span class=\"req-t\">Automazione comunicazioni<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Il modulo Automazioni esegue l'invio automatico di Email, SMS o Push Notification verso segmenti di pubblico scatenati, trigger (es. scadenze) o eventi automatici ricorrenti.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_020<\u002Fspan><span class=\"req-t\">Personalizzazione delle comunicazioni<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Consente la personalizzazione dei contenuti delle comunicazioni e integra placeholder e variabili dinamiche per l'inserimento automatico dei dati del destinatario (es. nome del cliente, scadenze contrattuali o informazioni commerciali mirate).<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_024<\u002Fspan><span class=\"req-t\">Gestione Palinsesto Corsi<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">GYM Experience<\u002Fdiv><div class=\"req-d\">Consente la creazione e gestione dei corsi nei club indicando l'istruttore, lo spazio (es. sala), gli orari e la capienza massima.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_025<\u002Fspan><span class=\"req-t\">Gestione delle prenotazioni<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">GYM Experience<\u002Fdiv><div class=\"req-d\">Funzionalità di prenotazione e cancellazione dei corsi supportata. I clienti gestiscono autonomamente le loro prenotazioni dall'app e in caso di esaurimento posti subentra una \"Lista d'attesa\" ordinata cronologicamente, che in caso di cancellazioni scala offrendo automaticamente il posto al primo utente idoneo. Inoltre, è presente anche la possibilità di assegnare le penalità per gli utenti che prenotano ma non si presentano.<\u002Fdiv><\u002Fdiv><\u002Fdiv><p>Showcloud dimostra un’ottima copertura dei requisiti funzionali Nice to Have soddisfacendo tutte le voci valutate e dimostrando un'ottima flessibilità operativa. <\u002Fp><p>Per le analisi dei dati, ShowCloud offre un modulo dedicato che consente di personalizzare le dashboard per visualizzare KPI strategici e supporta l'esportazione autonoma dei dati in formati standard come CSV, XML e XLSX. <\u002Fp><p>Per quanto riguarda la prevendita e la gestione dei lead, il software traccia le interazioni di prevendita e si distingue per l'inclusione di una specifica sezione per la gestione dei nuclei familiari (utile per gestire gli abbonamenti dei minorenni). Inoltre, gestisce in modo completo il palinsesto corsi, permettendo di configurare sale, istruttori e liste d'attesa. <\u002Fp><p>Infine, per le comunicazioni di marketing, il sistema invia in automatico Email, SMS o Notifiche Push innescate da specifici eventi o scadenze (trigger). I contenuti di queste comunicazioni sono altamente personalizzabili grazie all'uso di variabili dinamiche e placeholder, garantendo che ogni messaggio includa automaticamente le informazioni commerciali e personali del destinatario.<\u002Fp><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>8 requisiti · 8 soddisfatti<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h4 id=\"s24\" class=\"sec lvl3\"><span class=\"sec-t\">5.4.3. Analisi Requisiti Tecnici - Must Have<\u002Fspan><\u002Fh4><div class=\"reqlist\"><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_033<\u002Fspan><span class=\"req-t\">Cloud Native &amp; SaaS<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Architettura e Integrazione<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_034<\u002Fspan><span class=\"req-t\">Webhooks<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Architettura e Integrazione<\u002Fdiv><div class=\"req-d\">Il sistema può attivare alcuni comandi in funzione di trigger ricevuti real time (es. per esiti di pagamento da Stripe, aggiornamenti liste di Mailchimp, o la sincronizzazione degli accessi di Gympass).<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_035<\u002Fspan><span class=\"req-t\">API<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Architettura e Integrazione<\u002Fdiv><div class=\"req-d\">Fornisce endpoint per l'utilizzo di API per la lettura e scrittura dei dati.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_036<\u002Fspan><span class=\"req-t\">Secure Authentication<\u002Fspan><span class=\"badge partial\">Parziale<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Sicurezza e Dati<\u002Fdiv><div class=\"req-d\">È legato all'ottenimento della certificazione ISO/IEC 27001. Tale certificazione prevedere questi principi di sicurezza in fase di autenticazione.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_037<\u002Fspan><span class=\"req-t\">Token Lifecycle<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Sicurezza e Dati<\u002Fdiv><div class=\"req-d\">Showcoud utilizza WEBtoken che hanno una validità temporale: 30 gg di refresh token per il gestionale e 7 gg per l’app. Per recupero password viene fornito un link con durata temporale di 2 ore che può essere usato solo una volta.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_042<\u002Fspan><span class=\"req-t\">Presenza sul territorio italiano, Formazione e Supporto Post Go-Live<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Supporto tecnico e adozione<\u002Fdiv><div class=\"req-d\">Showcloud è un'azienda di origine italo-albanese con uffici nel territorio nazionale. Il partner di riferimento Angel1 propone un servizio di \"onboarding guidato\" e di supporto per il setup della struttura finalizzato ad accompagnare il go-live e il team operativo.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_044<\u002Fspan><span class=\"req-t\">Certificazione ISO 27001<\u002Fspan><span class=\"badge partial\">Parziale<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Sicurezza e Dati<\u002Fdiv><div class=\"req-d\">In corso processo per l'ottenimento della certificazione ISO 27001 entro la fine dell'anno<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_045<\u002Fspan><span class=\"req-t\">Disaster recovery<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Sicurezza e Dati<\u002Fdiv><div class=\"req-d\">I backup vengono eseguiti con frequenza regolare e secondo politiche di retention definite, al fine di consentire il ripristino dei dati in diversi punti temporali.<br>Le procedure di ripristino sono documentate, automatizzate e sottoposte a verifiche periodiche.<br>Il disaster recovery può essere erogato secondo i seguenti livelli:<br>Livello Base<br>RTO: fino a 24 ore<br>RPO: fino a 24 ore<br>Livello Standard<br>RTO: fino a 8 ore<br>RPO: fino a 8 ore<br>Livello Avanzato<br>RTO: fino a 4 ore<br>RPO: fino a 4 ore<br>Livello Premium<br>RTO: fino a 1 ora<br>RPO: fino a 1 ora<\u002Fdiv><\u002Fdiv><\u002Fdiv><p>ShowCloud vanta un'ottima copertura tecnica e architetturale. È una soluzione nativa in cloud pienamente accessibile via browser, supporta nativamente Webhooks in tempo reale per le notifiche ed espone gli endpoint necessari per le interrogazioni via API.<\u002Fp><p>Sul supporto locale, l'azienda italo-albanese garantisce una presenza sul territorio italiano con processi di onboarding guidato per accompagnare lo staff alla configurazione del sistema e fornisce diversi livelli di Disaster Recovery, dove l'adozione del livello \"Premium\" garantisce un eccellente livello di RTO e RPO.<\u002Fp><p>L'unico elemento di attenzione emerso riguarda la certificazione ISO 27001 in corso di ottenimento ma garantita dal fornitore entro il breve periodo.  Tale problematica non consente anche il soddisfacimento completo dell'autenticazione sicura ASVS in quanto direttamente collegata all’ottenimento della certificazione.<\u002Fp><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>8 requisiti · 6 soddisfatti · 2 parziali<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h4 id=\"s25\" class=\"sec lvl3\"><span class=\"sec-t\">5.4.4. Analisi Requisiti Tecnici - Nice to Have<\u002Fspan><\u002Fh4><div class=\"reqlist\"><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_041<
