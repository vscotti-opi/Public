\u002Fspan><span class=\"req-t\">Assistenza H24 con escalation prioritaria per area Finance &amp; Amministrazione<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Supporto tecnico e adozione<\u002Fdiv><div class=\"req-d\">Sono disponibili pacchetti di ore prepagate (minimo di 20 ore) per manutenzione, intervento e supporto. Lato operativo, le eventuali richieste vengono gestite con il seguente processo: arriva la richiesta, analizzano, sviluppano, testano con il cliente, approvano e rilasciano in produzione. Le evolutive vengono gestite mediante canale preferenziale (JIRA).<\u002Fdiv><\u002Fdiv><\u002Fdiv><p>Il fornitore soddisfa il requisito strutturando l'assistenza tecnica tramite la sottoscrizione di pacchetti di ore prepagate e gestendo un canale preferenziale dedicato (tramite JIRA) per le manutenzioni e le evolutive. Un aspetto distintivo emerso in fase di analisi è che ShowCloud è l'unica piattaforma tra quelle valutate che fornirebbe operativamente un supporto diretto di primo livello per le criticità, a differenza degli altri provider che si posizionano sul secondo livello.<\u002Fp><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>1 requisiti · 1 soddisfatti<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h3 id=\"s26\" class=\"sec lvl2\"><span class=\"sec-t\">5.5. GloFox<\u002Fspan><\u002Fh3><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>Forte su cloud e sicurezza (ISO 27001). Bocciato su gateway agnostic, XML SEPA, integrazione vending e programma referral nativo.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h4 id=\"s27\" class=\"sec lvl3\"><span class=\"sec-t\">5.5.1. Analisi Requisiti Funzionali - Must Have<\u002Fspan><\u002Fh4><div class=\"reqlist\"><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_003<\u002Fspan><span class=\"req-t\">Documentazione a supporto<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Documentazione<\u002Fdiv><div class=\"req-d\">Glofox fornisce la documentazione tecnica di supporto per le integrazioni disponibili, le API e i processi di scambio dati supportati, al fine di garantire una corretta gestione del flusso di dati tra i sistemi connessi. La documentazione viene mantenuta e aggiornata in linea con le modifiche della piattaforma e delle integrazioni, con guide operative disponibili per la configurazione, l'autenticazione, la sincronizzazione dei dati e i flussi di lavoro supportati.In presenza di integrazioni sviluppate tramite piattaforme o API esterne, il sistema garantisce la consultazione della documentazione tecnica al personale autorizzato. Per assicurare il costante allineamento dell'ecosistema digitale, Exerp notifica gli aggiornamenti di servizio e i cambi di versione attraverso canali proattivi (comunicazioni di supporto, note di rilascio, coordinamento dei partner e articoli tecnici di knowledge base). La responsabilità operativa per la configurazione delle integrazioni e la gestione continua del flusso di dati rimane accessibile tramite il portale di amministrazione e le relative impostazioni di integrazione, ove applicabile.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_004<\u002Fspan><span class=\"req-t\">Inserimento dati e documenti e archiviazione<\u002Fspan><span class=\"badge partial\">Parziale<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione anagrafica e prime iterazioni con il cliente<\u002Fdiv><div class=\"req-d\">Glofox supporta l'acquisizione e la gestione dei dati anagrafici dei clienti all'interno del profilo membro nell'ecosistema della dashboard e dell'app per i membri di Glofox. Gli utenti autorizzati possono creare e gestire i record dei membri, inclusi dati personali, recapiti, informazioni sull'iscrizione, liberatorie e dati dell'account associati. I flussi di lavoro relativi a documenti e accordi supportano la raccolta e l'archiviazione di liberatorie, termini e condizioni e accordi di iscrizione firmati digitalmente, come parte del processo di onboarding e vendita dei membri. Le immagini del profilo possono essere caricate e gestite all'interno degli account dei membri per facilitare l'identificazione e la gestione operativa. I documenti e i record firmati acquisiti tramite i flussi di lavoro supportati vengono automaticamente associati al profilo membro al termine della procedura e conservati all'interno del record della piattaforma. L'acquisizione nativa di documenti direttamente tramite periferiche dirette (scanner, webcam) o acquisizione di email in entrata, non rientra tra le funzionanlità standard della piattaforma. Tuttavia, il personale autorizzato, può caricare e gestire documenti e allegati relativi ai soci direttamente dal portale di amministrazione, all'interno dei flussi di lavoro dedicati all'anagrafica e alla contrattualistica.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_005<\u002Fspan><span class=\"req-t\">Ricerca rapida<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione anagrafica e prime iterazioni con il cliente<\u002Fdiv><div class=\"req-d\">Glofox supporta funzionalità di ricerca e filtraggio dei clienti all'interno della dashboard di Glofox per aiutare il personale a individuare e gestire in modo efficiente i dati dei membri. Gli utenti autorizzati possono cercare i clienti utilizzando diversi criteri, tra cui nome del membro, indirizzo email, stato di iscrizione, dettagli sulla scadenza dell'iscrizione, tag, attività di presenza e stato di lead o membro. La funzionalità di tagging consente la segmentazione operativa e il filtraggio dei dati dei membri a fini di reporting, comunicazione e gestione dei flussi di lavoro. Le funzionalità di gestione dei lead e di tracciamento della fonte consentono inoltre di visualizzare l'origine dei clienti, laddove configurate tramite i flussi di lavoro di vendita e gestione dei lead. Le funzioni di ricerca e filtraggio sono disponibili tramite il portale di amministrazione e le aree di reporting operativo, consentendo al personale di identificare, esaminare e gestire rapidamente i dati dei clienti in base a criteri aziendali e esigenze operative definiti.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_006<\u002Fspan><span class=\"req-t\">Pianificazione e gestione degli appuntamenti<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione anagrafica e prime iterazioni con il cliente<\u002Fdiv><div class=\"req-d\">Glofox supporta la pianificazione degli appuntamenti e la gestione del calendario per servizi come sessioni di Personal Training, consulenze e appuntamenti introduttivi tramite la Dashboard Glofox e i flussi di lavoro di prenotazione. Gli utenti autorizzati possono creare, programmare, modificare, riprogrammare e annullare gli appuntamenti nell'ambito della gestione operativa quotidiana. Gli appuntamenti sono associati al membro dello staff e al profilo dell'iscritto, garantendo la visibilità delle sessioni programmate e l'allocazione delle risorse. La disponibilità e la pianificazione delle prenotazioni sono gestite operativamente all'interno del Portale di amministrazione, dove il personale può configurare la disponibilità degli appuntamenti, gli istruttori o i fornitori di servizi assegnati e i parametri delle sessioni. Gli iscritti possono prenotare i servizi applicabili tramite le interfacce di prenotazione supportate, inclusa l'App per gli iscritti, ove abilitata. I registri degli appuntamenti e gli aggiornamenti vengono gestiti automaticamente all'interno della piattaforma per supportare il monitoraggio operativo, la gestione delle presenze e i flussi di lavoro di erogazione dei servizi.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_008<\u002Fspan><span class=\"req-t\">Categorizzazione cliente<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione anagrafica e prime iterazioni con il cliente<\u002Fdiv><div class=\"req-d\">Glofox supporta la categorizzazione dei clienti e la gestione del ciclo di vita attraverso stati di appartenenza, flussi di lavoro di gestione dei lead, tagging, monitoraggio dello stato di abbonamento e reportistica delle presenze all'interno della dashboard di Glofox. La piattaforma distingue automaticamente tra stati operativi dei membri, come membri attivi con abbonamenti validi, potenziali clienti o lead che si sono registrati o hanno inviato richieste, ed ex membri i cui abbonamenti sono scaduti o sono stati annullati. Le presenze e le attività di check-in vengono registrate nel profilo del membro e nell'ambiente di reporting, consentendo una visibilità operativa sul coinvolgimento dei membri e sulla frequenza delle visite. Tag e strumenti di segmentazione possono essere utilizzati dal personale autorizzato per organizzare e classificare ulteriormente i clienti a fini operativi, di vendita e di comunicazione. Queste classificazioni e i registri delle attività sono accessibili tramite il portale di amministrazione per i team di reception, vendita e gestione, supportando la reportistica, i flussi di lavoro di follow-up e la gestione del ciclo di vita del cliente.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_009<\u002Fspan><span class=\"req-t\">Gestione catalogo<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Glofox supporta la gestione di diverse tipologie di abbonamento e iscrizione all'interno della dashboard di Glofox, tra cui abbonamenti ricorrenti, abbonamenti a durata fissa, pacchetti di sessioni, pacchetti di lezioni e altre strutture di abbonamento configurabili. I prodotti di abbonamento possono essere creati, configurati, venduti e associati direttamente ai profili dei singoli clienti tramite flussi di lavoro di vendita in presenza e canali di acquisto online. La piattaforma mantiene un'unica entità di abbonamento e un unico record cliente, indipendentemente dal canale di vendita utilizzato, garantendo una visibilità centralizzata dello stato dell'abbonamento, della fatturazione, dell'utilizzo e dei diritti di accesso. Gli utenti autorizzati possono gestire la configurazione dell'abbonamento, i prezzi, la durata, le regole di accesso, le impostazioni di rinnovo e l'assegnazione tramite il portale di amministrazione. Gli acquisti online completati tramite l'app per i membri o i flussi di acquisto web vengono automaticamente collegati allo stesso profilo membro e agli stessi record operativi di abbonamento utilizzati per la gestione in loco. Ciò consente una gestione coerente del ciclo di vita, la reportistica, la supervisione della fatturazione e l'assistenza clienti su tutti i canali di vendita supportati.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_010<\u002Fspan><span class=\"req-t\">Catalogo dinamico<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Glofox supporta flussi di vendita di abbonamenti configurabili, gestione dei lead, offerte promozionali e funzionalità di segmentazione della clientela che consentono di presentare prodotti e abbonamenti in base allo stato del cliente, all'idoneità e alle regole operative. La disponibilità degli abbonamenti, le prove gratuite, le offerte introduttive, i pacchetti e i prezzi promozionali possono essere configurati e gestiti tramite la dashboard di Glofox per la vendita tramite l'app per i membri, i percorsi di acquisto web e i flussi di lavoro in loco. La segmentazione della clientela è supportata dallo stato dell'abbonamento, dagli abbonamenti attivi o inattivi, dallo stato dei lead, dai tag e dalla proprietà dell'abbonamento, consentendo flussi di lavoro di vendita e marketing differenziati per membri attivi, potenziali clienti ed ex membri. Anche le offerte a tempo limitato e le campagne promozionali possono essere configurate a livello operativo e rese disponibili tramite i canali di vendita supportati. La piattaforma supporta la gestione centralizzata di abbonamenti, offerte e logica di idoneità tramite il portale di amministrazione, consentendo al personale autorizzato di mantenere la disponibilità dei prodotti e i relativi flussi di lavoro di vendita. I consigli dinamici sui prodotti in tempo reale, basati su motori di regole predittive o logiche di upselling automatizzate, sono configurabili tramite i flussi di lavoro di segmentazione e gestione delle offerte disponibili, anziché tramite funzionalità di raccomandazione autonome basate sull'IA. Questo non è limitato dallo stato, a meno che non venga fornita un'offerta da un abbonamento nascosto che consente di fornire un URL con una tariffa di abbonamento non disponibile al pubblico.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_012<\u002Fspan><span class=\"req-t\">Disdetta prova<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Glofox supporta gli abbonamenti di prova e consente la cancellazione di un abbonamento attivo o futuro prima che si trasformi in un abbonamento ricorrente. Il personale può gestire questa operazione dal Portale di amministrazione accedendo al profilo del cliente, alla scheda Abbonamenti e selezionando Annulla abbonamento, con la possibilità di annullare immediatamente o in una data a scelta. Qualora il periodo di prova sia associato a un abbonamento ricorrente, il sistema richiede all'utente del personale di annullare l'abbonamento o l'abbonamento e l'abbonamento stesso, garantendo l'interruzione del pagamento ricorrente prima del successivo addebito. Gli abbonati possono anche inviare richieste di cancellazione tramite l'App per gli abbonati o il Portale web, laddove la funzionalità di cancellazione sia abilitata; le richieste vengono inviate all'abbonato e all'indirizzo email della sede per la revisione e l'elaborazione operativa. La configurazione e la governance sono gestite tramite la configurazione dell'abbonamento, la configurazione del piano di pagamento, i Termini e condizioni e i controlli operativi a livello di sede.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_013<\u002Fspan><span class=\"req-t\">Calcolo automatico pro rata post 15 del mese<\u002Fspan><span class=\"badge partial\">Parziale<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Glofox supporta abbonamenti ricorrenti per i clienti che acquistano di persona, inclusa la configurazione per la fatturazione mensile e un'opzione avanzata per l'addebito il 1° di ogni mese. Per gli abbonamenti con fatturazione proporzionale il 1°, Glofox può calcolare l'importo proporzionale per la parte restante del mese e addebitarlo al momento dell'acquisto dell'abbonamento, con il pagamento mensile ricorrente che verrà poi addebitato il 1° di ogni mese successivo. Gli amministratori configurano e gestiscono queste impostazioni di abbonamento nella Dashboard e i nuovi membri possono essere assegnati o acquistare abbonamenti idonei tramite i canali di vendita disponibili. La specifica esigenza di posticipare l'importo giornaliero proporzionale e combinarlo con la rata del mese successivo in un'unica transazione futura non è in linea con il flusso di fatturazione proporzionale standard descritto sopra.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_014<\u002Fspan><span class=\"req-t\">Calcolo automatico pro rata prima del 15 del mese<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Glofox supporta abbonamenti ricorrenti per iscrizioni in presenza con cicli di fatturazione mensile configurabili, inclusi abbonamenti fatturati il ​​1° di ogni mese con addebito proporzionale automatico abilitato. Se un nuovo membro si iscrive prima del 15 del mese, la piattaforma può calcolare e riscuotere automaticamente un importo proporzionale per i giorni rimanenti del mese corrente al momento dell'acquisto, in base al prezzo dell'abbonamento mensile configurato. Il membro viene quindi passato al ciclo di fatturazione mensile ricorrente standard a partire dalla successiva data di fatturazione programmata.<br>Questa funzionalità è configurata e gestita dagli amministratori autorizzati all'interno della Dashboard come parte della configurazione dell'abbonamento e della fatturazione. I membri possono acquistare abbonamenti idonei tramite i canali di vendita supportati, inclusi flussi di lavoro di vendita assistiti dal personale e percorsi di acquisto rivolti ai membri. La riscossione dei pagamenti e la fatturazione ricorrente vengono elaborate tramite l'integrazione con il fornitore di servizi di pagamento configurato.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_015<\u002Fspan><span class=\"req-t\">Conversione automatica abbonamento pro rata<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Glofox supporta la gestione degli abbonamenti ricorrenti tramite flussi di lavoro di fatturazione e abbonamento configurabili all'interno della dashboard di Glofox. Gli abbonamenti possono essere configurati con date di inizio definite, piani di fatturazione ricorrenti e riscossione automatica dei pagamenti ricorrenti laddove sia abilitata l'elaborazione dei pagamenti supportata. Al termine del periodo di abbonamento iniziale, la piattaforma può trasferire automaticamente l'abbonamento mensile ricorrente configurato e associato all'account del cliente, generando il pagamento ricorrente applicabile in base al piano di fatturazione stabilito. Per i modelli operativi che prevedono un periodo iniziale proporzionale seguito dal passaggio a un abbonamento mensile standard, il personale autorizzato può configurare la struttura di abbonamento applicabile, le date di fatturazione e l'impostazione dei pagamenti ricorrenti tramite il portale di amministrazione. La logica di ripartizione proporzionale specifica prima o dopo il 15° giorno e le regole di transizione automatica vengono gestite tramite flussi di lavoro di fatturazione e abbonamento configurati, anziché tramite un motore di conversione proporzionale dedicato separato.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_016<\u002Fspan><span class=\"req-t\">Rinnovo automatico dell'abbonamento<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Glofox supporta il rinnovo automatico per gli abbonamenti mensili ricorrenti configurati con fatturazione ricorrente e un metodo di pagamento attivo. Se non viene applicata alcuna cancellazione o sospensione prima della data di rinnovo, l'abbonamento del socio continua secondo i termini configurati e la rata successiva viene generata per l'addebito tramite il sistema di pagamento collegato. Il personale autorizzato può creare, assegnare, modificare, cancellare o sospendere gli abbonamenti tramite la Dashboard di Glofox, mantenendo lo stato dell'abbonamento e l'attività di fatturazione nel profilo del cliente. I soci possono anche accedere alle opzioni di gestione dell'abbonamento disponibili tramite l'App Soci, laddove abilitata dal club. Le regole di rinnovo, i prezzi, la frequenza di fatturazione e l'addebito dei pagamenti vengono configurati e gestiti operativamente nel Portale di Amministrazione, supportando la gestione continua del ciclo di vita dell'abbonamento mensile.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_017<\u002Fspan><span class=\"req-t\">Sospensioni abbonamento<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Glofox supporta la gestione del blocco e della sospensione degli abbonamenti ricorrenti tramite controlli configurabili all'interno della dashboard di Glofox. Il blocco degli abbonamenti può essere gestito di persona dal personale autorizzato tramite il portale di amministrazione, mentre le richieste di blocco online da parte dei soci possono essere supportate tramite flussi di lavoro dedicati, laddove abilitati nell'ambito della configurazione operativa del club. I periodi di blocco possono estendere la durata dell'abbonamento e modificare il relativo piano di fatturazione in base alle regole di abbonamento configurate, incluso lo spostamento del successivo pagamento ricorrente, ove applicabile. Parametri operativi come l'idoneità al blocco, i periodi di preavviso, la durata e il trattamento di fatturazione sono gestiti tramite la configurazione dell'abbonamento e i processi amministrativi stabiliti dal club. Tutte le azioni di blocco, gli aggiornamenti dello stato dell'abbonamento e le conseguenti modifiche di fatturazione vengono conservati nel record dell'abbonamento del cliente per la gestione operativa e la reportistica.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_018<\u002Fspan><span class=\"req-t\">Disdetta abbonamento<\u002Fspan><span class=\"badge partial\">Parziale<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Glofox supporta la cancellazione degli abbonamenti ricorrenti idonei prima del successivo rinnovo o ciclo di fatturazione tramite processi gestiti dal personale nel Portale di amministrazione e nell'app Glofox Pro. Gli utenti del personale possono accedere al profilo del cliente, aprire la sezione Abbonamenti ed elaborare le richieste di cancellazione con date di scadenza immediate o programmate, in conformità con la politica di cancellazione dell'organizzazione. Gli abbonati possono anche inviare richieste di cancellazione tramite l'app per gli abbonati o il portale web, ove abilitato, consentendo l'avvio della procedura di richiesta sia di persona che online.<br>La piattaforma può supportare operativamente una politica che richiede l'invio delle richieste di cancellazione almeno un giorno prima del rinnovo. Glofox non offre funzionalità native per calcolare o applicare automaticamente le penali di cancellazione contrattuali in base a una percentuale del valore residuo o utilizzato dell'abbonamento come parte del flusso di lavoro di cancellazione dell'abbonamento. L'elaborazione delle cancellazioni, il controllo dei rinnovi e la gestione della fatturazione rimangono gestiti centralmente dagli utenti del personale autorizzati tramite gli strumenti di amministrazione degli abbonamenti della piattaforma.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_021<\u002Fspan><span class=\"req-t\">Verifica real-time accesso alla struttura<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">GYM Experience<\u002Fdiv><div class=\"req-d\">Glofox supporta integrazioni per la gestione degli iscritti e il controllo degli accessi in più sedi, consentendo il riconoscimento e la convalida dei clienti in tutte le sedi dei club partecipanti. Lo stato dell'iscrizione, la validità dell'abbonamento, lo stato dei pagamenti, la compilazione delle liberatorie e le relative informazioni sull'account dell'iscritto vengono gestiti centralmente all'interno del profilo cliente e possono essere utilizzati a livello operativo per gestire l'idoneità all'accesso dell'iscritto. L'integrazione con i fornitori di controllo accessi e di varchi supportati consente flussi di lavoro automatizzati per la convalida dell'accesso e lo sblocco di porte o cancelli, in base alle condizioni di iscrizione e account configurate. Il personale autorizzato gestisce iscrizioni, stato dell'account, accordi e regole di accesso operative tramite la dashboard di Glofox e le relative integrazioni. Le liberatorie firmate e le conferme contrattuali sono supportate all'interno dei record degli iscritti e possono essere integrate nei processi di accesso operativi laddove siano configurati flussi di lavoro integrati.Il sistema non prevede nativamente una logica di varco dedicata per la convalida automatizzata del controllo accessi basata sulla validità del certificato medico. Tuttavia, la documentazione sanitaria e lo stato amministrativo del profilo possono essere monitorati e gestiti a livello operativo direttamente all'interno dell'anagrafica del socio.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_022<\u002Fspan><span class=\"req-t\">Autonomia utilizzo servizi<\u002Fspan><span class=\"badge partial\">Parziale<\u002Fspan><\u002Fdiv><div class=\"req-cat\">GYM Experience<\u002Fdiv><div class=\"req-d\">Glofox supporta i flussi di lavoro di identificazione dei soci e controllo degli accessi tramite integrazioni con fornitori di controllo accessi compatibili, inclusi i casi d'uso di ingresso basati su badge o tessere, laddove supportati dall'hardware connesso. L'attivazione di sistemi ausiliari — quali docce, asciugacapelli e armadietti — tramite badge o braccialetto non rientra tra le funzionalità native di gestione domotica fornite da Glofox. Tale requisito sarà soddisfatto mediante l'integrazione della piattaforma con sistemi partner o hardware di terze parti compatibili (es. Gantner o fornitori equivalenti supportati), inseriti all'interno dell'ambiente operativo del club. . Glofox può gestire i dati relativi al profilo del socio, alla validità dell'iscrizione, allo stato dei pagamenti e all'idoneità all'accesso, utilizzati per supportare i flussi di lavoro di ingresso e accesso, mentre l'attivazione a livello di dispositivo e le regole hardware vengono gestite all'interno del sistema di terze parti. Il personale autorizzato gestirà i dati dei soci e delle iscrizioni nella dashboard di Glofox e gestirà le autorizzazioni specifiche per le attrezzature tramite l'integrazione pertinente o la piattaforma del fornitore di hardware.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_023<\u002Fspan><span class=\"req-t\">Integrazione Vending<\u002Fspan><span class=\"badge non\">Non soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">GYM Experience<\u002Fdiv><div class=\"req-d\">Glofox supporta l'identificazione dei soci e i flussi di lavoro relativi ai pagamenti tramite integrazioni e sistemi operativi connessi; tuttavia, i protocolli di comunicazione nativi per le transazioni tramite distributori automatici con badge o braccialetti non sono forniti come funzionalità standard della piattaforma. Questo requisito viene in genere soddisfatto tramite una soluzione di terze parti compatibile per distributori automatici, pagamenti senza contanti o controllo accessi, integrata nell'ambiente del club. Glofox può gestire l'identità del socio, lo stato di iscrizione e i dati dell'account cliente associati, utilizzati nei flussi di lavoro più ampi di gestione degli accessi e dei soci, mentre i protocolli di comunicazione dei distributori automatici, l'autenticazione del dispositivo, la logica dei valori memorizzati e l'elaborazione delle transazioni sono gestiti dal fornitore di hardware e pagamenti di terze parti. La configurazione e la gestione operativa dell'infrastruttura dei distributori automatici, dei badge, dei braccialetti e della connettività dei dispositivi risiedono quindi nell'ecosistema del fornitore integrato, anziché nella piattaforma Glofox principale.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_026<\u002Fspan><span class=\"req-t\">Prenotazione altri servizi (es. visita medica)<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">GYM Experience<\u002Fdiv><div class=\"req-d\">Glofox supporta la prenotazione e la gestione di servizi aggiuntivi tramite le funzionalità di prenotazione e pianificazione disponibili nella dashboard di Glofox e nei flussi di lavoro di prenotazione dei soci. Il personale autorizzato può configurare i servizi prenotabili, assegnare risorse come istruttori o professionisti, definire la disponibilità degli appuntamenti e associare le prenotazioni a sale o strutture specifiche. I soci possono prenotare i servizi idonei direttamente tramite il proprio account attraverso l'app per soci o l'esperienza di prenotazione web supportata, laddove abilitata dal club. I flussi di lavoro di prenotazione a pagamento sono supportati tramite l'elaborazione integrata dei pagamenti, che consente la riscossione del pagamento al momento della prenotazione e crea un'associazione diretta tra il servizio prenotato e la relativa transazione. Gli utenti del personale gestiscono la pianificazione, la disponibilità, le prenotazioni, le cancellazioni e i servizi collegati al pagamento tramite il portale di amministrazione, con i dati relativi ad appuntamenti e pagamenti conservati nel profilo cliente e nell'ambiente di reporting operativo.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_027<\u002Fspan><span class=\"req-t\">Gestione Multi-Tenant<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Struttura e accessibilità<\u002Fdiv><div class=\"req-d\">Glofox supporta strutture aziendali multi-sede in cui gli operatori possono gestire più club all'interno di un unico ambiente operativo. Gli utenti autorizzati possono supervisionare la configurazione a livello di club, gli abbonamenti, gli orari, l'accesso del personale, la reportistica e l'attività dei soci tramite la dashboard di Glofox, con visibilità e autorizzazioni regolate dal ruolo dell'utente e dalle sedi assegnate. La gestione centralizzata garantisce uniformità tra le sedi, consentendo al contempo ai singoli club di mantenere impostazioni specifiche per la propria sede, come orari, sale, istruttori, prezzi e regole operative. La reportistica a livello di gruppo e la supervisione multi-sede sono supportate per gli operatori che gestiscono più strutture. Una gerarchia multilivello formale con ereditarietà automatica da Gruppo a Zona o Area a Singolo Club non è fornita come motore di gerarchia dedicato standard; la configurazione viene gestita centralmente e per sede in base alle autorizzazioni e alla configurazione dell'operatore.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_028<\u002Fspan><span class=\"req-t\">Permessi account<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Struttura e accessibilità<\u002Fdiv><div class=\"req-d\">Glofox supporta il controllo degli accessi basato sui ruoli per il personale e i membri tramite identità utente univoche. Al personale autorizzato possono essere assegnati permessi in linea con le loro responsabilità operative, tra cui accesso a livello dirigenziale, accesso alla reception, accesso come istruttore e accesso specifico per sede, ove pertinente. I membri utilizzano il proprio account per accedere alle funzionalità a loro dedicate, come prenotazioni, acquisti, gestione del profilo e azioni relative all'abbonamento, tramite l'app per i membri o l'esperienza web. Per gli operatori con più sedi, l'accesso del personale può essere gestito in base alle sedi assegnate e ai livelli di autorizzazione all'interno della dashboard di Glofox, consentendo l'accesso alle funzionalità e ai club pertinenti senza la necessità di profili separati per ogni sede. La gestione dei permessi viene amministrata tramite il portale di amministrazione da utenti autorizzati, garantendo il controllo operativo su chi può accedere, gestire o visualizzare le diverse aree della piattaforma.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_029<\u002Fspan><span class=\"req-t\">Integrazione con altri sistemi<\u002Fspan><span class=\"badge partial\">Parziale<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Struttura e accessibilità<\u002Fdiv><div class=\"req-d\">Glofox supporta l'integrazione con sistemi esterni tramite API disponibili, integrazioni con partner supportati ed esperienze web incorporate. L'integrazione con sistemi ERP o altri sistemi gestionali può essere supportata tramite l'API di Glofox e processi di scambio dati configurati, in base ai flussi di dati richiesti e agli endpoint supportati. L'integrazione con il sito web è supportata tramite flussi di lavoro online per l'iscrizione, la prenotazione e l'acquisto da parte dei membri, che possono essere collegati ai canali digitali di un club. Applicazioni di terze parti e partner del settore benessere possono essere supportati laddove sia disponibile un'integrazione consolidata o laddove il flusso di lavoro richiesto possa essere implementato tramite le funzionalità API supportate. Le integrazioni con piattaforme di allenamento come Technogym o Evolution FIT non sono integrazioni native standard di Glofox; ove necessario, queste verranno valutate in base alle funzionalità API disponibili o fornite tramite l'approccio di integrazione di terze parti pertinente. La configurazione e la gestione operativa sono gestite tramite il portale di amministrazione, le impostazioni di integrazione e l'accesso tecnico autorizzato all'API o alla connessione del partner pertinente.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_030<\u002Fspan><span class=\"req-t\">Aggiornamento informazioni database<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Struttura e accessibilità<\u002Fdiv><div class=\"req-d\">Glofox supporta aggiornamenti operativi in ​​tempo reale per i flussi di lavoro principali relativi ad abbonamenti, prenotazioni, presenze, fatturazione e programmazione all'interno della dashboard di Glofox e delle esperienze connesse rivolte agli abbonati. Le modifiche ai profili dei clienti, agli abbonamenti, alle prenotazioni, alla disponibilità dei corsi, ai pagamenti e ai registri delle presenze vengono riflesse nella piattaforma non appena si verificano transazioni e azioni operative. I flussi di lavoro integrati, come il check-in degli abbonati, le conferme di prenotazione, le cancellazioni, l'elaborazione dei pagamenti e gli aggiornamenti del programma, sono progettati per fornire una visibilità operativa costante al personale autorizzato e agli abbonati. Laddove vengano implementate integrazioni con sistemi di terze parti o piattaforme esterne, i tempi di sincronizzazione e la frequenza di aggiornamento dipendono dalla configurazione e dalle funzionalità dell'integrazione connessa o del flusso di lavoro API. La gestione operativa e il monitoraggio di queste attività vengono gestiti tramite il portale di amministrazione e le relative configurazioni di integrazione.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_031<\u002Fspan><span class=\"req-t\">Finance &amp; Payments online<\u002Fspan><span class=\"badge non\">Non soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Struttura e accessibilità<\u002Fdiv><div class=\"req-d\">Glofox supporta l'elaborazione dei pagamenti tramite l'integrazione con Stripe, consentendo ai clienti di utilizzare il proprio conto esercente Stripe per pagamenti online, addebiti ricorrenti per abbonamenti, metodi di pagamento salvati, transazioni POS e flussi di lavoro di riscossione automatizzati. L'integrazione con Stripe viene configurata e gestita all'interno della dashboard di Glofox da amministratori autorizzati durante l'implementazione e in fase operativa. I pagamenti possono essere riscossi tramite l'app per i membri, il portale web e i flussi di lavoro di vendita assistiti dal personale, mentre la liquidazione, l'acquisizione, la gestione delle frodi e la governance del conto esercente rimangono sotto il diretto controllo del cliente e di Stripe.<br>Questo modello garantisce flessibilità operativa senza richiedere l'utilizzo di un circuito di acquisizione proprietario del fornitore. Orange Palestre Italiane può quindi operare utilizzando il proprio conto esercente Stripe e le relative condizioni commerciali già negoziate per le transazioni online. Requisiti più ampi, indipendenti dal gateway o di connettività interbancaria diretta, al di fuori delle integrazioni di pagamento supportate, richiederebbero una valutazione di integrazione separata in base all'infrastruttura di pagamento di destinazione e alla compatibilità API.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_032<\u002Fspan><span class=\"req-t\">Finance &amp; Payments offline<\u002Fspan><span class=\"badge non\">Non soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Struttura e accessibilità<\u002Fdiv><div class=\"req-d\">Glofox supporta l'elaborazione integrata dei pagamenti e i flussi di lavoro di fatturazione ricorrente tramite integrazioni con gateway di pagamento supportati, tra cui Stripe, per la riscossione di pagamenti online e relativi ad abbonamenti. I metodi di pagamento per gli abbonamenti, gli addebiti ricorrenti e i dati di fatturazione dei clienti vengono gestiti all'interno della piattaforma tramite l'integrazione dei pagamenti configurata e i flussi di lavoro amministrativi disponibili nella Dashboard.<br>L'esigenza specifica di generare esportazioni di flussi di pagamento in formato XML ISO 20022 per la gestione offline dei mandati, inclusa la gestione di mandati cartacei o firmati digitalmente e i servizi di allineamento dei debitori interbancari come SEDA, esula dall'ambito operativo standard delle funzionalità native di fatturazione ed esportazione dei pagamenti della piattaforma. Lo scambio di mandati interbancari, la generazione di file bancari e i processi di allineamento dei debitori richiederebbero pertanto sistemi bancari esterni, middleware o infrastrutture di pagamento specializzate che operino in parallelo con l'ambiente del fornitore di servizi di pagamento configurato.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_038<\u002Fspan><span class=\"req-t\">Relazione dati<\u002Fspan><span class=\"badge partial\">Parziale<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Struttura e accessibilità<\u002Fdiv><div class=\"req-d\">Glofox supporta flussi di lavoro di acquisto collegati tra i membri tramite profili, abbonamenti, pacchetti di crediti, prodotti del negozio, pagamenti e reportistica. Gli acquisti possono essere completati dal personale tramite la Dashboard o Glofox Pro, e i membri possono acquistare prodotti o servizi idonei tramite l'App per membri, l'App standalone, il portale web o i flussi di pagamento, ove abilitati. Gli acquisti del negozio vengono tracciati nella dashboard, inclusi i dati sulle prestazioni degli articoli, la ripartizione dei ricavi, l'attribuzione delle vendite al personale e lo stato di riscossione. Gli acquisti di abbonamenti e pacchetti di crediti sono associati al profilo cliente pertinente e gestiti operativamente tramite la Dashboard e Glofox Pro. Glofox non espone né si impegna a utilizzare uno schema di database relazionale o una struttura di chiavi esterne gestiti dal cliente per gli ordini di acquisto; l'ambito supportato è l'associazione a livello di applicazione degli acquisti ai record dei clienti e ai prodotti, abbonamenti, pacchetti di crediti e record di pagamento configurati.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_039<\u002Fspan><span class=\"req-t\">Ambiente di Test e Simulazione<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Struttura e accessibilità<\u002Fdiv><div class=\"req-d\">Glofox offre ambienti dedicati di sviluppo, test, staging e sandbox per la convalida di API e integrazioni, logicamente separati dall'ambiente di produzione tramite credenziali di accesso distinte. Questi ambienti supportano lo sviluppo e il test end-to-end dei flussi di lavoro API supportati, inclusi utenti, abbonamenti, crediti, corsi, prenotazioni, pagamenti e relativi processi di integrazione. Le chiavi API e i token vengono emessi separatamente per l'utilizzo in fase di test e in produzione, consentendo una convalida controllata prima del rilascio in produzione. I flussi di lavoro relativi ai pagamenti possono essere testati all'interno dell'ambiente di integrazione supportato; la capacità di simulazione dei pagamenti dipende dal fornitore di servizi di pagamento connesso e dalla configurazione di pagamento concordata. L'accesso, l'autenticazione e l'utilizzo operativo della sandbox sono gestiti tramite il processo di accesso e implementazione API di Glofox approvato.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_040<\u002Fspan><span class=\"req-t\">Gestione Insoluti mancato pagamento<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Glofox supporta la riscossione automatizzata dei pagamenti ricorrenti per gli abbonamenti mensili tramite l'elaborazione integrata dei pagamenti, inclusi i pagamenti con carta e gli addebiti diretti supportati, ove disponibili tramite il fornitore di servizi di pagamento configurato. I pagamenti non andati a buon fine vengono registrati nella cronologia di fatturazione e pagamento dell'abbonato, consentendo al personale di identificare i saldi scaduti e gestire le azioni di sollecito tramite la dashboard di Glofox. L'accesso all'abbonamento può essere controllato in base alla validità dell'abbonamento e allo stato dell'account, inclusi il blocco operativo o la limitazione dell'accesso, ove configurato tramite i flussi di lavoro di gestione degli abbonamenti e degli accessi. Commissioni amministrative o penali possono essere applicate all'account di un abbonato tramite i flussi di lavoro di fatturazione e addebito supportati, da parte del personale autorizzato. La specifica esigenza di un motore automatizzato per le penali mensili, in grado di rilevare autonomamente ogni rata non pagata, applicare la sospensione dell'accesso e generare ripetutamente una commissione amministrativa configurabile per ogni mese di mancato pagamento, viene gestita tramite operazioni di fatturazione e processi di sollecito dei pagamenti configurati, anziché come un'automazione standard dedicata per le penali.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_043<\u002Fspan><span class=\"req-t\">Loyalty e programma referral (\"es. Presenta un Amico)<\u002Fspan><span class=\"badge partial\">Parziale<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Glofox supporta l'integrazione con piattaforme di marketing automation e referral di terze parti tramite le API disponibili e i flussi di lavoro di integrazione supportati. L'integrazione con Referrizer può supportare il coinvolgimento dei clienti, la gestione delle campagne referral, il lead nurturing, i flussi di lavoro di marketing automatizzati e le attività promozionali, sfruttando i dati dei clienti e degli iscritti gestiti all'interno di Glofox. Le informazioni relative a iscritti, lead, prenotazioni e acquisti possono essere scambiate tra le piattaforme, nel rispetto dell'ambito di integrazione concordato e degli endpoint API supportati. La gestione operativa della logica referral, dell'automazione delle campagne, degli incentivi promozionali e dei percorsi di marketing viene gestita all'interno della piattaforma Referrizer, mentre la gestione degli iscritti, la fatturazione, le prenotazioni e i dati operativi dei clienti rimangono gestiti all'interno della dashboard di Glofox. La configurazione dell'integrazione, l'autenticazione, le regole di sincronizzazione e la gestione del flusso di dati sono gestite tramite il processo di implementazione tecnica e i relativi controlli amministrativi.<\u002Fdiv><\u002Fdiv><\u002Fdiv><p>L'analisi dei requisiti funzionali Must Have per GloFox evidenzia che, pur gestendo efficacemente funzionalità di base come la gerarchia multi-tenant, la prenotazione dei servizi e l'aggiornamento in tempo reale dei dati, sono presenti diverse criticità.<\u002Fp><p>Il sistema non supporta la fusione del pro-rata post 15 del mese in combinazione alla mensilità successiva e non dispone di un automatismo per addebitare l'esatta penale percentuale in caso di disdetta anticipata. <\u002Fp><p>Non soddisfa il requisito di Gateway Agnostic, vincolando i pagamenti online all'ecosistema Stripe e non supportando la generazione del file XML ISO 20022 necessario per la gestione dei flussi interbancari SEPA. <\u002Fp><p>Infine, il gestionale si affida a piattaforme di marketing esterne (come Referrizer) per la gestione dei programmi Referral (es. Presenta un amico\"), costringendo il club ad dover integrare un ulteriore sistema.<\u002Fp><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>28 requisiti · 18 soddisfatti · 7 parziali · 3 non coperti<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h4 id=\"s28\" class=\"sec lvl3\"><span class=\"sec-t\">5.5.2. Analisi Requisiti Funzionali - Nice to Have<\u002Fspan><\u002Fh4><div class=\"reqlist\"><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_001<\u002Fspan><span class=\"req-t\">Dashboard<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Analisi Dati e BI<\u002Fdiv><div class=\"req-d\">Glofox supporta la visualizzazione dei dati tramite diversi report. Gli utenti autorizzati possono visualizzare le metriche chiave tramite grafici, tabelle e dashboard all'interno di Glofox e Glofox Pro (l'app per il personale). Gli utenti autorizzati possono accedere a report che coprono aree quali vendite, fatturato, abbonamenti, tasso di abbandono degli abbonati, nuovi abbonamenti, presenze, assenze ingiustificate e conversione dei lead. L'attribuzione delle vendite consente di assegnare le vendite ai membri dello staff e di esaminarle tramite report sulle transazioni, supportando la visibilità delle prestazioni di vendita per operatore laddove venga utilizzata l'attribuzione. I report possono essere filtrati per periodi pertinenti e scaricati, ove disponibili, per ulteriori analisi. La gestione operativa viene gestita tramite la dashboard, con accesso regolato dalle autorizzazioni degli utenti dello staff e dalla disponibilità dei report. Per dashboard consolidate più avanzate e report personalizzati per le diverse sedi, è disponibile ABC Insights per Glofox come funzionalità di reporting avanzata.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_002<\u002Fspan><span class=\"req-t\">Export dati<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Analisi Dati e BI<\u002Fdiv><div class=\"req-d\">Glofox supporta l'esportazione di dati operativi e di reporting tramite la Dashboard, utilizzando le funzionalità di esportazione standard disponibili per amministratori e personale autorizzati con le autorizzazioni appropriate. I set di dati esportabili includono informazioni sui membri, prenotazioni, registri delle presenze, pagamenti, abbonamenti, lead, report e altri set di dati operativi. Le esportazioni di dati sono generalmente disponibili nei formati .CSV e XLS per successive attività di reporting, analisi, riconciliazione e integrazione. È inoltre possibile generare e distribuire report finanziari e operativi in ​​formati stampabili, incluso il PDF, tramite funzionalità di esportazione e stampa basate su browser.<br>I formati di esportazione basati su XML non sono disponibili come opzione di esportazione configurabile standard all'interno della piattaforma principale. Lo scambio di dati e i requisiti di trasferimento dati strutturato possono essere supportati anche tramite integrazioni e API disponibili, laddove implementate come parte dell'architettura operativa del cliente.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_007<\u002Fspan><span class=\"req-t\">Registro attività di pre-vendita<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione anagrafica e prime iterazioni con il cliente<\u002Fdiv><div class=\"req-d\">Glofox supporta i flussi di lavoro di prevendita e gestione dei lead attraverso funzionalità integrate di tracciamento dei lead e di coinvolgimento dei clienti all'interno della dashboard di Glofox e degli strumenti di vendita associati. Gli utenti autorizzati possono registrare, gestire e monitorare le interazioni con i potenziali clienti, tra cui la creazione di lead, la pianificazione di appuntamenti, consulenze, partecipazione a prove gratuite, visite guidate, attività di follow-up e avanzamento delle vendite. Le funzionalità di note e tracciamento delle attività consentono al personale di registrare interazioni come telefonate, riunioni, esiti delle prove gratuite e cronologia di coinvolgimento dei membri direttamente nel profilo del potenziale cliente o del membro. La gestione dello stato dei lead e la visibilità della pipeline supportano la supervisione operativa dei potenziali clienti durante l'intero ciclo di vita della prevendita. I team di vendita e di front office accedono e gestiscono questi flussi di lavoro tramite il portale di amministrazione, dove i record dei lead, le attività assegnate, la cronologia delle comunicazioni e le attività di conversione vengono gestiti centralmente per una gestione operativa e una reportistica continue.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_011<\u002Fspan><span class=\"req-t\">Conversione prova in abbonamento<\u002Fspan><span class=\"badge partial\">Parziale<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Glofox supporta la conversione da periodo di prova a abbonamento, laddove il periodo di prova e il successivo abbonamento a pagamento siano configurati come parte del flusso di lavoro di vendita dell'abbonamento applicabile. Tuttavia, ciò richiede l'intervento manuale di un membro dello staff e non è automatizzato. Qualora la conversione automatica sia abilitata tramite un abbonamento ricorrente configurato o un'offerta introduttiva con i dettagli di pagamento acquisiti, la conversione del cliente può essere interrotta prima della scadenza del periodo di prova annullando o modificando il relativo accordo di abbonamento all'interno della Dashboard di Glofox, in base ai termini configurati dal club. Gli utenti autorizzati dello staff possono gestire questa operazione tramite il Portale di amministrazione, esaminando il profilo del cliente, lo stato dell'abbonamento, la configurazione della fatturazione e i controlli di cancellazione applicabili. I clienti hanno la facoltà di gestire in autonomia le opzioni relative alla propria iscrizione tramite i canali self-service dedicati, laddove abilitati dal club. I dati riguardanti  i periodi di prova, lo stato contrattuale e le successive variazioni vengono tracciati all'interno del profilo utente, garantendo piena visibilità operativa e storicizzazione delle informazioni per le attività di follow-up. .<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_019<\u002Fspan><span class=\"req-t\">Automazione comunicazioni<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Glofox supporta le comunicazioni automatizzate tramite flussi di lavoro e-mail e SMS configurati all'interno della dashboard di Glofox e dei relativi strumenti di marketing e di coinvolgimento dei membri. I messaggi automatici possono essere attivati ​​in base a eventi operativi e azioni del ciclo di vita del cliente, tra cui conferme di appuntamenti, prenotazioni di corsi, cancellazioni, liste d'attesa, attività di abbonamento, percorsi di benvenuto, eventi di pagamento e campagne promozionali selezionate. Le automazioni di marketing e coinvolgimento supportano la comunicazione con membri, lead e potenziali clienti tramite segmentazione configurata e flussi di lavoro basati su trigger. Gli utenti dello staff con le autorizzazioni appropriate possono configurare e gestire modelli di comunicazione, gruppi di destinatari, trigger e impostazioni delle campagne tramite il portale di amministrazione. Messaggi di compleanno, promemoria di rinnovo, comunicazioni promozionali e notifiche operative possono essere gestiti tramite flussi di lavoro automatizzati, ove configurati. Le comunicazioni sono progettate principalmente per il coinvolgimento di membri e lead; le notifiche operative relative ad appuntamenti e prenotazioni possono essere indirizzate anche agli utenti dello staff tramite le funzioni di flusso di lavoro e pianificazione supportate.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_020<\u002Fspan><span class=\"req-t\">Personalizzazione delle comunicazioni<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Glofox supporta modelli di comunicazione via email e SMS configurabili, personalizzabili in base al trigger, al tipo di comunicazione e al contesto del destinatario. Il personale autorizzato può gestire il contenuto dei messaggi per le comunicazioni automatiche supportate, come conferme di prenotazione, promemoria, cancellazioni, aggiornamenti della lista d'attesa, notifiche di pagamento, messaggi di benvenuto, promemoria di rinnovo e campagne promozionali. I modelli e il contenuto delle campagne vengono configurati all'interno della dashboard di Glofox e degli strumenti di comunicazione associati, con i destinatari determinati dal flusso di lavoro, dal segmento o dall'azione del cliente pertinenti. La personalizzazione può includere dettagli relativi al cliente e operativi disponibili all'interno del modello o del flusso di lavoro della campagna supportati. Ciò consente ai club di mantenere una messaggistica coerente e specifica per trigger per soci, lead e potenziali clienti, conservando al contempo il controllo amministrativo sul contenuto e sull'utilizzo delle comunicazioni.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_024<\u002Fspan><span class=\"req-t\">Gestione Palinsesto Corsi<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">GYM Experience<\u002Fdiv><div class=\"req-d\">Glofox supporta la creazione, la gestione e la modifica di corsi e lezioni tramite la dashboard di Glofox. Gli utenti autorizzati possono configurare i dettagli dei corsi, gli orari, la capienza, le regole di prenotazione, gli istruttori assegnati e le aule o le strutture in cui si svolgono le lezioni. Istruttori e aule possono essere aggiornati in base alle esigenze operative, con le modifiche che si riflettono nel relativo orario e nei flussi di prenotazione. I soci possono visualizzare e prenotare i corsi disponibili tramite l'app per i soci o la piattaforma di prenotazione web, laddove abilitata dal club. La gestione di corsi, istruttori, aule e orari è controllata tramite il portale di amministrazione, garantendo al personale la supervisione operativa dell'orario del club e delle risorse associate.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_025<\u002Fspan><span class=\"req-t\">Gestione delle prenotazioni<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">GYM Experience<\u002Fdiv><div class=\"req-d\">Glofox supporta la prenotazione e la cancellazione dei corsi tramite la dashboard Glofox, l'app per i soci e la piattaforma di prenotazione web, laddove abilitata dal club. I soci possono prenotare i corsi disponibili, cancellare le prenotazioni idonee e ricevere aggiornamenti relativi alle prenotazioni in base alle regole di prenotazione e cancellazione configurate dal club.Al raggiungimento della capienza massima di un corso, Glofox abilita la gestione automatizzata delle liste d'attesa, consentendo ai soci di registrarsi per occupare tempestivamente eventuali posti rinunciatari. I posti in lista d'attesa vengono gestiti in ordine di iscrizione e i soci vengono spostati nei posti disponibili in caso di cancellazioni, secondo il flusso di lavoro configurato. Il personale autorizzato può gestire prenotazioni, cancellazioni, presenze, capienza e attività delle liste d'attesa tramite il portale di amministrazione, mantenendo il controllo operativo sulla partecipazione ai corsi e sull'utilizzo delle aule.<\u002Fdiv><\u002Fdiv><\u002Fdiv><p>GloFox dimostra una buona copertura dei requisiti funzionali Nice to Have. Sul fronte dell'analisi dati, il sistema soddisfa i requisiti mettendo a disposizione cruscotti e reportistica avanzata per monitorare le metriche chiave, i dati sono esportabili nei formati standard (CSV, XLS, PDF) ed è disponibile il modulo aggiuntivo \"ABC Insights\" per le analisi più complesse.<\u002Fp><p>In merito alla gestione dei corsi, il software offre un controllo completo sul palinsesto (gestione aule, istruttori, capienza) e sulla gestione automatica delle liste d'attesa. Inoltre, il modulo di automazione consente l'invio di comunicazioni altamente personalizzabili, innescate da specifici trigger (come benvenuto, conferme di prenotazione, pagamenti o rinnovi) e indirizzabili in modo mirato sia ai clienti che al personale. Sebbene la piattaforma tracci le interazioni iniziali con i prospect (visite, telefonate, esiti), la conversione di una prova gratuita in un abbonamento pagante non avviene in modo automatico allo scadere del periodo stesso. Questa azione richiede obbligatoriamente l'intervento manuale dell'operatore.<\u002Fp><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>8 requisiti · 7 soddisfatti · 1 parziali<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h4 id=\"s29\" class=\"sec lvl3\"><span class=\"sec-t\">5.5.3. Analisi Requisiti Tecnici - Must Have<\u002Fspan><\u002Fh4><div class=\"reqlist\"><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_033<\u002Fspan><span class=\"req-t\">Cloud Native &amp; SaaS<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Architettura e Integrazione<\u002Fdiv><div class=\"req-d\">Glofox viene fornito come soluzione basata su cloud, accessibile tramite browser web standard senza richiedere connettività VPN o infrastrutture di Desktop remoto. Gli utenti autorizzati accedono alle funzionalità operative tramite la Dashboard di Glofox, disponibile tramite browser web supportati, per attività di amministrazione, vendita, pianificazione, reporting e gestione degli iscritti. Le funzionalità rivolte agli iscritti sono disponibili tramite l'app dedicata e le esperienze web supportate, consentendo agli utenti di gestire prenotazioni, iscrizioni, pagamenti e interazioni con l'account da remoto. L'accesso è controllato tramite account utente autenticati e autorizzazioni basate sui ruoli, garantendo un accesso operativo sicuro in tutte le sedi e tipologie di utenti autorizzati. La configurazione, l'amministrazione e la gestione quotidiana della piattaforma sono gestite centralmente tramite il portale di amministrazione basato sul web.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_034<\u002Fspan><span class=\"req-t\">Webhooks<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Architettura e Integrazione<\u002Fdiv><div class=\"req-d\">Glofox supporta i Webhook tramite l'API Glofox per notificare ai sistemi esterni il verificarsi di eventi o modifiche ai dati supportati. I Webhook possono essere configurati per inviare aggiornamenti in tempo reale a uno o più URL di destinazione, con la gestione degli eventi tramite richieste HTTP POST. Tra i casi d'uso supportati per i Webhook vi sono gli aggiornamenti delle fatture in tempo reale, mentre altri flussi di dati possono essere gestiti tramite endpoint API disponibili o flussi di lavoro di integrazione basati su polling, ove applicabile. Gli utenti tecnici possono configurare e gestire le integrazioni basate su Webhook utilizzando l'API Glofox, con credenziali e ambienti gestiti tramite il processo di accesso API approvato. Le modifiche di stato dell'utente e gli eventi relativi ai pagamenti sono supportati in base all'ambito degli eventi Webhook e API disponibili, mentre qualsiasi tipo di evento non supportato viene gestito tramite l'approccio di sincronizzazione dei dati API pertinente.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_035<\u002Fspan><span class=\"req-t\">API<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Architettura e Integrazione<\u002Fdiv><div class=\"req-d\">Glofox supporta l'integrazione tramite API per la lettura e, ove supportato, la scrittura di dati tra Glofox e sistemi esterni. Gli endpoint API disponibili possono essere utilizzati da utenti tecnici autorizzati per accedere a oggetti dati supportati come membri, abbonamenti, pagamenti, fatture, prenotazioni e relativi record operativi, con funzionalità di aggiornamento disponibili solo per le azioni degli endpoint supportati. Lo scambio di dati in tempo reale può essere supportato tramite chiamate API e notifiche webhook disponibili per gli eventi supportati, mentre qualsiasi evento o oggetto non coperto dall'ambito del webhook può essere gestito tramite la sincronizzazione API. Il recupero di pacchetti di informazioni combinate come profilo utente, abbonamento attivo e stato del pagamento è supportato tramite il modello dati API disponibile, sebbene ciò possa richiedere più chiamate agli endpoint a seconda degli oggetti e dei campi specifici richiesti. L'accesso alle API, l'autenticazione, le autorizzazioni e l'utilizzo operativo sono gestiti tramite il processo di integrazione Glofox approvato e la relativa configurazione tecnica.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_036<\u002Fspan><span class=\"req-t\">Secure Authentication<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Sicurezza e Dati<\u002Fdiv><div class=\"req-d\">Glofox supporta flussi di lavoro sicuri per la registrazione, l'accesso e il recupero della password tramite la dashboard, l'app per i membri e il portale web di Glofox. Il recupero della password viene gestito tramite una procedura di reimpostazione anziché tramite il recupero delle credenziali, e le password vengono memorizzate in forma crittografata. Lo scambio di credenziali avviene tramite flussi di lavoro applicativi autenticati su canali HTTPS crittografati. È inoltre disponibile la verifica in due passaggi per l'accesso del personale, che fornisce un ulteriore livello di verifica per gli utenti della dashboard. È possibile fornire una mappatura specifica dei controlli ASVS nell'ambito del processo di revisione della sicurezza applicabile; tuttavia, la piattaforma supporta di serie la gestione sicura delle credenziali, la trasmissione crittografata e flussi di lavoro controllati per la reimpostazione della password.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_037<\u002Fspan><span class=\"req-t\">Token Lifecycle<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Sicurezza e Dati<\u002Fdiv><div class=\"req-d\">Glofox supporta la gestione delle sessioni autenticate per la dashboard di Glofox, l'app per i membri, il portale web e l'accesso API. L'autenticazione API utilizza chiavi e token emessi, con credenziali di accesso gestite tramite il processo di accesso API approvato e utilizzate solo tramite integrazioni sicure lato server. La convalida dell'accesso dell'utente finale è supportata tramite un endpoint di login basato su POST e il JWT restituito viene utilizzato solo per la convalida e non per le successive chiamate API. La protezione degli account del personale è ulteriormente supportata tramite la verifica in due passaggi e i flussi di lavoro di reimpostazione della password. Controlli specifici come il Time-to-Live del token, la rotazione, la revoca e l'invalidazione possono essere gestiti tramite l'apposito processo di revisione tecnica e di sicurezza per l'ambito di integrazione proposto.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_042<\u002Fspan><span class=\"req-t\">Presenza sul territorio italiano, Formazione e Supporto Post Go-Live<\u002Fspan><span class=\"badge partial\">Parziale<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Supporto tecnico e adozione<\u002Fdiv><div class=\"req-d\">Glofox offre servizi di onboarding, implementazione, formazione e adozione operativa per gli operatori del settore fitness attraverso flussi di lavoro dedicati all'implementazione e al successo del cliente. Il supporto all'adozione può includere l'onboarding della piattaforma, la formazione operativa, la guida alla configurazione, il coordinamento del go-live e l'assistenza post-lancio per i team amministrativi e operativi. Le attività di supporto e implementazione vengono erogate dai team Glofox e, ove applicabile all'ambito di implementazione, da partner approvati o strutture di supporto operativo. L'assistenza per la gestione dei problemi, la stabilizzazione operativa e la risoluzione degli incidenti critici successivi al go-live viene gestita attraverso processi di supporto e di escalation consolidati. Le modalità di erogazione, la copertura linguistica, l'approccio all'implementazione e le modalità di supporto operativo continuativo sono definite in base all'accordo commerciale e ai requisiti di implementazione concordati per l'ambiente del cliente.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_044<\u002Fspan><span class=\"req-t\">Certificazione ISO 27001<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Sicurezza e Dati<\u002Fdiv><div class=\"req-d\">In possesso della certificazione ISO 27001<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_045<\u002Fspan><span class=\"req-t\">Disaster recovery<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Sicurezza e Dati<\u002Fdiv><div class=\"req-d\">- Recovery Point Objective (RPO) - L'infrastruttura si appoggia ad Amazon Web Services (AWS). I database relazionali tramite Amazon RDS eseguono backup automatici e log delle transazioni che consentono un ripristino point-in-time (\"point-in-time recovery\") fino agli ultimi 5 minuti. <br>- Recovery Time Objective (RTO) - L'SLA offre un Uptime Commitment del 99,90% mensile,garantendo che l'indisponibilità del servizio non supererà i 43 minuti in un dato mese solare.<br>Ridondanza Geografica e Compliance: Glofox dichiara formalmente la propria conformità agli standard globali di protezione dei dati, includendo clausole standard per il trattamento dei dati personali definiti dal GDPR. <br>- Trasparenza del Failover (Fully-managed lato provider): I componenti critici di sistema sono replicati in Data Center separati e fisicamente isolati, chiamati \"Availability Zones\". I data center sono progettati per tollerare guasti mantenendo il livello del servizio: in caso di disastro in un'area, processi automatizzati spostano il traffico lontano dall'area colpita, garantendo un failover fully-managed senza richiedere interventi manuali sui client.<br>- Audit e Verifiche: Le policy di continuità aziendale (Contingency Plan) di AWS vengono regolarmente aggiornate e sottoposte a test di failover almeno con cadenza annuale.<\u002Fdiv><\u002Fdiv><\u002Fdiv><p>GloFox presenta diverse eccellenze tecniche: è un sistema 100% cloud-native (SaaS) accessibile tramite browser senza necessità di VPN ed espone un'infrastruttura solida basata su API e Webhooks per supportare l'integrazione e la sincronizzazione con sistemi esterni. Inoltre, copre pienamente i requisiti di sicurezza dell'autenticazione (con canali crittografati e gestione sicura delle credenziali), adotta standard moderni per il ciclo di vita dei token e vanta il possesso formale della certificazione ISO 27001.<\u002Fp><p>In merito alla presenza sul territorio italiano, GloFox soddisfa il requisito solo parzialmente in quanto non certifica una filiale diretta in Italia, vincolando l'onboarding, la formazione dello staff e l'assistenza in lingua inglese e da remoto.<\u002Fp><p>Infine, il requisito tecnico di Disaster recovery è soddisfatto grazie alle capacità architetturali fornite dal cloud AWS su cui si appoggiano.<\u002Fp><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>8 requisiti · 7 soddisfatti · 1 parziali<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h4 id=\"s30\" class=\"sec lvl3\"><span class=\"sec-t\">5.5.4. Analisi Requisiti Tecnici - Nice to Have<\u002Fspan><\u002Fh4><div class=\"reqlist\"><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_041<\u002Fspan><span class=\"req-t\">Assistenza H24 con escalation prioritaria per area Finance &amp; Amministrazione<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Supporto tecnico e adozione<\u002Fdiv><div class=\"req-d\">Glofox fornisce servizi di assistenza clienti e supporto tecnico per questioni operative, relative alla piattaforma, alla fatturazione e all'integrazione, attraverso canali di supporto e processi di servizio consolidati. La copertura del supporto include l'assistenza per incidenti operativi critici che interessano le funzionalità principali della piattaforma, tra cui i flussi di lavoro di elaborazione dei pagamenti, le operazioni di fatturazione ricorrente e le interruzioni del servizio legate all'integrazione. La gestione degli incidenti, la gestione delle escalation e le comunicazioni relative al servizio sono gestite dall'organizzazione di supporto di Glofox e dalle relative procedure operative. La disponibilità del supporto, i tempi di risposta, i percorsi di escalation e i livelli di copertura del servizio sono regolati dall'accordo commerciale applicabile e dal pacchetto di supporto contrattualizzato. Il monitoraggio continuo e la gestione operativa vengono applicati all'intero ambiente della piattaforma cloud per garantire la continuità del servizio e la risoluzione dei problemi relativi ai flussi di lavoro critici per l'azienda.<\u002Fdiv><\u002Fdiv><\u002Fdiv><p>GloFox gestisce gli incidenti critici (inclusi i flussi di elaborazione dei pagamenti e la fatturazione ricorrente) tramite la propria organizzazione di supporto e un monitoraggio continuo dell'ambiente cloud. Tuttavia, è fondamentale sottolineare che i tempi di risposta esatti, i percorsi di escalation prioritaria e l'effettiva copertura H24 non sono standardizzati per tutti, ma dipendono strettamente dal livello di servizio (SLA) stabilito nell'accordo commerciale e dal pacchetto di supporto contrattualizzato in fase di acquisto. Inoltre, anche in questo caso si parla di un supporto di secondo livello che implica che Orange Palestre Italiane dovrà definire una struttura interna di primo livello, individuando key user o figure di riferimento incaricate della raccolta, qualificazione e gestione preliminare delle richieste di assistenza prima dell'escalation verso il fornitore.<\u002Fp><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>1 requisiti · 1 soddisfatti<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h3 id=\"s31\" class=\"sec lvl2\"><span class=\"sec-t\">5.6. Considerazioni<\u002Fspan><\u002Fh3><p>In conclusione, l'analisi condotta nel presente capitolo ha consentito di sottoporre a una rigorosa valutazione le soluzioni candidate, verificandone la rispondenza ai requisiti funzionali e tecnici definiti. Tale processo ha portato all'esclusione di: VirtuaGym per alcune lacune funzionali; Showcloud in ragione di un livello di maturità organizzativa che, allo stato attuale, risulta meno allineato alla complessità del contesto operativo di Orange Palestre Italiane e GloFox, pur distinguendosi per diversi elementi di eccellenza tecnica, non soddisfaceva alcuni requisiti ritenuti imprescindibili.<\u002Fp><p>Le piattaforme PerfectGym ed Exerp emergono pertanto come le soluzioni maggiormente qualificate e coerenti con le esigenze di Orange Palestre Italiane. Nel capitolo successivo verrà sviluppato un ulteriore approfondimento comparativo volto a supportare la scelta finale del provider tra questi due candidati.<\u002Fp><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>Finalisti: PerfectGym ed Exerp. Esclusi VirtuaGym, Showcloud e GloFox.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h2 id=\"s32\" class=\"sec lvl1\"><span class=\"secnum\">6<\u002Fspan><span class=\"sec-t\">Confronto tra Exerp e PerfectGym<\u002Fspan><\u002Fh2><p>Il presente capitolo è dedicato al confronto dettagliato tra le due soluzioni rimanenti, PerfectGym ed Exerp, individuate come i partner più idonei a supportare Orange Palestre Italiane. <\u002Fp><p>Attraverso un’analisi approfondita sulla gestione dei flussi finanziari e amministrativi, sulla pianificazione dell'implementazione del software (roadmap) e sulla proiezione dei costi di adozione; tali argomenti costituiranno degli elementi fondamentali per supportare il management nella decisione definitiva, evidenziando i vantaggi strategici e le peculiarità di ciascuna proposta per garantire la continuità operativa e l'efficienza gestionale della rete di club.<\u002Fp><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>Approfondimento finale tra i due candidati: operatività Finance &amp; Administration, roadmap di implementazione e proiezione dei costi.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h3 id=\"s33\" class=\"sec lvl2\"><span class=\"sec-t\">6.1. Approfondimento operatività Financial &amp; Administration<\u002Fspan><\u002Fh3><p>In questo paragrafo vengono approfondite le funzionalità dei due provider relative ai centri di costo (essenziali per una corretta associazione dei movimenti di cassa) e la gestione dei flussi di pagamento, con particolare attenzione alle dinamiche di incasso mediante carta di credito e tramite SEPA. <\u002Fp><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>Entrambi gestiscono nativamente centri di costo e flussi carta/SEPA senza vincolare il merchant account.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h4 id=\"s34\" class=\"sec lvl3\"><span class=\"sec-t\">6.1.1. Gestione centri di costo<\u002Fspan><\u002Fh4><p>La gestione dei centri di costo costituisce un processo cardine per un'appropriata allocazione dei flussi finanziari in base alla tipologia di transazione. Pertanto, si è approfondita la struttura gestionale utilizzata dai due provider Exerp e PerfectGym.<\u002Fp><p>La piattaforma PerfectGym suddivide i movimenti finanziari in tre livelli nativi:<\u002Fp><ul><li>Gerarchia organizzativa e numero interno della palestra: Ogni movimento (fatturazione abbonamenti, vendita POS, acquisto di servizi/crediti, commissioni, chargeback) viene registrato a nome del club da cui proviene, garantendo una separazione per club e per marchio. Ogni palestra ha associato un numero interno che compare nei rendiconti finanziari e nell'esportazione contabile come numero del centro di costo, in questo modo i movimenti vengono automaticamente associati al centro di costo corretto;<\u002Fli><li>Regole di registrazione: saranno predisposti i conti contabili dedicati per tipo di ricavo. Ogni categoria di movimento è associata al proprio conto contabile di addebito/accredito: ricavi da abbonamenti/contratti, quote fisse, servizi secondari, PT e vendita al dettaglio (ognuna con una categoria distinta e con logica di ripartizione dell’aliquota IVA). In questo modo, le vendite di abbonamenti e gli acquisti di servizi secondari finiscono in conti separati e identificabili. Viene fornito un set di regole standard ma è possibile aggiungere regole personalizzate;<\u002Fli><li>Esportazione standardizzata all’ERP: Tutte le transazioni vengono esportate con il numero del centro di costo, il conto contabile e il trattamento fiscale, per consentire l'importazione dei dati nel sistema finanziario aziendale.<\u002Fli><\u002Ful><p>Per quanto riguarda la piattaforma Exerp, essa dispone di funzionalità dedicate alla gestione finanziaria e reportistica, basate su strutture contabili configurabili, meccanismi di categorizzazione dei prodotti e mappature contabili. Tali strutture consentono una gestione flessibile e strutturata delle informazioni economico-finanziarie e permette di separare e riportare in modo indipendente diversi flussi di ricavi, come: abbonamenti, quote di iscrizione, servizi di personal training, servizi di ginnastica di gruppo, vendite al dettaglio, servizi secondari/aggiuntivi, transazioni tramite portafoglio, abbonamenti aziendali, ecc. La rappresentazione dei risultati finanziari può essere visualizzata secondo diversi livelli: per club, regione, marchio o unità aziendale. Infine, permette l’integrazione ed esportazione dei dati verso piattaforme ERP esterne al fine di supportare il processo di allocazione dei ricavi nei rispettivi centri di costo.<\u002Fp><p>In conclusione, sia PerfectGym che Exerp si dimostrano soluzioni altamente qualificate per la gestione dei centri di costo, offrendo entrambi strumenti robusti per l'allocazione precisa dei flussi finanziari. Se PerfectGym si distingue per una metodologia nativa basata su una gerarchia rigida a tre livelli che favorisce un'integrazione immediata e standardizzata con i sistemi ERP; Exerp risponde con una maggiore flessibilità nella configurazione delle categorie di prodotto e dei livelli di rendicontazione, permettendo un'analisi più adattabile alle specifiche esigenze del management.<\u002Fp><p>Entrambe le piattaforme garantiscono, pertanto, la necessaria granularità e coerenza informativa indispensabili per la corretta tracciabilità contabile della rete di club di Orange Palestre Italiane.<\u002Fp><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>PerfectGym: gerarchia nativa a 3 livelli, export ERP standardizzato. Exerp: maggiore flessibilità nelle categorie di prodotto e nei livelli di rendicontazione.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h4 id=\"s35\" class=\"sec lvl3\"><span class=\"sec-t\">6.1.2. Gestione flussi pagamento carta e addebiti SEPA<\u002Fspan><\u002Fh4><p>Per analizzare il flusso per la gestione dei pagamenti, sia mediante carta che tramite SEPA, è stato approfondito l'attuale processo in uso presso l'ufficio Finance di Orange Palestre Italiane. T
