ale attività ha permesso di esaminare nel dettaglio le procedure correnti e di identificare le relative criticità. Attraverso sessioni demo dedicate, si è approfondito se i potenziali provider consentono di replicare il processo attuale, apportando al contempo i miglioramenti necessari per semplificare l'operatività del dipartimento. <\u002Fp><p>A tal proposito, la piattaforma PerfectGym (con il supporto della propria soluzione di pagamento integrata Finon Pay) ha mostrato le funzionalità disponibili per la consultazione dei movimenti di pagamento associati a uno specifico socio, consentendo di verificarne l’esito ed eseguire azioni direttamente sulla singola transazione (ad esempio, l’invio di un nuovo link di pagamento in caso di mancato addebito del metodo di pagamento ricorrente). <\u002Fp><p>Inoltre, è stato illustrato come il sistema supporti l’incasso dei pagamenti tramite SEPA e carta di credito, sia attraverso interventi manuali da parte degli operatori sia mediante processi automatizzati configurabili (ad esempio l’identificazione giornaliera dei soci per i quali è prevista la riscossione della quota mensile, con conseguente generazione e invio della richiesta di pagamento).<\u002Fp><p>Infine, è stata presentata la funzionalità che consente di importare ed esportare file XML direttamente dalla piattaforma, a supporto della gestione manuale delle transazioni SEPA.<\u002Fp><p>Analogamente, Exerp ha illustrato la possibilità di estrarre con facilità il file XLM da caricare nel portale della banca per l’emissione dei SEPA e come, per ciascun utente, sono facilmente fruibili le informazioni inerenti ai pagamenti effettuati (e accrediti) con il relativo esito.<\u002Fp><p>Entrambi i provider forniscono delle partnership con Stripe e Adyen (PerfectGym anche la propria soluzione integrata Finon Pay) ma al contempo non vincolando Orange Palestre Italiane a uno specifico fornitore di servizi di pagamento, supportano flussi ricorrenti sia mediante carta che SEPA e consentono la generazione del file XML. Infine, entrambi offrono una soluzione solida, permettendo a Orange Palestre Italiane di mantenere le relazioni bancarie esistenti con la possibilità di automatizzare alcuni flussi di pagamento.<\u002Fp><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>Entrambi: partnership Stripe/Adyen (PerfectGym anche Finon Pay), flussi ricorrenti carta e SEPA, import/export file XML.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h3 id=\"s36\" class=\"sec lvl2\"><span class=\"sec-t\">6.2. Roadmap<\u002Fspan><\u002Fh3><p>Nel presente capitolo verranno illustrate le roadmap che i potenziali provider sono soliti a proporre ai propri clienti per la configurazione del nuovo sistema e la migrazione dei dati provenienti dal vecchio gestionale.<\u002Fp><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>PerfectGym → 6 mesi; Exerp → 7 mesi. Entrambi adattabili a un rollout per wave fino a giugno 2027.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h4 id=\"s37\" class=\"sec lvl3\"><span class=\"sec-t\">6.2.1. Roadmap PerfectGym (Magicline)<\u002Fspan><\u002Fh4><p>La roadmap di implementazione di PerfectGym è strutturata su un arco temporale di sei mesi, finalizzata a garantire una transizione fluida e strutturata verso la nuova piattaforma. Il piano si articola in fasi sequenziali che comprendono l'avvio contrattuale e il kickoff di progetto, la preparazione tecnica e la migrazione dei dati, la configurazione personalizzata e l'integrazione con i partner, concludendosi con il rilascio graduale dei club e la successiva fase di supporto post-avvio.<\u002Fp><ol class=\"phases\"><li><span class=\"ph-n\">1<\u002Fspan><div><span class=\"ph-t\">MSA &amp; Kickoff<\u002Fspan><span class=\"ph-s\">Firma contratto · Definizione governance di progetto · Kickoff meeting · Assegnazione dei responsabili dei flussi di lavoro<\u002Fspan><\u002Fdiv><\u002Fli><li><span class=\"ph-n\">2<\u002Fspan><div><span class=\"ph-t\">Fase 1 | Preparation<\u002Fspan><span class=\"ph-s\">Project setup &amp; governance · Raccolta dei dati · Firma DPA &amp; NDA · Allineamento dei requisiti<\u002Fspan><\u002Fdiv><\u002Fli><li><span class=\"ph-n\">3<\u002Fspan><div><span class=\"ph-t\">Fase 2 | Data Migration<\u002Fspan><span class=\"ph-s\">Importer build · Cicli di trasformazione iterativi · Controlli di qualità SEPA · Importazione di prova · Convalida e approvazione dei dati<\u002Fspan><\u002Fdiv><\u002Fli><li><span class=\"ph-n\">4<\u002Fspan><div><span class=\"ph-t\">Fase 2 | Configuration &amp; Training<\u002Fspan><span class=\"ph-s\">Set-up configurazione HQ · Sessioni interattive di configurazione dei club · Training · Supporto utenti<\u002Fspan><\u002Fdiv><\u002Fli><li><span class=\"ph-n\">5<\u002Fspan><div><span class=\"ph-t\">Fase 2 | Features &amp; Integrations<\u002Fspan><span class=\"ph-s\">FitGap ᐧ Integrazione dei Partner · Configurazione dei fornitori di servizi di pagamento · App personalizzata · Data warehouse<\u002Fspan><\u002Fdiv><\u002Fli><li><span class=\"ph-n\">6<\u002Fspan><div><span class=\"ph-t\">Fase 3 | Go-Live Batches<\u002Fspan><span class=\"ph-s\">Pilot (1–2 clubs) · Fino a 20 club al giorno · Blocco dei dati per 24 ore per ogni lotto<\u002Fspan><\u002Fdiv><\u002Fli><li><span class=\"ph-n\">7<\u002Fspan><div><span class=\"ph-t\">Fase 4 | Hypercare<\u002Fspan><span class=\"ph-s\">Assistenza dedicata · Risoluzione dei problemi · Formazione aggiuntiva · Stabilizzazione · Passaggio di consegne al CSM<\u002Fspan><\u002Fdiv><\u002Fli><\u002Fol><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>6 mesi (Lug–Dic): MSA &amp; kickoff, preparazione e migrazione dati, configurazione e training, go-live batch, hypercare.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h4 id=\"s38\" class=\"sec lvl3\"><span class=\"sec-t\">6.2.2. Roadmap Exerp<\u002Fspan><\u002Fh4><p>La roadmap di implementazione proposta da Exerp si articola su un arco temporale di sette mesi, strutturato in sette fasi chiave che accompagnano il cliente dall'avvio fino alla piena operatività. Il percorso inizia con il kick-off di progetto e i workshop di discovery, seguiti dalla configurazione del sistema, la preparazione alla migrazione dei dati e la formazione del personale (head office e super-user). Le fasi finali prevedono User Acceptance Testing (UAT), il deployment pilota, il rollout graduale su tutti i club e, infine, il supporto di hypercare, l'ottimizzazione operativa e il passaggio definitivo al team di Customer Success.<\u002Fp><ol class=\"phases\"><li><span class=\"ph-n\">1<\u002Fspan><div><span class=\"ph-t\">Kick-off del progetto, allineamento degli stakeholder e approvazione dei criteri di successo<\u002Fspan><\u002Fdiv><\u002Fli><li><span class=\"ph-n\">2<\u002Fspan><div><span class=\"ph-t\">Workshop di discovery, progettazione della soluzione e approvazione dei requisiti<\u002Fspan><\u002Fdiv><\u002Fli><li><span class=\"ph-n\">3<\u002Fspan><div><span class=\"ph-t\">Configurazione del sistema, integrazioni e preparazione alla migrazione dei dati<\u002Fspan><\u002Fdiv><\u002Fli><li><span class=\"ph-n\">4<\u002Fspan><div><span class=\"ph-t\">Formazione sede centrale, formazione super-user e attività di preparazione operativa<\u002Fspan><\u002Fdiv><\u002Fli><li><span class=\"ph-n\">5<\u002Fspan><div><span class=\"ph-t\">User Acceptance Testing (UAT), implementazione pilota, confronto fatturazione e convalida<\u002Fspan><\u002Fdiv><\u002Fli><li><span class=\"ph-n\">6<\u002Fspan><div><span class=\"ph-t\">Rollout ai restanti club secondo le ondate di implementazione concordate<\u002Fspan><\u002Fdiv><\u002Fli><li><span class=\"ph-n\">7<\u002Fspan><div><span class=\"ph-t\">Supporto hypercare, ottimizzazione e passaggio al team di Customer Success<\u002Fspan><\u002Fdiv><\u002Fli><\u002Fol><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>7 mesi (Lug–Gen): kickoff, discovery, configurazione e migrazione, training, UAT e pilota, rollout, hypercare.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h4 id=\"s39\" class=\"sec lvl3\"><span class=\"sec-t\">6.2.3. Adattamento della Roadmap<\u002Fspan><\u002Fh4><p>Entrambi i provider hanno dato la piena disponibilità ad adattare il piano di implementazione in coerenza con la strategia proposta da Orange Palestre Italiane. Tale approccio prevede una transizione graduale alla nuova piattaforma, articolata per più wave in successione. Nello specifico, una prima wave per l’inizio di dicembre comprenderà la configurazione della soluzione e il go-live pilota su 1-2 club selezionati, a cui seguiranno le successive con l’obiettivo di completare il rollout sull’intera rete entro giugno 2027.<\u002Fp><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>Rollout per wave: prima wave a inizio dicembre (1–2 club pilota), completamento dell’intera rete entro giugno 2027.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h3 id=\"s40\" class=\"sec lvl2\"><span class=\"sec-t\">6.3. Costi<\u002Fspan><\u002Fh3><p>In tale paragrafo saranno riportate le informazioni inerenti alla stima dei costi che Orange Palestre Italiane dovrà sostenere a fronte della scelta della piattaforma di Exerp oppure di PerfectGym.<\u002Fp><p>Per tale stima, sono stati considerati 23 club per i quali deve essere prevista la relativa licenza.<\u002Fp><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>Stima su 23 club. PerfectGym: ~133.388 € al 1° anno. Exerp: ~264.100 € al 1° anno.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h4 id=\"s41\" class=\"sec lvl3\"><span class=\"sec-t\">6.3.1. Analisi dei costi adozione piattaforma PerfectGym<\u002Fspan><\u002Fh4><p>Di seguito sono riportati i costi unitari comunicati dal provider PerfectGym. Il costo del Data Warehouse è incluso nella stima della licenza annua, poiché Orange Palestre Italiane ne fa già uso per accedere a dati aziendali e operativi in tempo reale tramite uno strumento di BI.<\u002Fp><div class=\"tbl-wrap\"><table class=\"gen\"><caption>Costi unitari — PerfectGym<\u002Fcaption><thead><tr><th>Voce<\u002Fth><th class=\"num\">Costo<\u002Fth><\u002Ftr><\u002Fthead><tbody><tr><td>Licenza<\u002Ftd><td class=\"num\">350 € / mese · club<\u002Ftd><\u002Ftr><tr><td>Data Warehouse<\u002Ftd><td class=\"num\">1.049 € / mese<\u002Ftd><\u002Ftr><tr><td>Migrazione dati<\u002Ftd><td class=\"num\">260 € / club<\u002Ftd><\u002Ftr><tr><td>Configurazione sistema<\u002Ftd><td class=\"num\">260 € / club<\u002Ftd><\u002Ftr><tr><td>Training<\u002Ftd><td class=\"num\">1.020 € / sessione<\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable><\u002Fdiv><div class=\"tbl-wrap\"><table class=\"gen\"><caption>Costo complessivo al 1° anno — PerfectGym<\u002Fcaption><thead><tr><th>Voce<\u002Fth><th>Calcolo<\u002Fth><th class=\"num\">Importo<\u002Fth><\u002Ftr><\u002Fthead><tbody><tr><td>Licenza annua (incl. Data Warehouse)<\u002Ftd><td class=\"calc\">(350 × 23 + 1.049) × 12<\u002Ftd><td class=\"num\">109.188 €<\u002Ftd><\u002Ftr><tr><td>Set-up (migrazione + configurazione)<\u002Ftd><td class=\"calc\">(260 + 260) × 23<\u002Ftd><td class=\"num\">11.960 €<\u002Ftd><\u002Ftr><tr><td>Training<\u002Ftd><td class=\"calc\">1.020 × 12<\u002Ftd><td class=\"num\">12.240 €<\u002Ftd><\u002Ftr><tr class=\"tot\"><td>Totale 1° anno<\u002Ftd><td><\u002Ftd><td class=\"num\">133.388 €<\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable><\u002Fdiv><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>Licenza ~109.188 €/anno + set-up 11.960 € + training 12.240 € = 133.388 € al 1° anno.<\u002Faside><aside class=\"note\" style=\"margin-top:20px\"><span class=\"note-l\">Parametri<\u002Fspan>23 club · 12 mesi · 12 sessioni di training (copertura totale del personale).<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h4 id=\"s42\" class=\"sec lvl3\"><span class=\"sec-t\">6.3.2.Analisi dei costi adozione piattaforma Exerp<\u002Fspan><\u002Fh4><p>A differenza di PerfectGym, Exerp comunica direttamente il costo totale di migrazione, configurazione e training. Di seguito i costi unitari comunicati dal provider.<\u002Fp><div class=\"tbl-wrap\"><table class=\"gen\"><caption>Costi unitari — Exerp<\u002Fcaption><thead><tr><th>Voce<\u002Fth><th class=\"num\">Costo<\u002Fth><\u002Ftr><\u002Fthead><tbody><tr><td>Licenza<\u002Ftd><td class=\"num\">650 € / mese · club<\u002Ftd><\u002Ftr><tr><td>Set-up e training<\u002Ftd><td class=\"num\">84.700 € (totale)<\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable><\u002Fdiv><div class=\"tbl-wrap\"><table class=\"gen\"><caption>Costo complessivo al 1° anno — Exerp<\u002Fcaption><thead><tr><th>Voce<\u002Fth><th>Calcolo<\u002Fth><th class=\"num\">Importo<\u002Fth><\u002Ftr><\u002Fthead><tbody><tr><td>Licenza annua<\u002Ftd><td class=\"calc\">650 × 23 × 12<\u002Ftd><td class=\"num\">179.400 €<\u002Ftd><\u002Ftr><tr><td>Set-up e training<\u002Ftd><td class=\"calc\">importo indicato dal provider<\u002Ftd><td class=\"num\">84.700 €<\u002Ftd><\u002Ftr><tr class=\"tot\"><td>Totale 1° anno<\u002Ftd><td><\u002Ftd><td class=\"num\">264.100 €<\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable><\u002Fdiv><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>Licenza ~179.400 €/anno + set-up e training 84.700 € = 264.100 € al 1° anno.<\u002Faside><aside class=\"note\" style=\"margin-top:20px\"><span class=\"note-l\">Parametri<\u002Fspan>23 club · 12 mesi.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h4 id=\"s41b\" class=\"sec lvl3\"><span class=\"sec-t\">6.3.3. Business Case: PerfectGym&nbsp;+&nbsp;Finion&nbsp;Pay vs Gymnasium + TSPay<\u002Fspan><\u002Fh4><p>Con PerfectGym&nbsp;+&nbsp;Finion&nbsp;Pay si ottiene sia il Payment Gateway sia un gestionale completo per la gestione operativa del business. La tabella seguente confronta l’investimento complessivo a pari perimetro (23&nbsp;club) rispetto alla soluzione precedente Gymnasium&nbsp;+&nbsp;TSPay.<\u002Fp><div class=\"tbl-wrap\"><table class=\"gen\"><caption>Investimento incrementale vs valore generato<\u002Fcaption><thead><tr><th>Voce di costo<\u002Fth><th>Descrizione<\u002Fth><th class=\"num\">PerfectGym&nbsp;+&nbsp;Finion<\u002Fth><th class=\"num\">Gymnasium&nbsp;+&nbsp;TSPay<\u002Fth><\u002Ftr><\u002Fthead><tbody><tr><td>Costo di licenza<\u002Ftd><td>Gestionale annuo (23&nbsp;club)<\u002Ftd><td class=\"num\">133&nbsp;K&nbsp;€<\u002Ftd><td class=\"num\">100&nbsp;K&nbsp;€<\u002Ftd><\u002Ftr><tr><td>Payment Service Provider&nbsp;*<\u002Ftd><td>Commissioni PSP su transazioni carta<\u002Ftd><td class=\"num\">190&nbsp;K&nbsp;€<\u002Ftd><td class=\"num\">310&nbsp;K&nbsp;€<\u002Ftd><\u002Ftr><tr><td>POS<\u002Ftd><td>Finion Pay · terminali POS<\u002Ftd><td class=\"num\">7&nbsp;K&nbsp;€<\u002Ftd><td class=\"num\">—<\u002Ftd><\u002Ftr><tr><td>Terminali di accesso<\u002Ftd><td>Terminali remoti per il controllo accessi<\u002Ftd><td class=\"num\">—<\u002Ftd><td class=\"num\">50&nbsp;K&nbsp;€<\u002Ftd><\u002Ftr><tr><td>Kick-off di progetto<\u002Ftd><td>Costi di avvio e governance<\u002Ftd><td class=\"num\">30&nbsp;K&nbsp;€<\u002Ftd><td class=\"num\">—<\u002Ftd><\u002Ftr><tr class=\"tot\"><td>Totale<\u002Ftd><td><\u002Ftd><td class=\"num\">360&nbsp;K&nbsp;€<\u002Ftd><td class=\"num\">460&nbsp;K&nbsp;€<\u002Ftd><\u002Ftr><tr class=\"tot\" style=\"border-top:none\"><td style=\"color:var(--ok);font-weight:600\">Risparmio · a pari perimetro<\u002Ftd><td><\u002Ftd><td class=\"num\" style=\"color:var(--ok)\">−&nbsp;100&nbsp;K&nbsp;€<\u002Ftd><td class=\"num\">—<\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable><\u002Fdiv><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Risparmio<\u002Fspan>−&nbsp;100&nbsp;K&nbsp;€ a pari perimetro su 14&nbsp;M&nbsp;€ fatturato carte.<\u002Faside><aside class=\"note\" style=\"margin-top:20px\"><span class=\"note-l\">Note<\u002Fspan>Confronto a pari perimetro (23&nbsp;club); PSP calcolato su 14&nbsp;M&nbsp;€ di fatturato da carte di credito, attuale perimetro gestito con TSPay.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h3 id=\"s43\" class=\"sec lvl2\"><span class=\"sec-t\">6.4. Conclusioni<\u002Fspan><\u002Fh3><p>In conclusione, l'attività di Software Selection ha permesso di identificare PerfectGym ed Exerp partner tecnologici più idonei a supportare il piano di sviluppo di Orange Palestre Italiane. Entrambe le soluzioni si distinguono per la solidità architetturale, la governance centralizzata di network multi-club e l’efficacia nell'integrazione di flussi finanziari complessi, con particolare riferimento alla gestione degli addebiti diretti SDD (SEPA Direct Debit) e dei diversi gateway di pagamento.  La scelta definitiva tra le due piattaforme sarà guidata  da una valutazione strategica volta a bilanciare le specifiche coperture funzionali con il cultural fit organizzativo e le priorità di business di breve e lungo periodo.  Il presente documento fornisce al management una base decisionale oggettiva e strutturata per guidare una trasformazione digitale orientata all’eccellenza  operativa, all'ottimizzazione della customer experience e al controllo analitico delle performance di ciascun centro. <\u002Fp><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>PerfectGym ed Exerp sono i partner più idonei. La scelta finale bilancerà copertura funzionale, cultural fit e priorità di business.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk annex-start\"><div class=\"body\"><h2 id=\"s44\" class=\"sec lvl1\"><span class=\"secnum\">7<\u002Fspan><span class=\"sec-t\">Allegati<\u002Fspan><\u002Fh2><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>Documento di dettaglio: i requisiti completi (funzionali e tecnici) su cui si è basata la valutazione.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h3 id=\"s45\" class=\"sec lvl2\"><span class=\"secnum\">A1<\u002Fspan><span class=\"sec-t\">Introduzione<\u002Fspan><\u002Fh3><p>Il presente documento definisce il perimetro di azione della Software Selection per la nuova piattaforma  di gestione del gruppo Orange Palestre Italiane. L’attività di analisi si è focalizzata, in particolare, sui seguenti processi Orange Palestre Italiane: <\u002Fp><ul><li>Sottoscrizione abbonamento di prova<\u002Fli><li>Sottoscrizione abbonamento mensile o annuale <\u002Fli><li>Sospensione di un abbonamento <\u002Fli><li>Disdetta di un abbonamento<\u002Fli><\u002Ful><p>Le analisi svolte  hanno consentito di mappare il funzionamento attuale, identificando criticità, punti di debolezza  e le relative soluzioni necessarie. Il documento ha dunque l’obiettivo di riportare i requisiti funzionali e tecnici necessari alla selezione del software per dotare l'organizzazione di uno strumento capace di incrementare l'efficienza e migliorare la  gestione strategica dei clienti e dei piani di abbonamento. <\u002Fp><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>Sintesi del processo di Software Selection per dotare Orange Palestre Italiane di una piattaforma di gestione palestre all’avanguardia, in sostituzione di Gymnasium.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h3 id=\"s46\" class=\"sec lvl2\"><span class=\"secnum\">A2<\u002Fspan><span class=\"sec-t\">Obiettivi della soluzione software<\u002Fspan><\u002Fh3><p>La nuova soluzione software dovrà risolvere le criticità attuali e supportare la gestione  dei clienti e dei relativi abbonamenti. Nello specifico, gli obiettivi includono:<\u002Fp><ul><li>Ottimizzazione operativa: fornire una piattaforma che migliori l’operabilità riducendo l’effort manuale delle diverse funzioni aziendali e i rischi di disallineamento delle informazioni;<\u002Fli><li>Gestione commerciale: consentire la corretta vendita e gestione degli abbonamenti;<\u002Fli><li>Automazione dei flussi: garantire una gestione efficace e automatizzata delle sospensioni e delle disdette degli abbonamenti;<\u002Fli><li>Gestione finanziaria: facilitare la riscossione dei pagamenti e il monitoraggio tempestivo degli insoluti;<\u002Fli><li>Centralizzazione del dato: garantire un flusso informativo unico e sempre aggiornato, eliminando la frammentazione tra i diversi club;<\u002Fli><li>Integrazione ed ecosistema: fornire uno strumento integrabile con i sistemi già in uso in Orange Palestre Italiane per garantire un ecosistema aziendale coeso e performante;<\u002Fli><li>Business Intelligence e Reporting: consentire la visibilità immediata sullo stato attuale dei club, dell’anagrafica soci e dei contratti, attraverso report chiari e accessibili a tutti i diversi livelli dell'organizzazione;<\u002Fli><li>Engagement e Comunicazione: semplificare la gestione delle comunicazioni e promozioni verso gli utenti di Orange Palestre Italiane.<\u002Fli><\u002Ful><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>Otto aree obiettivo: ottimizzazione operativa, gestione commerciale, automazione, finanza, centralizzazione, integrazione, BI e engagement.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h3 id=\"s47\" class=\"sec lvl2\"><span class=\"secnum\">A3<\u002Fspan><span class=\"sec-t\">Requisiti Funzionali<\u002Fspan><\u002Fh3><p>La soluzione software dovrà supportare l'operatività dello staff e l'esperienza del cliente finale lungo l’intero cicla di vita del socio: a partire dalla registrazione del nuovo utente fino alla risoluzione del rapporto contrattuale <\u002Fp><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>Requisiti lungo l’intero ciclo di vita del socio, dalla registrazione alla disdetta, in 6 aree.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h4 id=\"s48\" class=\"sec lvl3\"><span class=\"sec-t\">3.1. Gestione anagrafica e prime iterazioni con il cliente<\u002Fspan><\u002Fh4><ul><li>Inserimento dati e documenti e archiviazione: Compilazione delle informazioni anagrafiche del cliente e caricamento dei relativi documenti (firma, tessera sanitaria, foto, certificati, privacy, contratti, ecc.) acquisiti via scanner/webcam e/o email. Tutti i dati e relativi documenti devono essere archiviati automaticamente al salvataggio delle stesse;<\u002Fli><li>Ricerca rapida: Possibilità di effettuare una ricerca rapida dei clienti mediante filtri incrociati (es. nome, scadenza, provenienza, tag);<\u002Fli><li>Pianificazione e gestione degli appuntamenti: Pianificazione e inserimento automatico degli appuntamenti nelle agende dello staff del club  (es. tour del centro, Personal Training, ecc.) e gestione degli stessi (es. modifica appuntamento, cancellazione, ecc.);<\u002Fli><li>Registro attività di pre-vendita: Gestione di tutte le interazioni pre-vendita (es. tour effettuati, telefonate, esito prova, ecc.) e registrazione delle stesse;<\u002Fli><li>Categorizzazione cliente: Il sistema deve fornire la possibilità di categorizzare automaticamente il cliente in funzione delle informazioni anagrafiche presenti (es. utente \"Attivo\" se ha un abbonamento associato,  utente \"Prospect\" se si è solo registrato e/o informato del club, utente \"Ex Soci\" per chi ha disdetto l'abbonamento, ecc.) e della frequenza di ingressi al club.<\u002Fli><\u002Ful><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>Anagrafica e documenti, ricerca rapida, appuntamenti, registro pre-vendita, categorizzazione automatica del cliente.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h4 id=\"s49\" class=\"sec lvl3\"><span class=\"sec-t\">3.2. Gestione Vendita e Abbonamenti<\u002Fspan><\u002Fh4><ul><li>Gestione catalogo: Il sistema deve consentire di poter gestire diverse tipologie di abbonamento (es. annuale, mensile, carnet, ecc.) ed associarlo al relativo cliente. Ogni tipo di abbonamento, che sia venduto online oppure vis-a-vis, deve essere un'unica entità;<\u002Fli><li>Catalogo dinamico: Il sistema deve proporre in real-time i prodotti disponibili e quindi acquistabili dall'utente in funzione della categoria di appartenenza (es. cliente attivo con abbonamento \"Gold\" può acquistare l'abbonamento \"Platinum\", un cliente non attivo \"Prospect\" vede la prova e gli abbonamenti disponibili,  utenti \"Ex Soci\" le offerte welcome-back) oppure di offerte a tempo;<\u002Fli><li>Conversione prova in abbonamento: Conversione della \"Prova 7 giorni\" ad abbonamento pagante mediante azione manuale dell'operatore (se prima dello scadere dei 7 giorni) oppure automatica allo scadere del 7° giorno;<\u002Fli><li>Disdetta prova: Il sistema deve consentire all'utente di annullare la conversione della prova in abbonamento prima della scadenza dei 7 giorni;<\u002Fli><li>Calcolo automatico pro rata post 15 del mese: Per un nuovo iscritto vis-a-vis dopo il 15 del mese, il sistema deve calcolare in automatico il rateo giornaliero fino a fine mese (in proporzione alla spesa di tutto il mese), che va a sommarsi alla rata del mese successivo per il pagamento in un'unica transazione<\u002Fli><li>Calcolo automatico pro rata prima del 15 del mese: Per un nuovo iscritto vis-a-vis prima del 15 del mese, il sistema deve calcolare in automatico il rateo giornaliero fino a fine mese (in proporzione alla spesa di tutto il mese) per il pagamento del mese corrente;<\u002Fli><li>Conversione automatica abbonamento pro rata: Alla scadenza di un abbonamento pro rata a fine mese (pre o post 15 del mese) il sistema deve automaticamente convertire l'abbonamento nell'abbonamento mensile scelto dall'utente e generare il corrispettivo pagamento;<\u002Fli><li>Rinnovo automatico dell'abbonamento: Solo per gli abbonati mensili, il sistema deve consentire il rinnovo automatico dell'abbonamento secondo la regola del tacito rinnovo (es. non presentata disdetta o sospensione prima della scadenza mensile) e generare la rata per il relativo addebito;<\u002Fli><li>Sospensioni abbonamento: Deve essere fornita la possibilità all'utente (sia vis-a-vis che mediante app/website) di sospendere l'abbonamento fino a un giorno prima del rinnovo dello stesso. La sospensione dell'abbonamento deve avere la durata di 1 mese e quindi bloccare  temporaneamente la generazione della rata o spostarla al mese successivo;<\u002Fli><li>Disdetta abbonamento: Deve essere fornita la possibilità all'utente (sia vis-a-vis che mediante app/website) di disdire l'abbonamento fino a un giorno prima del rinnovo dello stesso. La disdetta dell'abbonamento deve prevedere la generazione di un pagamento come penale di disdetta corrispondente alla metà del valore dell'abbonamento usufruito;<\u002Fli><li>Automazione comunicazioni: Invio di Email/SMS automatici basato su trigger come eventi/appuntamenti (es. compleanni, scadenze, messaggio di benvenuto) o promozioni sia ad utenti che al personale della palestra;<\u002Fli><li>Personalizzazione delle comunicazioni: I contenuti delle comunicazioni via email o SMS devono essere personalizzabili in funzione della tipologia di trigger ricevuto;<\u002Fli><li>Gestione Insoluti mancato pagamento: Il sistema deve rilevare automaticamente i mancati pagamenti delle rate di abbonamento (Carta di Credito o SEPA), applicare il blocco/sospensione dell’accesso dell’utente e generare automaticamente un addebito di oneri amministrativi configurabile. La logica deve operare ragionando sulla singola rata/abbonamento mensile, consentendo l’applicazione della penale più volte nel tempo per lo stesso utente in caso di mancati pagamenti su più rate/mensilità di abbonamento.<\u002Fli><\u002Ful><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>Catalogo, pro-rata pre/post 15 del mese, rinnovo, sospensioni, disdetta con penale, comunicazioni e gestione insoluti.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h4 id=\"s50\" class=\"sec lvl3\"><span class=\"sec-t\">3.3. Struttura e accessibilità<\u002Fspan><\u002Fh4><ul><li>Gestione Multi-Tenant: Il sistema deve supportare una struttura gerarchica multilivello (es. Gruppo &gt; Zone/Aree &gt; Singolo Club) con la possibilità di ereditarietà delle configurazioni dall'elemento principale ai suoi sottoelementi;<\u002Fli><li>Permessi account: Il sistema deve consentire un modello di gestione multi-livello dei permessi (es. Super Admin con pieni poteri sulle funzionalità disponibili, Cliente limitato alle prenotazioni, ecc.), garantendo l'accesso a diverse funzionalità o club tramite un'identità univoca, senza necessità di logout o switch di profilo;<\u002Fli><li>Integrazione con altri sistemi: Il software deve consentire la possibilità di integrarsi con altri sistemi gestionali (es. ERP);<\u002Fli><li>Aggiornamento informazioni database: L'aggiornamento delle informazioni deve avvenire real-time;<\u002Fli><li>Finance &amp; Payments online: Il software non deve vincolare l'azienda all'utilizzo di un Acquirer (circuito di incasso) proprietario o pre-integrato dal fornitore. La piattaforma deve essere tecnicamente aperta (\"Gateway Agnostic\") e permettere l'integrazione tramite API o connettori nativi con Gateway di Pagamento terzi (es. Stripe, Adyen, PayPal) o direttamente con i sistemi interbancari (Corporate Banking), consentendo a Orange Palestre Italiane di utilizzare i propri Merchant Account già negoziati per le transazioni online;<\u002Fli><li>Finance &amp; Payments offline: il software deve garantire l'esportazione dei flussi di pagamento in formato XML ISO 20022 per la gestione dei mandati acquisiti offline (sottoscritti sia in formato cartaceo che digitale) e supportare il dialogo con i sistemi interbancari (es. servizio SEDA) per l'allineamento dei dati del debitore;<\u002Fli><li>Relazione dati: Il sistema deve prevedere una struttura dati relazionale in cui ogni Ordine di Acquisto sia collegato tramite Foreign Key (ID univoci) sia all'anagrafica Utente che al catalogo Prodotti/Servizi;<\u002Fli><li>Ambiente di Test e Simulazione: Il fornitore deve mettere a disposizione Sandbox logicamente isolato dalla produzione per attività di sviluppo e test. Tale ambiente deve replicare esattamente l'ambiente di produzione  e permettere l'esecuzione di cicli end-to-end (E2E), inclusa la simulazione dei pagamenti.<\u002Fli><\u002Ful><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>Multi-tenant, permessi, integrazioni ERP, real-time, finance gateway-agnostic, XML SEPA, relazione dati, sandbox.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h4 id=\"s51\" class=\"sec lvl3\"><span class=\"sec-t\">3.4. Gym Experience<\u002Fspan><\u002Fh4><ul><li>Verifica real-time accesso alla struttura: Riconoscimento dell'utente nei diversi club e  blocco/sblocco dei varchi basato su: validità e tipologia di abbonamento, certificato medico presente, saldo pagamenti, contratto firmato, ecc.;<\u002Fli><li>Autonomia utilizzo servizi: Attivazione docce, phon e armadietti tramite badge;<\u002Fli><li>Integrazione Vending: Protocollo di comunicazione con distributori automatici per acquisto tramite badge;<\u002Fli><li>Gestione Palinsesto Corsi: Il sistema deve consentire l'inserimento, la gestione e modifica dei corsi disponibili nel club, oltre che l'assegnazione ed eventuale modifica degli istruttori e delle relative sale;<\u002Fli><li>Gestione delle prenotazioni: Il sistema deve prevedere la funzionalità di Prenotazione/Cancellazione del corso via app o website e, in caso di esaurimento dei posti disponibili; prevedere la gestione della \"Lista d'attesa\" per ordine di iscrizione al corso;<\u002Fli><li>Prenotazione altri servizi (es. visita medica): Il sistema deve prevedere la funzionalità di prenotazione di altri servizi messi a disposizione all'utente (es. visita medica) prenotando la risorsa (medico/stanza) direttamente dal proprio account. La prenotazione del servizio deve prevedere il pagamento dello stesso al momento della prenotazione  in modo da garantire il legame diretto tra incasso e servizio.<\u002Fli><\u002Ful><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>Accessi real-time, autonomia servizi, vending, palinsesto corsi, prenotazioni e altri servizi (es. visita medica).<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h4 id=\"s52\" class=\"sec lvl3\"><span class=\"sec-t\">3.5. Documenti<\u002Fspan><\u002Fh4><ul><li>Documentazione a supporto: Deve essere messa a disposizione di Orange Palestre Italiane la documentazione tecnica di supporto per la corretta gestione del flusso dati. Questa dovrà sempre essere aggiornata e, in caso di modifiche impattanti, sarà cura del fornitore darne comunicazione tempestivamente. Le modalità di comunicazione preferenziali sono a discapito del fornitore.<\u002Fli><\u002Ful><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>Documentazione tecnica sempre aggiornata, con comunicazione tempestiva delle modifiche impattanti.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h4 id=\"s53\" class=\"sec lvl3\"><span class=\"sec-t\">3.6. Analisi Dati e BI<\u002Fspan><\u002Fh4><ul><li>Dashboard: Possibilità di visualizzazione dei dati (es.  tasso di abbandono, nuovi contratti, vendite per operatore. ecc.) mediante grafici, tabelle e dashboard;<\u002Fli><li>Export dati: Possibilità di esportazione dei dati in diversi formati (es. .CSV, .XLS, .XML, .PDF, ecc.).<\u002Fli><\u002Ful><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>Dashboard e visualizzazioni; export dati in più formati (CSV, XLS, XML, PDF).<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h3 id=\"s54\" class=\"sec lvl2\"><span class=\"secnum\">A4<\u002Fspan><span class=\"sec-t\">Requisiti Tecnici<\u002Fspan><\u002Fh3><p>Di seguito sono elencate le caratteristiche tecniche della soluzione software per garantire che il nuovo sistema sia scalabile, sicuro e integrabile con l'App e il Sito.<\u002Fp><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>Caratteristiche tecniche per un sistema scalabile, sicuro e integrabile: architettura, sicurezza dati, supporto e adozione.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h4 id=\"s55\" class=\"sec lvl3\"><span class=\"sec-t\">4.1. Architettura e Integrazione<\u002Fspan><\u002Fh4><ul><li>Cloud Native &amp; SaaS: La soluzione deve essere accessibile via web browser (no VPN/Desktop Remoto) o mediante applicazione;<\u002Fli><li>API: Il software deve esporre endpoint in modo da poter supportare l'utilizzo delle API per la lettura ed eventuale scrittura dei dati in tempo reale. Inoltre, sempre mediante API, deve poter consentire il recupero di pacchetti di informazioni (es. Profilo Utente + Abbonamento Attivo + Stato Pagamenti) in un'unica chiamata;<\u002Fli><li>Webhooks: Il sistema deve prevedere l'utilizzo di Webhooks per notificare in tempo reale il verificarsi di eventi o cambio dati (es. cambio stato utente, pagamento avvenuto).<\u002Fli><\u002Ful><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>Cloud Native &amp; SaaS, API per lettura/scrittura real-time e recupero pacchetti dati, Webhooks per eventi.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h4 id=\"s56\" class=\"sec lvl3\"><span class=\"sec-t\">4.2. Sicurezza e Dati<\u002Fspan><\u002Fh4><ul><li>Secure Authentication: In fase di registrazione e/o recupero password, nel sistema deve essere garantito che qualsiasi scambio di credenziali avvenga secondo i principi di sicurezza ASVS (Application Security Verification Standard) utilizzando il metodo HTTP POST, con payload trasmesso su canale cifrato;<\u002Fli><li>Token Lifecycle: Il sistema deve adottare un framework di gestione delle sessioni basato su standard di settore (JWT e/o OAuth2). È richiesto che ogni token sia associato a un Time-to-Live (TTL) predefinito e prevedere protocolli di revoca e invalidazione (es. Blacklisting o Rotation) per eliminare sessioni obsolete e prevenire accessi non autorizzati;<\u002Fli><li>Certificazione ISO 27001: Il fornitore deve possedere una certificazione valida ISO/IEC 27001 (Information Security Management System - ISMS) rilasciata da un organismo accreditato. Il perimetro di certificazione deve coprire l'intera infrastruttura cloud di erogazione del servizio SaaS, i processi di sviluppo del software e la gestione/archiviazione sicura dei dati dei clienti;<\u002Fli><li>Disaster recovery: Il sistema deve garantire la continuità del servizio e la protezione dei dati attraverso un'architettura ad Alta Affidabilità (HA) e un piano di Disaster Recovery (DR) conforme alle seguenti specifiche tecniche obbligatorie:<\u002Fli><li>Recovery Point Objective (RPO): Il target di allineamento dei dati tra l'infrastruttura primaria e quella di DR deve garantire una perdita massima di dati transazionali non superiore a 15 minuti;<\u002Fli><li>Recovery Time Objective (RTO): In caso di indisponibilità del sito primario, il ripristino completo delle funzionalità core (es. funzionalità di reception e App di prenotazione) nel sito secondario deve avvenire entro 60 minuti dalla dichiarazione del disastro;<\u002Fli><li>Ridondanza Geografica e Compliance: Entrambi i Data Center (Primario e DR) devono essere localizzati all'interno dell'Unione Europea (compliance GDPR);<\u002Fli><li>Trasparenza del Failover: Le procedure di switch sul sito di DR devono essere fully-managed lato provider. Il passaggio non deve richiedere alcuna riconfigurazione manuale (IP, endpoint API, credenziali o firmware) sui client di reception;<\u002Fli><li>Audit e Verifiche: Il fornitore dovrà impegnarsi contrattualmente all'esecuzione di test di failover annuali, con relativo rilascio del verbale di esito al cliente.<\u002Fli><\u002Ful><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>Autenticazione ASVS, token JWT/OAuth2 con TTL e revoca, ISO 27001, Disaster Recovery (RPO 15′ / RTO 60′, DC in UE).<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h4 id=\"s57\" class=\"sec lvl3\"><span class=\"sec-t\">4.3. Supporto tecnico e adozione<\u002Fspan><\u002Fh4><ul><li>Presenza sul territorio nazionale, formazione e supporto post go-live: Il fornitore deve garantire una solida e comprovata presenza sul territorio italiano (operando con filiali dirette o tramite una rete strutturata di partner certificati) per facilitare e guidare l'adozione del nuovo strumento nello staff di Orange Palestre Italiane. Le modalità con cui aiutare all'adozione dello strumento saranno a discrezione del fornitore (es. erogazione di sessioni di formazione dedicate, programmi di affiancamento operativo durante la transizione, supporto tempestivo per la gestione e la risoluzione dei bug nella fase critica di post go-live);<\u002Fli><li>Assistenza H24 con escalation prioritaria per area Finance &amp; Amministrazione: Il fornitore deve garantire un servizio di help desk e supporto tecnico attivo 24 ore su 24, 7 giorni su 7. In particolare per la risoluzione di anomalie critiche impattanti l'area amministrativa e finanziaria (es. malfunzionamenti legati all'addebito di penali per insoluto, interruzioni di comunicazione tra il gestionale e i gateway di pagamento, anomalie nella generazione delle rate per il tacito rinnovo mensile,  ecc.).<\u002Fli><\u002Ful><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>Presenza sul territorio italiano e supporto post go-live; help desk H24 con escalation prioritaria per Finance &amp; Amministrazione.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><\u002Fdiv><div class=\"margin\"><\u002Fdiv><\u002Fsection>\n<\u002Fdiv>\n<\u002Fmain>\n<\u002Fx-dc>\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Software Selection - Orange Palestre Italiane.dc"}
