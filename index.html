    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

    const templateEl = document.querySelector('script[type="__bundler/template"]');

    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    setStatus('Unpacking ' + uuids.length + ' assets...');

      const entry = manifest[uuid];

        const bytes = new Uint8Array(binaryStr.length);

            const reader = ds.readable.getReader();

            'e.preventDefault();' +

              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +

        // load/error, so awaiting would hang forever.

      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {

    }

    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });

      var gen = ++navGen;
      frame.onload = function() {

        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}

        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);

        else cw.scrollTo(0, 0);

ize:28px}\n  .req,.phases li,tr,.toc li,.reqlist{break-inside:avoid}\n  .sec{break-after:avoid}\n  .annex-start{break-before:page}\n  .toc a:hover,.body a{color:inherit}\n  .execsum{background:#faf8f2!important;padding:22px 26px;break-inside:auto}\n  .es-verdict{break-inside:avoid;background:var(--okbg)!important}\n  .execsum h2.es-title{font-size:21px}\n  .execsum h3.es{break-after:avoid}\n  .execsum h4.es{break-after:avoid}\n}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div class=\"sheet\">\n<header class=\"cover\">\n  <img class=\"logo\" src=\"3f812450-9da2-4a0e-a92b-70e5c6f2334c\" alt=\"HUWARE\">\n  <div class=\"kick\">Software Selection · Report di valutazione<\u002Fdiv>\n  <h1>Club Management Software<\u002Fh1>\n  <p class=\"sub\">Analisi comparativa delle piattaforme gestionali per le palestre.<\u002Fp>\n  <div class=\"meta\">\n    <div><span class=\"ml\">Cliente<\u002Fspan><span class=\"mv\">Orange Palestre Italiane<\u002Fspan><\u002Fdiv>\n    <div><span class=\"ml\">A cura di<\u002Fspan><span class=\"mv\">HUWARE + ORANGE PALESTRE ITALIANE<\u002Fspan><\u002Fdiv>\n    <div><span class=\"ml\">Luogo &amp; data<\u002Fspan><span class=\"mv\">Milano, 22/06/2026<\u002Fspan><\u002Fdiv>\n    <div><span class=\"ml\">Versione<\u002Fspan><span class=\"mv\">V1<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n<nav class=\"toc\"><div class=\"toc-lab\">Indice<\u002Fdiv><ol><li class=\"toc-1\"><a href=\"#s0\"><span>Executive Summary<\u002Fspan><\u002Fa><\u002Fli><li class=\"toc-1\"><a href=\"#s1\"><span>1. Introduzione<\u002Fspan><\u002Fa><\u002Fli><li class=\"toc-1\"><a href=\"#s2\"><span>2. Obiettivi della Software Selection<\u002Fspan><\u002Fa><\u002Fli><li class=\"toc-1\"><a href=\"#s3\"><span>3. Analisi dei Software<\u002Fspan><\u002Fa><\u002Fli><li class=\"toc-2\"><a href=\"#s4\"><span>3.1. Riepilogo dei requisiti Must Have e Nice to have<\u002Fspan><\u002Fa><\u002Fli><li class=\"toc-2\"><a href=\"#s7\"><span>3.2. I Software analizzati<\u002Fspan><\u002Fa><\u002Fli><li class=\"toc-1\"><a href=\"#s8\"><span>4. Prima pre-selezione<\u002Fspan><\u002Fa><\u002Fli><li class=\"toc-1\"><a href=\"#s9\"><span>5. Seconda pre-selezione<\u002Fspan><\u002Fa><\u002Fli><li class=\"toc-2\"><a href=\"#s10\"><span>5.1. VirtuaGym<\u002Fspan><\u002Fa><\u002Fli><li class=\"toc-2\"><a href=\"#s11\"><span>5.2. PerfectGym (Magicline)<\u002Fspan><\u002Fa><\u002Fli><li class=\"toc-2\"><a href=\"#s16\"><span>5.3. Exerp<\u002Fspan><\u002Fa><\u002Fli><li class=\"toc-2\"><a href=\"#s21\"><span>5.4. Showcloud (Showclub)<\u002Fspan><\u002Fa><\u002Fli><li class=\"toc-2\"><a href=\"#s26\"><span>5.5. GloFox<\u002Fspan><\u002Fa><\u002Fli><li class=\"toc-2\"><a href=\"#s31\"><span>5.6. Considerazioni<\u002Fspan><\u002Fa><\u002Fli><li class=\"toc-1\"><a href=\"#s32\"><span>6. Confronto tra Exerp e PerfectGym<\u002Fspan><\u002Fa><\u002Fli><li class=\"toc-2\"><a href=\"#s33\"><span>6.1. Approfondimento operatività Financial &amp; Administration<\u002Fspan><\u002Fa><\u002Fli><li class=\"toc-2\"><a href=\"#s36\"><span>6.2. Roadmap<\u002Fspan><\u002Fa><\u002Fli><li class=\"toc-2\"><a href=\"#s40\"><span>6.3. Costi<\u002Fspan><\u002Fa><\u002Fli><li class=\"toc-1\"><a href=\"#s44\"><span>7. Allegati<\u002Fspan><\u002Fa><\u002Fli><\u002Fol><\u002Fnav>\n<section class=\"execsum\" id=\"s0\" style=\"margin-top:64px;margin-bottom:64px;scroll-margin-top:24px\">\n  <div class=\"es-kick\">Executive Summary<\u002Fdiv>\n  <h2 class=\"es-title\">PerfectGym con Finion&nbsp;Pay: il razionale della scelta<\u002Fh2>\n  <p class=\"es-sub\">Sintesi per il management delle motivazioni, dei vantaggi operativi e funzionali che hanno guidato la scelta del nuovo strumento di gestione.<\u002Fp>\n  <div class=\"es-verdict\"><span class=\"vl\">La scelta<\u002Fspan><div><p class=\"vt\">PerfectGym, integrata con il sistema di pagamento Finion&nbsp;Pay.<\u002Fp><p class=\"vd\">Una piattaforma cloud-native, multi-club ed end-to-end — dalla gestione del cliente fino all'incasso — che risolve alla radice le criticità operative, amministrative e finanziarie dell'attuale gestionale, con una curva di adozione più contenuta e costi di roll-out inferiori rispetto all'alternativa Exerp.<\u002Fp><\u002Fdiv><\u002Fdiv>\n  <div class=\"es-body\"><div class=\"es-row\"><div class=\"es-rc\"><h3 class=\"es\"><span class=\"n\">1<\u002Fspan>Contesto e motivazioni del cambio<\u002Fh3><p>L'attuale sistema Gymnasium non risulta più adeguato a supportare il percorso di crescita di Orange Palestre Italiane, evidenziando limiti di scalabilità e significative inefficienze operative, in particolare nelle aree Finance e Amministrazione.<\u002Fp><p>Nel tempo tali criticità sono state mitigate attraverso processi manuali e workaround che, pur garantendo la continuità operativa, hanno aumentato il carico di lavoro e il rischio di errore senza risolvere le cause strutturali sottostanti. Nonostante una riduzione delle segnalazioni registrate nel corso dell'anno, permane un nucleo di problematiche riconducibili ai limiti del sistema. A ciò si aggiungono un ridotto livello di evoluzione tecnologica, limitate capacità di integrazione e scalabilità, l'obsolescenza della tecnologia utilizzata e crescenti rischi in ambito sicurezza e gestione dei dati.<\u002Fp><p>Riassumendo, le soluzioni implementate nel tempo hanno principalmente compensato le carenze della piattaforma, anziché superarle in modo strutturale.<\u002Fp><\u002Fdiv><aside class=\"es-note\"><span class=\"es-note-l\">In breve<\u002Fspan>Gymnasium non è più adeguato: inefficienze su Finance e amministrazione, workaround manuali, tecnologia obsoleta e rischi su dati e privacy.<\u002Faside><\u002Fdiv><div class=\"es-row\"><div class=\"es-rc\"><h3 class=\"es\"><span class=\"n\">2<\u002Fspan>Processo di valutazione<\u002Fh3><p>Alla luce delle criticità emerse, è stato avviato un processo strutturato di Software Selection finalizzato all'individuazione di una piattaforma in grado di supportare la crescita futura di Orange Palestre Italiane. Le soluzioni disponibili sul mercato italiano non sono risultate pienamente allineate alle dimensioni e alle ambizioni dell'azienda, orientando la ricerca verso provider europei con una maggiore specializzazione nel settore.<\u002Fp><p>Il processo di valutazione ha portato all'identificazione di due soluzioni particolarmente solide e coerenti con i requisiti aziendali:<\u002Fp><ul><li><b>PerfectGym<\u002Fb> (integrata con Finion&nbsp;Pay);<\u002Fli><li><b>Exerp<\u002Fb>.<\u002Fli><\u002Ful><p>A seguito delle analisi condotte, la soluzione individuata come riferimento è <b>PerfectGym con Finion&nbsp;Pay<\u002Fb>.<\u002Fp><\u002Fdiv><aside class=\"es-note\"><span class=\"es-note-l\">In breve<\u002Fspan>Selezione strutturata orientata a provider europei: due finaliste, PerfectGym&nbsp;+&nbsp;Finion&nbsp;Pay ed Exerp.<\u002Faside><\u002Fdiv><div class=\"es-row\"><div class=\"es-rc\"><h3 class=\"es\"><span class=\"n\">3<\u002Fspan>Soluzione selezionata: PerfectGym (integrata con Finion&nbsp;Pay)<\u002Fh3><\u002Fdiv><aside class=\"es-note\"><span class=\"es-note-l\">In breve<\u002Fspan>Piattaforma cloud-native multi-club con PSP nativo Finion&nbsp;Pay su Adyen: un unico prodotto end-to-end, dal cliente all'incasso.<\u002Faside><\u002Fdiv><div class=\"es-row\"><div class=\"es-rc\"><h4 class=\"es\">3.1 Architettura e modello<\u002Fh4><p>PerfectGym è una piattaforma cloud-native completamente web-based, che non richiede installazioni locali né infrastrutture dedicate. Progettata per supportare organizzazioni multi-club, offre flessibilità, scalabilità e copertura funzionale rispetto all'attuale gestionale, migliorando l'efficienza operativa sia a livello di singolo club sia nella gestione centralizzata del business.<\u002Fp><\u002Fdiv><aside class=\"es-note\"><span class=\"es-note-l\">In breve<\u002Fspan>Cloud-native e web-based, senza installazioni locali; pensata nativamente per gruppi multi-club.<\u002Faside><\u002Fdiv><div class=\"es-row\"><div class=\"es-rc\"><h4 class=\"es\">3.2 Gestione finanziaria e amministrativa: PSP integrato<\u002Fh4><p>Uno degli elementi distintivi della soluzione è l'integrazione nativa del sistema di pagamento all'interno della piattaforma. Finion&nbsp;Pay, sviluppato in stretta sinergia con PerfectGym e basato sull'infrastruttura di <b>Adyen<\u002Fb>, consente di gestire l'intero ciclo di vita del cliente e dei pagamenti da un unico ambiente operativo, senza la necessità di piattaforme o dashboard separate.<\u002Fp><p>Questo approccio <b>end-to-end<\u002Fb> elimina la tradizionale separazione tra gestionale e Payment Service Provider, favorendo un elevato livello di automazione e una significativa semplificazione dei processi amministrativi e finanziari. I benefici si possono tradurre in:<\u002Fp><ul><li>riduzione del rischio di errore e dell'effort necessario per la riscossione dei pagamenti SEPA, mediante l'introduzione dei pagamenti automatici giornalieri e la ricezione del relativo esito (come avviene attualmente per i pagamenti con carta);<\u002Fli><li>semplificazione della lista dei prodotti acquistabili dal socio, eliminando la necessità degli abbonamenti pro-rata per la riscossione dei pagamenti SEPA all'inizio del mese;<\u002Fli><li>velocizzazione della gestione degli insoluti, applicando automaticamente la penale prevista a seguito di un pagamento non andato a buon fine;<\u002Fli><li>supporto strutturato nella sostituzione o aggiornamento dei metodi di pagamento (es. pay by link) per la riscossione dei pagamenti non andati a buon fine.<\u002Fli><\u002Ful><p>A differenza di Exerp, che richiede l'integrazione con un sistema di pagamento esterno, la soluzione PerfectGym (integrata con Finion&nbsp;Pay) offre un ecosistema unificato, con un unico prodotto e un unico interlocutore responsabile dell'intera catena di servizio.<\u002Fp><\u002Fdiv><aside class=\"es-note\"><span class=\"es-note-l\">In breve<\u002Fspan>Finion&nbsp;Pay nativo (Adyen): incassi automatici, gestione insoluti e processi finanziari semplificati in un unico prodotto.<\u002Faside><\u002Fdiv><div class=\"es-row\"><div class=\"es-rc\"><h4 class=\"es\">3.3 Operatività di club<\u002Fh4><p>La piattaforma consente di gestire efficacemente e centralmente le configurazioni dei prodotti disponibili e delle modalità di comunicazione con i soci, offrendo una visione integrata del cliente con un'interfaccia assimilabile a un <b>CRM<\u002Fb>. Questa funzionalità permette ai club manager di accedere in modo immediato all'intera storia del cliente e di gestire le interazioni in maniera più efficace e strutturata.<\u002Fp><\u002Fdiv><aside class=\"es-note\"><span class=\"es-note-l\">In breve<\u002Fspan>Visione cliente in stile CRM e configurazioni centralizzate per i club manager.<\u002Faside><\u002Fdiv><div class=\"es-row\"><div class=\"es-rc\"><h4 class=\"es\">3.4 Integrazione dati<\u002Fh4><p>L'integrazione dei dati risulta coerente con il percorso che Orange Palestre Italiane intende intraprendere, contribuendo anche alla risoluzione di alcune criticità prestazionali precedenti. Si evidenzia inoltre un miglioramento nella disponibilità del dato e una riduzione dei costi associati al suo recupero.<\u002Fp><\u002Fdiv><aside class=\"es-note\"><span class=\"es-note-l\">In breve<\u002Fspan>Dati integrati con l'esistente, più disponibili e meno costosi da recuperare.<\u002Faside><\u002Fdiv><div class=\"es-row\"><div class=\"es-rc\"><h4 class=\"es\">3.5 Sicurezza e data privacy<\u002Fh4><p>La piattaforma soddisfa i requisiti di sicurezza sia sul fronte della data privacy sia in caso di Disaster Recovery.<\u002Fp><\u002Fdiv><aside class=\"es-note\"><span class=\"es-note-l\">In breve<\u002Fspan>Requisiti di data privacy e Disaster Recovery pienamente soddisfatti.<\u002Faside><\u002Fdiv><div class=\"es-row\"><div class=\"es-rc\"><h4 class=\"es\">3.6 Integrazioni con terze parti<\u002Fh4><p>Offre un ecosistema di integrazione che facilita la connessione con siti web, app e sistemi terzi, garantendo una flessibilità tecnologica che permette la costruzione di un ecosistema digitale integrato e facilmente evolvibile nel tempo.<\u002Fp><\u002Fdiv><aside class=\"es-note\"><span class=\"es-note-l\">In breve<\u002Fspan>Ecosistema aperto: integrazione con siti, app e sistemi terzi.<\u002Faside><\u002Fdiv><div class=\"es-row\"><div class=\"es-rc\"><h4 class=\"es\">3.7 Sistemi di pagamento<\u002Fh4><p>Mediante l'integrazione con Finion&nbsp;Pay, la soluzione consente l'automatizzazione dei pagamenti, con una progressiva evoluzione dal modello SEPA verso la <b>tokenizzazione delle carte di debito<\u002Fb>. Il nuovo assetto prevede la gestione integrata di carte di credito, carte di debito (non previsto da TS&nbsp;Pay) e SEPA, quest'ultimo utilizzato in modo residuale per clienti senza strumenti di pagamento digitali o in fase di migrazione. Verrà inoltre progressivamente introdotto il pagamento tramite <b>totem<\u002Fb> (modalità non gestibile con Gymnasium, privo dei device necessari), nativamente supportata da PerfectGym. Nel complesso si otterrà una significativa riduzione delle attività operative legate alla gestione degli incassi e un sistema di pagamento più automatizzato, efficiente e scalabile.<\u002Fp><\u002Fdiv><aside class=\"es-note\"><span class=\"es-note-l\">In breve<\u002Fspan>Pagamenti automatizzati: tokenizzazione della carta di debito, totem nativo, SEPA residuale.<\u002Faside><\u002Fdiv><div class=\"es-row\"><div class=\"es-rc\"><h3 class=\"es\"><span class=\"n\">4<\u002Fspan>Confronto PerfectGym + Finion&nbsp;Pay vs Exerp<\u002Fh3><p>Entrambe le soluzioni risultano valide e soddisfano i requisiti funzionali e tecnici mappati. La preferenza per PerfectGym è guidata da alcuni elementi chiave:<\u002Fp><ul><li>l'architettura integrata con Finion&nbsp;Pay consente una gestione <b>end-to-end<\u002Fb> del cliente, riducendo complessità operative ed errori e garantendo un unico referente di sistema; nel caso di Exerp gestionale e PSP restano separati;<\u002Fli><li>il <b>costo complessivo<\u002Fb> risulta significativamente inferiore rispetto a Exerp;<\u002Fli><li>l'interfaccia si distingue per una maggiore usabilità, pensata per essere intuitiva sia alla reception sia in head office; Exerp presenta un'impostazione più complessa e vicina alle logiche dell'attuale sistema;<\u002Fli><li>maggiore flessibilità nello sviluppo di personalizzazioni;<\u002Fli><li>curva di apprendimento più contenuta, con tempi e costi di adozione inferiori e un rollout sui club facilitato;<\u002Fli><li>l'integrazione con il provider di pagamento Finion&nbsp;Pay, basata su Adyen, garantisce un'infrastruttura PSP di livello europeo altamente affidabile.<\u002Fli><\u002Ful><\u002Fdiv><aside class=\"es-note\"><span class=\"es-note-l\">In breve<\u002Fspan>Entrambe valide; PerfectGym preferita per architettura integrata, costo inferiore, usabilità e adozione più rapida.<\u002Faside><\u002Fdiv><div class=\"es-row\"><div class=\"es-rc\"><h3 class=\"es\"><span class=\"n\">5<\u002Fspan>Sintesi<\u002Fh3><p>PerfectGym ed Exerp rappresentano entrambe soluzioni valide e comparabili sotto diversi profili. La scelta ricade su <b>PerfectGym (integrata con Finion&nbsp;Pay)<\u002Fb> in quanto maggiormente allineata alla struttura organizzativa e al modello operativo di Orange Palestre Italiane — assetto dei club, organizzazione dei team e volumi di clientela — e in grado di garantire un impatto più contenuto in termini di costi e tempi di adozione del nuovo sistema.<\u002Fp><\u002Fdiv><aside class=\"es-note\"><span class=\"es-note-l\">In breve<\u002Fspan>Scelta PerfectGym&nbsp;+&nbsp;Finion&nbsp;Pay: più allineata a struttura e modello operativo, con minor impatto su costi e tempi di adozione.<\u002Faside><\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n<section class=\"blk\"><div class=\"body\"><h2 id=\"s1\" class=\"sec lvl1\"><span class=\"secnum\">1<\u002Fspan><span class=\"sec-t\">Introduzione<\u002Fspan><\u002Fh2><p>Il presente documento costituisce la sintesi delle attività svolte inerenti al processo di Software Selection volto a dotare Orange Palestre Italiane di una piattaforma di gestione delle palestre all'avanguardia. <\u002Fp><p>Il report illustra l'analisi comparativa svolta su diverse soluzioni software, valutate rispetto ai requisiti funzionali e tecnici emersi durante la fase di intervista, con l'obiettivo di sottoporre al management la soluzione più qualificata tra i candidati considerati. <\u002Fp><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>Sintesi del processo di Software Selection per dotare Orange Palestre Italiane di una piattaforma di gestione palestre all’avanguardia, in sostituzione di Gymnasium.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h2 id=\"s2\" class=\"sec lvl1\"><span class=\"secnum\">2<\u002Fspan><span class=\"sec-t\">Obiettivi della Software Selection<\u002Fspan><\u002Fh2><p>La Software Selection mira a identificare una soluzione volta non solo alla sostituzione  di Gymnasium, ma alla risoluzione delle inefficienze funzionali riscontrate,  garantendo un supporto evoluto nella gestione  del ciclo di vita del cliente e dei piani di abbonamento. In particolare, si intende proseguire i seguenti obiettivi:<\u002Fp><ul><li>fornire una piattaforma che migliori l’operabilità riducendo l’effort manuale delle diverse funzioni aziendali e i rischi di disallineamento delle informazioni;<\u002Fli><li>consentire la corretta vendita e gestione degli abbonamenti;<\u002Fli><li>garantire un efficace e automatizzata gestione delle sospensioni e delle disdette degli abbonamenti;<\u002Fli><li>facilitare la gestione dei pagamenti degli abbonamenti e relativi insoluti;<\u002Fli><li>garantire un flusso di dati centralizzato e sempre aggiornato, eliminando la frammentazione tra i diversi club;<\u002Fli><li>consentire la visibilità immediata sullo stato attuale dei club, dei suoi clienti e dei relativi abbonamenti attraverso report chiari e accessibili a tutti i livelli dell'organizzazione;<\u002Fli><li>fornire uno strumento integrabile con i sistemi esistenti in Orange Palestre Italiane per garantire un ecosistema aziendale coeso e performante;<\u002Fli><li>Facilitare la gestione delle comunicazioni e promozioni verso gli utenti di Orange Palestre Italiane.<\u002Fli><\u002Ful><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>Otto obiettivi: ridurre l’effort manuale, vendere e gestire abbonamenti, automatizzare sospensioni e disdette, gestire pagamenti e insoluti, centralizzare il dato, integrare i sistemi e migliorare reporting e comunicazioni.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h2 id=\"s3\" class=\"sec lvl1\"><span class=\"secnum\">3<\u002Fspan><span class=\"sec-t\">Analisi dei Software<\u002Fspan><\u002Fh2><p>Il punto di partenza è stato il mapping dei requisiti funzionali e tecnici, distinti per Must Have e Nice to Have, e la successiva valutazione di un ampio spettro di diverse soluzioni di mercato, al fine di identificare quelle più allineate con gli obiettivi strategici di Orange Palestre Italiane.<\u002Fp><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>Mapping dei requisiti Must Have / Nice to Have e valutazione comparativa di un ampio panel di soluzioni di mercato.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h3 id=\"s4\" class=\"sec lvl2\"><span class=\"sec-t\">3.1. Riepilogo dei requisiti Must Have e Nice to have<\u002Fspan><\u002Fh3><p>Di seguito si riporta il prospetto di sintesi dei requisiti identificati in fase di analisi, sui quali si è basata la valutazione comparativa delle piattaforme.  Al paragrafo “Allegati” è disponibile il documento “Requisiti per la software selection dello strumento di gestione delle palestre”, in cui sono descritti i dettagli di ogni singolo requisito. <\u002Fp><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>45 requisiti in totale — 36 funzionali e 9 tecnici — ciascuno classificato come Must Have o Nice to Have.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h4 id=\"s5\" class=\"sec lvl3\"><span class=\"sec-t\">3.1.1. Requisiti Funzionali<\u002Fspan><\u002Fh4><div class=\"tbl-wrap\"><table class=\"reqsum\"><thead><tr><th>Cod.<\u002Fth><th>Categoria<\u002Fth><th>Requisito<\u002Fth><th>Priorità<\u002Fth><\u002Ftr><\u002Fthead><tbody><tr><td class=\"cod\">R_001<\u002Ftd><td>Analisi Dati e BI<\u002Ftd><td>Dashboard<\u002Ftd><td><span class=\"pill nice\">Nice to Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_002<\u002Ftd><td>Analisi Dati e BI<\u002Ftd><td>Export dati<\u002Ftd><td><span class=\"pill nice\">Nice to Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_003<\u002Ftd><td>Documentazione<\u002Ftd><td>Documentazione a supporto<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_004<\u002Ftd><td>Gestione anagrafica e prime iterazioni con il cliente<\u002Ftd><td>Inserimento dati e documenti e archiviazione<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_005<\u002Ftd><td>Gestione anagrafica e prime iterazioni con il cliente<\u002Ftd><td>Ricerca rapida<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_006<\u002Ftd><td>Gestione anagrafica e prime iterazioni con il cliente<\u002Ftd><td>Pianificazione e gestione degli appuntamenti<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_007<\u002Ftd><td>Gestione anagrafica e prime iterazioni con il cliente<\u002Ftd><td>Registro attività di pre-vendita<\u002Ftd><td><span class=\"pill nice\">Nice to Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_008<\u002Ftd><td>Gestione anagrafica e prime iterazioni con il cliente<\u002Ftd><td>Categorizzazione cliente<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_009<\u002Ftd><td>Gestione vendita e abbonamenti<\u002Ftd><td>Gestione catalogo<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_010<\u002Ftd><td>Gestione vendita e abbonamenti<\u002Ftd><td>Catalogo dinamico<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_011<\u002Ftd><td>Gestione vendita e abbonamenti<\u002Ftd><td>Conversione prova in abbonamento<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_012<\u002Ftd><td>Gestione vendita e abbonamenti<\u002Ftd><td>Disdetta prova<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_013<\u002Ftd><td>Gestione vendita e abbonamenti<\u002Ftd><td>Calcolo automatico pro rata post 15 del mese<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_014<\u002Ftd><td>Gestione vendita e abbonamenti<\u002Ftd><td>Calcolo automatico pro rata prima del 15 del mese<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_015<\u002Ftd><td>Gestione vendita e abbonamenti<\u002Ftd><td>Conversione automatica abbonamento pro rata<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_016<\u002Ftd><td>Gestione vendita e abbonamenti<\u002Ftd><td>Rinnovo automatico dell'abbonamento<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_017<\u002Ftd><td>Gestione vendita e abbonamenti<\u002Ftd><td>Sospensioni abbonamento<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_018<\u002Ftd><td>Gestione vendita e abbonamenti<\u002Ftd><td>Disdetta abbonamento<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_019<\u002Ftd><td>Gestione vendita e abbonamenti<\u002Ftd><td>Automazione comunicazioni<\u002Ftd><td><span class=\"pill nice\">Nice to Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_020<\u002Ftd><td>Gestione vendita e abbonamenti<\u002Ftd><td>Personalizzazione delle comunicazioni<\u002Ftd><td><span class=\"pill nice\">Nice to Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_040<\u002Ftd><td>Gestione vendita e abbonamenti<\u002Ftd><td>Gestione Insoluti mancato pagamento<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_043<\u002Ftd><td>Gestione vendita e abbonamenti<\u002Ftd><td>Loyality e programma referral (\"es. Presenta un Amico)<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_021<\u002Ftd><td>GYM Experience<\u002Ftd><td>Verifica real-time accesso alla struttura<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_022<\u002Ftd><td>GYM Experience<\u002Ftd><td>Autonomia utilizzo servizi<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_023<\u002Ftd><td>GYM Experience<\u002Ftd><td>Integrazione Vending<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_024<\u002Ftd><td>GYM Experience<\u002Ftd><td>Gestione Palinsesto Corsi<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_025<\u002Ftd><td>GYM Experience<\u002Ftd><td>Gestione delle prenotazioni<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_026<\u002Ftd><td>GYM Experience<\u002Ftd><td>Prenotazione altri servizi (es. visita medica)<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_027<\u002Ftd><td>Struttura e accessibilità<\u002Ftd><td>Gestione Multi-Tenant<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_028<\u002Ftd><td>Struttura e accessibilità<\u002Ftd><td>Permessi account<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_029<\u002Ftd><td>Struttura e accessibilità<\u002Ftd><td>Integrazione con altri sistemi<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_030<\u002Ftd><td>Struttura e accessibilità<\u002Ftd><td>Aggiornamento informazioni database<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_031<\u002Ftd><td>Struttura e accessibilità<\u002Ftd><td>Finance &amp; Payments online<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_032<\u002Ftd><td>Struttura e accessibilità<\u002Ftd><td>Finance &amp; Payments offline<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_038<\u002Ftd><td>Struttura e accessibilità<\u002Ftd><td>Relazione dati<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_039<\u002Ftd><td>Struttura e accessibilità<\u002Ftd><td>Ambiente di Test e Simulazione<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable><\u002Fdiv><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>Requisiti funzionali mappati per area (anagrafica, vendita e abbonamenti, GYM experience, struttura e accessibilità), distinti tra Must Have e Nice to Have.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h4 id=\"s6\" class=\"sec lvl3\"><span class=\"sec-t\">3.1.2. Requisiti Tecnici<\u002Fspan><\u002Fh4><div class=\"tbl-wrap\"><table class=\"reqsum\"><thead><tr><th>Cod.<\u002Fth><th>Categoria<\u002Fth><th>Requisito<\u002Fth><th>Priorità<\u002Fth><\u002Ftr><\u002Fthead><tbody><tr><td class=\"cod\">R_033<\u002Ftd><td>Architettura e Integrazione<\u002Ftd><td>Cloud Native &amp; SaaS<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_034<\u002Ftd><td>Architettura e Integrazione<\u002Ftd><td>Webhooks<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_035<\u002Ftd><td>Architettura e Integrazione<\u002Ftd><td>API<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_036<\u002Ftd><td>Sicurezza e Dati<\u002Ftd><td>Secure Authentication<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_037<\u002Ftd><td>Sicurezza e Dati<\u002Ftd><td>Token Lifecycle<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_041<\u002Ftd><td>Supporto tecnico e adozione<\u002Ftd><td>Assistenza H24 con escalation prioritaria per area Finance &amp; Amministrazione<\u002Ftd><td><span class=\"pill nice\">Nice to Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_042<\u002Ftd><td>Supporto tecnico e adozione<\u002Ftd><td>Presenza sul territorio italiano, Formazione e Supporto Post Go-Live<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_044<\u002Ftd><td>Sicurezza e Dati<\u002Ftd><td>Certificazione ISO 27001<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><tr><td class=\"cod\">R_045<\u002Ftd><td>Sicurezza e Dati<\u002Ftd><td>Disaster recovery<\u002Ftd><td><span class=\"pill must\">Must Have<\u002Fspan><\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable><\u002Fdiv><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>Requisiti tecnici su architettura e integrazione (cloud, API), sicurezza e gestione dei dati, e qualità del supporto, distinti tra Must Have e Nice to Have.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h3 id=\"s7\" class=\"sec lvl2\"><span class=\"sec-t\">3.2. I Software analizzati<\u002Fspan><\u002Fh3><p>Per garantire una copertura completa del mercato, è stato analizzato un panel di 9 software: <\u002Fp><ul><li>Virtuagym: un software gestionale \"All-in-One\" scalabile, progettato specificamente per le catene di palestre e i franchising. Offre strumenti avanzati per la gestione multi-club, lo sviluppo di app personalizzate e l'elaborazione dei pagamenti (inclusi gli addebiti diretti SEPA);<\u002Fli><li>Managify: un gestionale in cloud rivolto a centri fitness, studi personal, box crossfit e piscine, utile per centralizzare abbonamenti, prenotazioni e controllo accessi;<\u002Fli><li>PerfectGym (Magicline): una piattaforma di caratura Enterprise sviluppata in architettura cloud-native, concepita per la gestione centralizzata di grandi network e franchising, consolidata dall'adozione di player come McFit. Si posiziona come una \"Open Platform\" grazie a un ecosistema di oltre 10.000 integrazioni, configurandosi come lo strumento ottimale per l'automazione dei flussi finanziari e operativi in contesti multi-club ad alta crescita.;<\u002Fli><li>Exerp: una robusta piattaforma di livello Enterprise di origine danese, consolidata da oltre 15 anni e utilizzata da colossi del settore come Virgin Active. È uno strumento molto solido per volumi di informazioni molto elevati;<\u002Fli><li>Sportigo: un software \"All-in-One\" nato in Francia e approdato in Italia tramite partnership con ANIF. È progettato per gestire in modo semplice prenotazioni, pagamenti, controllo accessi e comunicazioni per palestre, associazioni e liberi professionisti;<\u002Fli><li>xplor Resamania: un software gestionale francese ideale sia per studi di piccole dimensioni che per le grandi catene di palestre i franchise. Si distingue per la sua capacità di offrire un'esperienza ibrida e digitale, offrendo strumenti avanzati per la gestione degli abbonamenti, dei pagamenti, del controllo accessi (24/7) e dell'analisi dei dati per singole o multiple sedi. Inoltre, include funzionalità per i piani di allenamento, video on-demand, app per tesserati per aumentare la fidelizzazione della clientela e creare community interne;<\u002Fli><li>Showcloud (Showclub): soluzione tecnologica concepita in architettura cloud-native e di proprietà italiana-albanese. Si distingue come piattaforma aperta e flessibile, dotata di un CRM proprietario che integra meccanismi di gamification per massimizzare la retention dei clienti;<\u002Fli><li>Golee: un software gestionale \"All-in-One\" italiano, diventato un vero e proprio punto di riferimento sul territorio nazionale con oltre 20.000 associazioni e società sportive dilettantistiche (ASD e SSD) all'attivo. È progettato per semplificare e automatizzare a 360 gradi le attività dei club sportivi, offrendo strumenti intuitivi per la gestione delle iscrizioni online, la contabilità, i pagamenti digitali e l'emissione dei documenti, includendo inoltre un'app dedicata per comunicare facilmente con atleti e genitori;<\u002Fli><li>GloFox: soluzione tecnologica interamente cloud-native, orientata a boutique studio e network di centri fitness. Grazie al solido background del gruppo ABC Fitness, la piattaforma è adottata da realtà internazionali come Xponential Fitness per la sua elevata scalabilità e l’approccio mirato alla fidelizzazione dell’utente. Si configura come lo strumento ideale per il coordinamento dinamico e centralizzato di organizzazioni multi-club o in franchising.<\u002Fli><\u002Ful><p>La panoramica degli 9 software appena presentata illustra l'ampiezza e la diversità del mercato. <\u002Fp><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>Panel iniziale di 9 gestionali: dai verticali italiani (Golee, Showcloud) agli enterprise internazionali (Exerp, PerfectGym, GloFox).<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h2 id=\"s8\" class=\"sec lvl1\"><span class=\"secnum\">4<\u002Fspan><span class=\"sec-t\">Prima pre-selezione<\u002Fspan><\u002Fh2><p>A seguito di un primo screening, condotto confrontando i requisiti mappati con le specifiche tecniche reperite tramite i canali ufficiali dei vendor, è stata circoscritta la lista dei potenziali candidati per procedere a una successiva fase di analisi  approfondita. Tali fornitori sono:<\u002Fp><ul><li>Virtuagym<\u002Fli><li>PerfectGym (Magicline)<\u002Fli><li>Exerp<\u002Fli><li>Showcloud (Showclub)<\u002Fli><li>GloFox<\u002Fli><\u002Ful><p>In accordo con il management, i restanti fornitori non verranno ulteriormente approfonditi in quanto sono state rilevata criticità evidenti, nello specifico:<\u002Fp><ul><li>Managify: la piattaforma prevede una partnership vincolante con Nexi, che obbligherebbe Orange Palestre Italiane a sostenere dei costi fissi su ogni transazione di pagamento, determinando un incremento significativo delle spese complessive.<\u002Fli><li>Sportigo: la piattaforma è progettata per la gestione di singole attività/centri fitness e non supporta una gestione multi club, rappresentando quindi un limite significativo per un gruppo che opera con oltre 20 strutture in Italia.<\u002Fli><li>Xplor Resamania: prodotto francese in fase di espansione e privo di un supporto strutturato sul territorio italiano. Essendo parte del gruppo Xplor, come la piattaforma Exerp (già consolidata nel mercato italiano), in accordo con il management si è scelto di procedere esclusivamente con quest’ultima.<\u002Fli><li>Golee: gestionale sviluppato specificamente per il mercato delle Associazioni Sportive Dilettantistiche (ASD), Società Sportive Dilettantistiche (SSD) e Polisportive comportando una scarsa compliance con i requisiti mappati.  <\u002Fli><\u002Ful><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>Screening documentale → 5 candidati: Virtuagym, PerfectGym, Exerp, Showcloud, GloFox. Esclusi Managify, Sportigo, Xplor Resamania e Golee per criticità evidenti.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h2 id=\"s9\" class=\"sec lvl1\"><span class=\"secnum\">5<\u002Fspan><span class=\"sec-t\">Seconda pre-selezione<\u002Fspan><\u002Fh2><p>Al termine della prima pre-selezione, ai fornitori rimanenti è stata condivisa la lista di requisiti mappati, affinché ciascuno potesse effettuare un'analisi dettagliata e fornire evidenza delle modalità con cui i singoli requisiti risultassero soddisfatti dalla propria soluzione.<\u002Fp><p>Una volta raccolti i riscontri, le risposte sono state analizzate e valutate nel dettaglio, verificando il livello di copertura dei requisiti e identificando eventuali criticità, limitazioni o aree di approfondimento.<\u002Fp><p>Di seguito verranno riportate le risposte di ciascun fornitore e le relative considerazioni.<\u002Fp><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>Ai 5 finalisti è stata chiesta evidenza puntuale su ogni requisito; le risposte sono analizzate per livello di copertura e criticità.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h3 id=\"s10\" class=\"sec lvl2\"><span class=\"sec-t\">5.1. VirtuaGym<\u002Fspan><\u002Fh3><p>A seguito dell’analisi dettagliata dei requisiti Must Have, il fornitore VirtuaGym ha evidenziato la presenza di significativi gap funzionali rispetto alle esigenze di Orange Palestre Italiane. In considerazione dell’impossibilità di garantire la copertura di questi requisiti mandatori, la soluzione è stata esclusa dal processo di software selection.<\u002Fp><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>Escluso: gap funzionali significativi sui requisiti Must Have.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h3 id=\"s11\" class=\"sec lvl2\"><span class=\"sec-t\">5.2. PerfectGym (Magicline)<\u002Fspan><\u002Fh3><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>Copertura quasi completa dei Must Have. Punti aperti: penale di disdetta non nativa, blocco accesso da certificato medico, gateway proprietario Finon Pay.<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h4 id=\"s12\" class=\"sec lvl3\"><span class=\"sec-t\">5.2.1. Analisi Requisiti Funzionali - Must Have<\u002Fspan><\u002Fh4><div class=\"reqlist\"><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_003<\u002Fspan><span class=\"req-t\">Documentazione a supporto<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Documentazione<\u002Fdiv><div class=\"req-d\">Sport Alliance gestisce un portale pubblico per sviluppatori (developer.sportalliance.com) con un riferimento API, documentazione webhook e un registro delle modifiche, oltre a un centro assistenza per gli operatori. La documentazione del data warehouse aziendale e gli schemi dati sono sempre aggiornati e disponibili pubblicamente per i nostri clienti. Le modifiche incompatibili vengono comunicate in anticipo tramite il registro delle modifiche e i canali di assistenza clienti.<br>Link alla documentazione API: <a href=\"https://developer.sportalliance.com/apis/perfectgym/openapi/general-information\">https://developer.sportalliance.com/apis/perfectgym/openapi/general-information<\u002Fa><br>Link alla documentazione DWH: <a href=\"https://data-warehouse-docs.perfectgym.com/\">https://data-warehouse-docs.perfectgym.com/<\u002Fa><\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_004<\u002Fspan><span class=\"req-t\">Inserimento dati e documenti e archiviazione<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione anagrafica e prime iterazioni con il cliente<\u002Fdiv><div class=\"req-d\">PerfectGym Next supporta nativamente l'acquisizione completa dei dati anagrafici dei soci durante l'iscrizione su tutti i canali (in palestra, online, tablet, app). <br>Tutte le modifiche e la cronologia dei dati vengono registrate in modo sicuro e con timestamp. Inoltre, tutti i documenti associati, come contratti firmati, liberatorie, documenti d'identità, foto, certificati medici e consensi alla privacy, vengono caricati e archiviati automaticamente o manualmente nel profilo del socio al momento del salvataggio.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_005<\u002Fspan><span class=\"req-t\">Ricerca rapida<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione anagrafica e prime iterazioni con il cliente<\u002Fdiv><div class=\"req-d\">PerfectGym Next supporta la ricerca globale dei membri in tempo reale con funzionalità di filtraggio incrociato complete. Gli utenti possono filtrare istantaneamente in base a dati personali (nome, data di nascita, sesso), informazioni di contatto (email, telefono, indirizzo), dettagli dell'account (numero cliente, stato, numero di carta) e dati finanziari (IBAN, BIC).<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_006<\u002Fspan><span class=\"req-t\">Pianificazione e gestione degli appuntamenti<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione anagrafica e prime iterazioni con il cliente<\u002Fdiv><div class=\"req-d\">Tutti i tipi di appuntamenti (ad es. visite al centro, personal training, consulti, visite mediche) possono essere programmati nei calendari dello staff dai membri tramite l'app self-service o dallo staff utilizzando l'applicazione di gestione.<br>I flussi di lavoro per la riprogrammazione, la cancellazione e i promemoria sono supportati nativamente per garantire che i membri siano tempestivamente informati di eventuali modifiche e non perdano le sessioni.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_008<\u002Fspan><span class=\"req-t\">Categorizzazione cliente<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione anagrafica e prime iterazioni con il cliente<\u002Fdiv><div class=\"req-d\">Lo stato del membro (es. Prospect, Attivo, Inattivo, Ex-Membro) viene derivato automaticamente dallo stato del contratto. Le regole di segmentazione dinamica consentono la gestione automatica dell'accesso al club, come il blocco dei membri con debiti insoluti o contratti scaduti. <br>La frequenza delle visite e la data dell'ultima visita sono chiaramente visualizzate al personale al momento del check-in, consentendo loro di interagire proattivamente con i membri. Inoltre, tutte le visite vengono registrate e sono visibili nell'app per i membri.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_009<\u002Fspan><span class=\"req-t\">Gestione catalogo<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">La gestione degli abbonamenti è il fulcro del nostro sistema, che supporta pienamente diverse configurazioni contrattuali, tra cui abbonamenti mensili rinnovabili, annuali, a tempo determinato e a tempo indeterminato. <br>Gestiamo pagamenti in un'unica soluzione e ricorrenti tramite addebito diretto, carta di credito o contanti, oltre a prodotti a sessione (carnet), di prova e aggiuntivi. Tutti i canali di vendita (online, API e in palestra) utilizzano un catalogo unificato, garantendo un'unica fonte di informazioni affidabile.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_010<\u002Fspan><span class=\"req-t\">Catalogo dinamico<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Il sistema supporta la presentazione di offerte di abbonamento mirate, in tempo reale e a tempo limitato, basate sulla categoria dell'utente, utilizzando una combinazione di specifiche funzionalità integrate:<br>Clienti attivi (Aggiornamenti in base al livello attuale): Per i membri attivi, il sistema gestisce questa operazione tramite gli aggiornamenti del contratto. Gli operatori possono consentire ai membri di aggiornare autonomamente i propri abbonamenti tramite il portale o l'app MySports Self-Service. Durante la configurazione di un aggiornamento, è possibile definire la limitazione dell'abbonamento. Ciò garantisce che solo i membri che attualmente possiedono un abbonamento specifico (ad esempio, \"Gold\") abbiano la possibilità di acquistare l'abbonamento di livello superiore corrispondente (ad esempio, \"Platinum\").<br>Potenziali clienti (Prove e offerte standard): I clienti non attivi possono visualizzare e acquistare online gli abbonamenti standard e le offerte di prova disponibili. Il sistema consente di configurare landing page dedicate per le prenotazioni di prova e pagine tariffarie standard dove i potenziali clienti possono facilmente registrarsi e prenotare le loro prime sessioni.<br>Ex-membri (Offerte di benvenuto): Per raggiungere gli ex membri, il sistema fornisce un modulo dedicato al recupero dei clienti. Anziché limitarsi a visualizzarle su una pagina pubblica, gli operatori possono generare offerte contrattuali personalizzate. Si tratta di offerte altamente individualizzate e a tempo limitato, con interessanti sconti di \"bentornato\", inviate direttamente all'ex membro tramite e-mail o SMS. Ogni messaggio contiene un link sicuro e personalizzato che rimanda a una pagina di pagamento ottimizzata per dispositivi mobili, con i dati dell'utente già precompilati per una procedura di riiscrizione semplice e veloce.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_012<\u002Fspan><span class=\"req-t\">Disdetta prova<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Supporto nativo. La prova gratuita può essere annullata dall'utente (tramite app/web) o da un operatore fino a un giorno prima della conversione automatica.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_013<\u002Fspan><span class=\"req-t\">Calcolo automatico pro rata post 15 del mese<\u002Fspan><span class=\"badge partial\">Parziale<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">PerfectGym Next calcola automaticamente la quota proporzionale giornaliera per i contratti che iniziano a metà mese. <br>La specifica esigenza di posticipare questa fatturazione proporzionale alla rata del mese successivo per i contratti che iniziano dopo il 15 è attualmente in programma per la realizzazione del prodotto.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_014<\u002Fspan><span class=\"req-t\">Calcolo automatico pro rata prima del 15 del mese<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Per i nuovi contratti stipulati prima del 15 del mese, la tariffa giornaliera dalla data di inizio fino alla fine del mese viene calcolata automaticamente e addebitata con la prima rata del mese in corso.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_015<\u002Fspan><span class=\"req-t\">Conversione automatica abbonamento pro rata<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Una volta terminato il periodo proporzionale, il contratto si rinnova automaticamente con la cadenza mensile scelta dal socio; la prima rata mensile completa viene generata e addebitata alla data di fatturazione ordinaria.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_016<\u002Fspan><span class=\"req-t\">Rinnovo automatico dell'abbonamento<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">I contratti mensili si rinnovano automaticamente, a meno che l'iscritto non presenti una richiesta di disdetta o di sospensione prima della data di rinnovo. Il sistema di fatturazione ricorrente genera ed elabora automaticamente la rata successiva.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_017<\u002Fspan><span class=\"req-t\">Sospensioni abbonamento<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Supportato in modo nativo. Gli iscritti o gli operatori possono sospendere gli abbonamenti tramite l'app o il sito web fino a un giorno prima del rinnovo. La durata, i costi e i requisiti di idoneità sono configurabili, e il motore di fatturazione adegua o posticipa automaticamente le rate.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_018<\u002Fspan><span class=\"req-t\">Disdetta abbonamento<\u002Fspan><span class=\"badge partial\">Parziale<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Le cancellazioni dei contratti possono essere abilitate sia di persona che online tramite la piattaforma MySports, consentendo periodi di preavviso configurabili come un giorno prima del rinnovo. Sebbene una penale automatica calcolata esattamente la metà del valore dell'abbonamento utilizzato non sia una funzionalità nativa, siamo pienamente aperti a discutere potenziali soluzioni per soddisfare questo requisito.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_021<\u002Fspan><span class=\"req-t\">Verifica real-time accesso alla struttura<\u002Fspan><span class=\"badge partial\">Parziale<\u002Fspan><\u002Fdiv><div class=\"req-cat\">GYM Experience<\u002Fdiv><div class=\"req-d\">Il controllo accessi convalida in tempo reale su tutti i club: validità e tipologia del contratto, accordo firmato, stato dei pagamenti e diritti di accesso per club/area. I cancelli vengono sbloccati o bloccati di conseguenza tramite integrazioni di tornelli certificati.<br>La necessità di un certificato medico verrà valutata in dettaglio nella prossima fase.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_022<\u002Fspan><span class=\"req-t\">Autonomia utilizzo servizi<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">GYM Experience<\u002Fdiv><div class=\"req-d\">L'attivazione di docce, asciugacapelli, armadietti e servizi simili tramite badge o braccialetto è fornita tramite partner hardware certificati. La compatibilità dell'hardware dovrebbe essere verificata durante la fase di valutazione.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_023<\u002Fspan><span class=\"req-t\">Integrazione Vending<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">GYM Experience<\u002Fdiv><div class=\"req-d\">L'integrazione dei distributori automatici tramite badge/braccialetto viene fornita tramite partner certificati utilizzando un protocollo di comunicazione standard che registra gli acquisti sull'account del membro come transazioni POS.<br>Il fornitore dell'hardware dei distributori automatici deve essere confermato prima dell'implementazione.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_026<\u002Fspan><span class=\"req-t\">Prenotazione altri servizi (es. visita medica)<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">GYM Experience<\u002Fdiv><div class=\"req-d\">Il modulo Appuntamenti supporta nativamente una vasta gamma di tipologie di visita, tra cui visite mediche e consulti fisioterapici. Gli iscritti possono prenotare facilmente questi servizi selezionando la tipologia di appuntamento preferita. Ogni servizio è direttamente collegato alle risorse necessarie, come medici, allenatori o stanze specifici. Per garantire un collegamento diretto tra la raccolta dei dati e l'erogazione del servizio, il pagamento può essere richiesto al momento della prenotazione. Inoltre, gli iscritti hanno la possibilità di acquistare pacchetti di sessioni, utilizzabili per prenotazioni future.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_027<\u002Fspan><span class=\"req-t\">Gestione Multi-Tenant<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Struttura e accessibilità<\u002Fdiv><div class=\"req-d\">PerfectGym Next modella nativamente una gerarchia completa (Tenant &gt; Paese &gt; Regione &gt; Singola Sede) con ereditarietà della configurazione senza interruzioni e funzionalità di override granulari a ogni livello. Questa solida architettura consente la configurazione centralizzata dell'offerta con propagazione automatizzata nelle sedi selezionate, riducendo significativamente il carico amministrativo e garantendo la coerenza del marchio.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_028<\u002Fspan><span class=\"req-t\">Permessi account<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Struttura e accessibilità<\u002Fdiv><div class=\"req-d\">Il modulo di autorizzazione basato sui ruoli consente ruoli illimitati con controlli granulari sull'accesso a funzionalità e dati. Un'unica identità utente fornisce accesso mirato a club selezionati senza richiedere cambi di profilo o nuovi accessi.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_029<\u002Fspan><span class=\"req-t\">Integrazione con altri sistemi<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Struttura e accessibilità<\u002Fdiv><div class=\"req-d\">PerfectGym Next espone un framework completo di API REST e webhook per consentire ai clienti di creare integrazioni e recuperare dati rilevanti. Incoraggiamo i fornitori terzi a collaborare con noi e a creare integrazioni tramite il nostro portale dedicato per sviluppatori SPA. Offriamo anche integrazioni standard, tra cui Technogym, Egym, Wellhub e Classpass. Piattaforme contabili, automazione del marketing e back-end ERP/finanziari possono essere facilmente integrati utilizzando esportazioni di dati dedicate tramite API o DWH.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_030<\u002Fspan><span class=\"req-t\">Aggiornamento informazioni database<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Struttura e accessibilità<\u002Fdiv><div class=\"req-d\">Gli aggiornamenti relativi ai dati relativi a soci, contratti, pagamenti e prenotazioni vengono riportati in tempo reale su tutti i canali (reception, app, portale online, controllo accessi, API).<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_031<\u002Fspan><span class=\"req-t\">Finance &amp; Payments online<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Struttura e accessibilità<\u002Fdiv><div class=\"req-d\"><strong>Finion Pay<\u002Fstrong> è il Payment Service Provider sviluppato in diretta sinergia con PerfectGym, basato sull’infrastruttura di <strong>Adyen<\u002Fstrong> — PSP di primo livello in Europa. L’integrazione è nativa: gestionale e sistema di pagamento costituiscono un unico prodotto con un unico referente, eliminando la separazione tra le due piattaforme e abilitando un’automazione end-to-end dell’intero ciclo cliente–incasso.<br><br><strong>Metodi di pagamento supportati:<\u002Fstrong> carta di credito; carta di debito con <strong>tokenizzazione<\u002Fstrong> (non disponibile con l’attuale TSPay, che obbliga all’IBAN per il ricorrente su conto corrente); IBAN&nbsp;/&nbsp;SEPA in via residuale per clienti senza strumento digitale o in fase di migrazione. Progressiva dismissione dell’IBAN a favore della carta di debito per tutte le tipologie di pagamento: POS, digitale, ricorrente.<br><br><strong>Automazione incassi:<\u002Fstrong> pagamenti ricorrenti automatizzati con addebito giornaliero ed esito in tempo reale; gestione automatica degli insoluti con applicazione della penale contrattuale e re-invio del link di pagamento (pay&nbsp;by&nbsp;link); semplificazione del catalogo prodotti grazie all’eliminazione degli abbonamenti pro-rata per la riscossione SEPA a inizio mese.<br><br><strong>Pagamento via totem:<\u002Fstrong> nativamente supportato in PerfectGym; non gestibile con Gymnasium (assenza di device dedicati). Risultato: drastica riduzione dell’operatività di incasso con un sistema più automatizzato, efficiente e scalabile.<br><br><strong>Gateway aggiuntivi:<\u002Fstrong> supporto nativo anche a Stripe e Adyen direttamente, garantendo assenza di lock-in su un unico provider. L’integrazione diretta interbancaria&nbsp;/&nbsp;Corporate Banking è in scope di approfondimento nella prossima fase del progetto.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_032<\u002Fspan><span class=\"req-t\">Finance &amp; Payments offline<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Struttura e accessibilità<\u002Fdiv><div class=\"req-d\">I mandati di addebito diretto SEPA sono gestiti in modo trasparente all'interno del sistema, acquisendo metadati completi relativi al mandato. Gli incassi vengono esportati in modo efficiente come file XML ISO 20022, garantendo la rigorosa conformità con le normative europee. Il supporto per il servizio italiano SEDA per l'allineamento dei dati dei debitori sarà valutato a fondo durante la prossima fase di definizione dell'ambito.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_038<\u002Fspan><span class=\"req-t\">Relazione dati<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Struttura e accessibilità<\u002Fdiv><div class=\"req-d\">Il modello dati è completamente relazionale: ogni ordine, fattura e prenotazione è collegato tramite chiavi esterne al profilo del membro e al catalogo prodotti/servizi. Lo stesso modello è esposto a valle nel Data Warehouse con ID stabili.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_039<\u002Fspan><span class=\"req-t\">Ambiente di Test e Simulazione<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Struttura e accessibilità<\u002Fdiv><div class=\"req-d\">Supporto nativo. Ogni cliente aziendale riceve un ambiente sandbox dedicato e logicamente isolato che rispecchia le funzionalità e la configurazione di produzione. È possibile eseguire cicli end-to-end (registrazione, fatturazione, pagamento, accesso); i gateway di pagamento funzionano in modalità sandbox/simulatore.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_040<\u002Fspan><span class=\"req-t\">Gestione Insoluti mancato pagamento<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Supportato nativamente. Il motore di dunning rileva le rate non pagate (carta o SEPA), applica blocchi di accesso configurabili e addebita automaticamente una commissione amministrativa. La logica opera per ogni rata mensile, quindi le penali possono essere applicate più volte in mesi consecutivi di mancato pagamento per lo stesso membro.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_043<\u002Fspan><span class=\"req-t\">Loyality e programma referral (\"es. Presenta un Amico)<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">il sistema supporta nativamente la gestione delle campagne di referral tramite il modulo integrato “Invita un amico”.<br>Ecco come il sistema gestisce i trigger, le regole e gli incentivi:<br>Trigger e automazione:<br>- Trigger specifici: assegna automaticamente i premi in base a eventi quali la sottoscrizione di un contratto e la prenotazione di una sessione di prova.<br>- Consegna in tempo reale vs. ritardata: emetti i premi immediatamente o configura un periodo di attesa obbligatorio (ad es. 15 giorni per tenere conto dei periodi di recesso).<br>- Riscatto automatico: applica automaticamente i premi guadagnati, come gli sconti sull'abbonamento, al contratto del membro.<br>- Opzione di revisione manuale: richiedere a un membro dello staff di esaminare e approvare manualmente il premio prima dell'emissione.<br>Incentivi e premi:<br>Premia sia il cliente che ha effettuato il referral sia il nuovo cliente con opzioni che includono:<br>- Credito nel portafoglio virtuale: aggiungi fondi all'account del socio da spendere nel club.<br>- Sconti sulle quote associative: concede sconti fissi o percentuali sulle quote ricorrenti, che possono essere cumulabili per più referral.<br>- Tempo bonus: aggiungi periodi di allenamento gratuiti al contratto.<br>- Altri premi: note di credito a tariffa fissa, servizi gratuiti specifici o premi personalizzati.<br>Esperienza dei soci:<br>Ogni socio riceve un link di segnalazione personale e un codice nella propria app self-service. Quando un potenziale cliente si iscrive online utilizzando questo link, il codice di segnalazione viene precompilato per tracciare automaticamente la provenienza del nuovo cliente.<\u002Fdiv><\u002Fdiv><\u002Fdiv><p>La piattaforma PerfectGym copre in maniera completa la maggior parte dei requisiti funzionali Must Have, dimostrando una grande solidità nella gestione dell'architettura multi-tenant per le catene, nell'automazione del catalogo dinamico e dei contratti, oltre a supportare nativamente la sospensione delle rate, la gestione degli insoluti e il programma di referral. Inoltre, la piattaforma consente una buona integrazione con le architetture già esistenti e fornisce una documentazione esaustiva delle diverse chiamate API. <\u002Fp><p>Tuttavia, l'analisi evidenzia alcuni punti di attenzione: <\u002Fp><ul><li>il sistema non gestisce nativamente il calcolo esatto della penale di disdetta ma il fornitore si è reso disponibile a discutere potenziali soluzioni per soddisfare il requisito;<\u002Fli><li>la funzionalità di blocco real-time degli accessi basato sulla validità del certificato medico non è stata menzionata ma il fornitore si è reso disponibile a sviluppare la soluzione per soddisfare il requisito;<\u002Fli><li>il requisito di Gateway Agnostic è soddisfatto: avere Finion Pay come PSP integrato nativo rappresenta un vantaggio operativo e architetturale; il sistema supporta nativamente Adyen e Stripe come gateway aggiuntivi, garantendo assenza di lock-in su un unico provider.<\u002Fli><\u002Ful><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>28 requisiti · 28 soddisfatti · 0 parziali<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h4 id=\"s13\" class=\"sec lvl3\"><span class=\"sec-t\">5.2.2. Analisi Requisiti Funzionali - Nice to Have<\u002Fspan><\u002Fh4><div class=\"reqlist\"><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_001<\u002Fspan><span class=\"req-t\">Dashboard<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Analisi Dati e BI<\u002Fdiv><div class=\"req-d\">PerfectGym Next supporta nativamente una visualizzazione completa dei dati tramite il suo modulo di reporting integrato, offrendo grafici, tabelle e dashboard per metriche chiave come churn, vendite e presenze. Inoltre, i clienti ottengono l'accesso a un data warehouse Amazon Redshift integrato, che consente una connessione senza soluzione di continuità con gli strumenti di BI preferiti come Power BI, Looker o Tableau.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_002<\u002Fspan><span class=\"req-t\">Export dati<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Analisi Dati e BI<\u002Fdiv><div class=\"req-d\">La piattaforma offre funzionalità complete di esportazione dati, consentendo agli utenti di esportare report operativi direttamente dall'interfaccia utente in formato CSV, XLS e PDF. Inoltre, sono pienamente supportate le esportazioni XML per le esecuzioni di riscossione dei pagamenti (SEPA XML ISO 20022) e qualsiasi set di dati strutturato può essere esportato senza problemi tramite API.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_007<\u002Fspan><span class=\"req-t\">Registro attività di pre-vendita<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione anagrafica e prime iterazioni con il cliente<\u002Fdiv><div class=\"req-d\">PerfectGym Next è dotato di un modulo dedicato per gestire tutte le interazioni dal momento in cui un potenziale cliente mostra interesse fino alla firma del contratto. Il modulo Lead &amp; Sales registra ogni interazione pre-vendita (visite, chiamate, esiti delle prove e follow-up) associata al record del potenziale cliente, con responsabili assegnabili e una cronologia completa delle attività.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_011<\u002Fspan><span class=\"req-t\">Conversione prova in abbonamento<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">PerfectGym Next supporta nativamente le prove gratuite di 7 giorni come abbonamenti indipendenti, con conversione automatica in contratti ricorrenti al termine del periodo di prova. Inoltre, il personale può convertire manualmente le prove gratuite in anticipo direttamente dal profilo dell'utente.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_019<\u002Fspan><span class=\"req-t\">Automazione comunicazioni<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Il Centro Comunicazione automatizza l'invio di email e SMS ai membri per eventi come compleanni, rinnovi, pagamenti mancati e promemoria delle lezioni. Stanno sviluppando attivamente la messaggistica condizionale per consentire contenuti personalizzati, come email di benvenuto specifiche per livello. Si prega di notare che la messaggistica automatica per il personale non è attualmente disponibile.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_020<\u002Fspan><span class=\"req-t\">Personalizzazione delle comunicazioni<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Gestione vendita e abbonamenti<\u002Fdiv><div class=\"req-d\">Il Communication Center consente l'utilizzo di modelli HTML completamente personalizzabili per ogni trigger, garantendo che contenuti altamente personalizzati e contestualmente rilevanti vengano inviati automaticamente in base all'evento specifico.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_024<\u002Fspan><span class=\"req-t\">Gestione Palinsesto Corsi<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">GYM Experience<\u002Fdiv><div class=\"req-d\">PerfectGym Next offre una gestione completa degli orari dei corsi, consentendo agli amministratori di configurare categorie, descrizioni, immagini, sale, istruttori e capacità a livello centrale o locale per ogni club. La piattaforma offre robuste funzionalità di modifica in blocco per istruttore, intervallo di date o sede per semplificare gli aggiornamenti su più corsi. I flussi di lavoro per gli istruttori supplenti sono supportati nativamente. Inoltre, i promemoria automatici e i messaggi ad hoc ai partecipanti ai corsi assicurano che i membri rimangano informati, riducendo il tasso di assenze.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_025<\u002Fspan><span class=\"req-t\">Gestione delle prenotazioni<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">GYM Experience<\u002Fdiv><div class=\"req-d\">I soci possono prenotare e cancellare le lezioni tramite app, web e in club. Quando una lezione è al completo, i soci vengono inseriti in una lista d'attesa in ordine di arrivo; la promozione al roster è automatica quando si libera un posto, con notifica al socio.<\u002Fdiv><\u002Fdiv><\u002Fdiv><p>PerfectGym dimostra un’ottima copertura dei requisiti funzionali Nice to Have. <\u002Fp><p>Sul fronte dell'analisi dati, la piattaforma offre diverse dashboard e la possibilità di esportare report in molteplici formati (CSV, XLS, PDF, XML). Per quanto riguarda le funzionalità legate alle vendite e all'esperienza in struttura, il sistema è dotato di un modulo \"Lead &amp; Sales\" dedicato per tracciare ogni interazione di pre-vendita, gestisce in automatico o manualmente le conversioni delle prove gratuite di 7 giorni in abbonamenti paganti e offre una gestione avanzata del palinsesto corsi, comprensiva di modifiche in blocco, gestione dei cambi istruttori e liste d'attesa per le prenotazioni. <\u002Fp><p>L'unica area funzionale valutata parzialmente soddisfatta riguarda l'automazione delle comunicazioni: sebbene il sistema consenta l'uso di modelli HTML completamente personalizzabili per inviare comunicazioni mirate ai soci in base a eventi e trigger specifici (es. compleanni, mancati pagamenti, promemoria abbonamenti, ecc.).<\u002Fp><\u002Fdiv><div class=\"margin\"><aside class=\"note\"><span class=\"note-l\">Sintesi<\u002Fspan>8 requisiti · 8 soddisfatti<\u002Faside><\u002Fdiv><\u002Fsection><section class=\"blk\"><div class=\"body\"><h4 id=\"s14\" class=\"sec lvl3\"><span class=\"sec-t\">5.2.3. Analisi Requisiti Tecnici - Must Have<\u002Fspan><\u002Fh4><div class=\"reqlist\"><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_033<\u002Fspan><span class=\"req-t\">Cloud Native &amp; SaaS<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Architettura e Integrazione<\u002Fdiv><div class=\"req-d\">PerfectGym Next è completamente cloud-native su AWS, accessibile tramite qualsiasi browser web moderno senza VPN o desktop remoto. Sono disponibili app native per iOS e Android per membri e istruttori di fitness.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_034<\u002Fspan><span class=\"req-t\">Webhooks<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Architettura e Integrazione<\u002Fdiv><div class=\"req-d\">I webhook in tempo reale notificano ai sistemi esterni gli eventi relativi a membri, contratti, pagamenti, prenotazioni e accessi.<br><a href=\"https://developer.sportalliance.com/apis/perfectgym/webhooks/event-types.\">https://developer.sportalliance.com/apis/perfectgym/webhooks/event-types.<\u002Fa><\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_035<\u002Fspan><span class=\"req-t\">API<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Architettura e Integrazione<\u002Fdiv><div class=\"req-d\">Supportano pienamente le funzionalità di lettura/scrittura API in tempo reale tramite una suite completa di API aperte RESTful. Le app di terze parti possono gestire profili, prenotazioni e contratti. I dati sono strutturati in risorse, richiedendo chiamate separate per i pacchetti di membri completi (nessun GraphQL).<br>Documentazione API: <a href=\"https://developer.sportalliance.com/apis/perfectgym/openapi/general-information\">https://developer.sportalliance.com/apis/perfectgym/openapi/general-information<\u002Fa><\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_036<\u002Fspan><span class=\"req-t\">Secure Authentication<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Sicurezza e Dati<\u002Fdiv><div class=\"req-d\">L'autenticazione e il recupero della password seguono i principi OWASP ASVS: le credenziali vengono scambiate tramite HTTPS POST su TLS 1.2+; le password non vengono mai registrate o restituite nelle risposte API; i flussi di reimpostazione utilizzano token firmati e a tempo limitato.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_037<\u002Fspan><span class=\"req-t\">Token Lifecycle<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Sicurezza e Dati<\u002Fdiv><div class=\"req-d\">PerfectGym Next utilizza lo standard di settore OAuth2 (Spring Security OAuth2) con token JWT per l'autenticazione di sessione e API. La scadenza dei token è configurabile per tipo di client tramite le impostazioni Time-to-Live (TTL). La piattaforma sta attualmente migrando i suoi client web alla gestione delle sessioni lato server Spring (basata su Redis), che introduce cookie di sessione HTTP sicuri e consente la corretta invalidazione della sessione al momento del logout. Fino al completamento di questa migrazione, i token JWT rimangono validi fino alla scadenza e non possono essere revocati o inseriti in blacklist durante la sessione.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_042<\u002Fspan><span class=\"req-t\">Presenza sul territorio italiano, Formazione e Supporto Post Go-Live<\u002Fspan><span class=\"badge partial\">Parziale<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Supporto tecnico e adozione<\u002Fdiv><div class=\"req-d\">hanno una presenza in Italia con altri brand del settore e due riferimenti commerciali italiani.<br>Sport Alliance opera da hub strategici in Europa (sede centrale di Amburgo, Varsavia, Londra), offrendo implementazione completa, customer success e supporto in tutta Europa. Per le implementazioni in Italia, la formazione in loco, la gestione del cambiamento e l'assistenza post-go-live possono essere personalizzate e concordate durante la fase di definizione del progetto. Con una comprovata esperienza, SPA ha eseguito con successo oltre 8.000 migrazioni, servendo più di 10.000 sedi in 55 paesi.<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_044<\u002Fspan><span class=\"req-t\">Certificazione ISO 27001<\u002Fspan><span class=\"badge partial\">Parziale<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Sicurezza e Dati<\u002Fdiv><div class=\"req-d\">In corso processo per l’ottenimento della certificazione ISO 27001<\u002Fdiv><\u002Fdiv><div class=\"req\"><div class=\"req-h\"><span class=\"cod\">R_045<\u002Fspan><span class=\"req-t\">Disaster recovery<\u002Fspan><span class=\"badge ok\">Soddisfatto<\u002Fspan><\u002Fdiv><div class=\"req-cat\">Sicurezza e Dati<\u002Fdiv><div class=\"req-d\">Il Disaster Recovery è soddisfatto sia per eventi Tier 1 che per eventi Tier 2.<br>- Recovery Point Objective (RPO) - La piattaforma divide i disastri in due livelli. Nel caso di guasti locali di \"Tier 1\" (come la caduta di un singolo data center), PerfectGym utilizza repliche sincrone dei dati garantendo un eccellente RPO inferiore a 1 minuto. In caso di un disastro regionale (Tier 2), il fornitore garantisce un RPO documentato e conforme agli i
